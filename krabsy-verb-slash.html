<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Krabsy – Verb Slash!</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;700;900&display=swap');
  :root { --ocean-deep:#0288d1; --coral:#ff6b6b; --teal:#00c49a; --teal-dark:#00a882; --sand-gold:#ffd166; --white:#fff; }
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{overflow:hidden;width:100vw;height:100vh;background:#1a1a2e;font-family:'Nunito',sans-serif;user-select:none;-webkit-user-select:none}

  /* ── Fixed game world scaled to fit viewport ── */
  #game-world{
    position:absolute;width:1280px;height:720px;
    transform-origin:top left;
    overflow:hidden;
  }

  /* ── Beach ── */
  #bg{position:absolute;inset:0;z-index:0;background:linear-gradient(180deg,#3aa8e8 0%,#5cbde8 25%,#87ceeb 45%,#b3e5fc 60%,#d4efc8 68%,#f5deb3 72%,#edd9a3 80%,#e8d08c 100%)}
  .cloud{position:absolute;z-index:1;pointer-events:none}
  .cloud::before,.cloud::after,.cloud span{content:'';position:absolute;background:white;border-radius:50%}
  .cloud::before{width:60px;height:36px;top:12px;left:0} .cloud::after{width:84px;height:48px;top:0;left:24px}
  .cloud span{display:block;width:66px;height:36px;top:10px;left:60px}
  .cloud-1{top:40px;left:-100px;animation:cloudDrift 40s linear infinite;opacity:0.7}
  .cloud-2{top:20px;left:-120px;animation:cloudDrift 55s linear infinite;animation-delay:-18s;opacity:0.5;transform:scale(1.2)}
  .cloud-3{top:90px;left:-100px;animation:cloudDrift 48s linear infinite;animation-delay:-30s;opacity:0.6;transform:scale(0.7)}
  @keyframes cloudDrift{from{transform:translateX(-150px)}to{transform:translateX(1430px)}}
  #sun{position:absolute;top:30px;right:100px;width:70px;height:70px;background:radial-gradient(circle,#fff7a1,#ffd54f 50%,rgba(255,213,79,0) 70%);border-radius:50%;z-index:1;pointer-events:none;box-shadow:0 0 50px rgba(255,213,79,0.5)}
  #sand-floor{position:absolute;bottom:0;left:0;right:0;height:216px;background:linear-gradient(180deg,transparent 0%,rgba(237,208,140,0.3) 15%,rgba(237,208,140,0.6) 40%,#edd08c 70%,#e2c47a 100%);z-index:2;pointer-events:none}
  #sand-floor::before{content:'';position:absolute;inset:0;background-image:radial-gradient(circle,rgba(200,170,100,0.2) 1px,transparent 1px);background-size:10px 10px;opacity:0.5}
  #waterline{position:absolute;bottom:200px;left:0;right:0;height:36px;z-index:2;pointer-events:none;overflow:hidden}
  #waterline::before{content:'';position:absolute;bottom:0;left:-5%;right:-5%;height:100%;background:linear-gradient(180deg,rgba(41,182,246,0) 0%,rgba(41,182,246,0.15) 40%,rgba(41,182,246,0.25) 70%,rgba(41,182,246,0.1) 100%);animation:waveSway 3s ease-in-out infinite}
  @keyframes waveSway{0%,100%{transform:translateX(0) scaleY(1)}50%{transform:translateX(10px) scaleY(1.15)}}
  .beach-deco{position:absolute;z-index:3;pointer-events:none}
  #crab-mascot{position:absolute;bottom:15px;left:40px;z-index:22;font-size:80px;pointer-events:none;animation:crabIdle 2s ease-in-out infinite;filter:drop-shadow(0 3px 6px rgba(0,0,0,0.2))}
  @keyframes crabIdle{0%,100%{transform:translateY(0) rotate(0deg)}50%{transform:translateY(-4px) rotate(2deg)}}
  #crab-mascot.celebrate{animation:crabCelebrate 0.8s ease-out !important}
  @keyframes crabCelebrate{0%{transform:translateY(0) rotate(0) scale(1)}25%{transform:translateY(-15px) rotate(-10deg) scale(1.2)}50%{transform:translateY(-10px) rotate(10deg) scale(1.15)}100%{transform:translateY(0) rotate(0) scale(1)}}
  #deco-shell1{bottom:15px;right:130px;font-size:28px}#deco-shell2{bottom:35px;right:320px;font-size:22px;transform:rotate(20deg)}
  #deco-star{bottom:10px;left:280px;font-size:28px}#deco-shell3{bottom:42px;left:520px;font-size:20px;transform:rotate(-15deg)}
  #deco-palm{bottom:110px;right:-20px;font-size:60px;transform:scaleX(-1);opacity:0.3}

  /* ── Top bar ── */
  #top-bar{position:absolute;top:0;left:0;right:0;display:flex;align-items:center;justify-content:space-between;padding:16px 28px;z-index:20;background:rgba(255,255,255,0.6);backdrop-filter:blur(8px);border-bottom:1px solid rgba(0,0,0,0.06);gap:14px}
  #logo{font-family:'Fredoka One',cursive;font-size:36px;color:var(--ocean-deep);letter-spacing:2px}
  #logo span{color:var(--coral)}
  #lives{display:flex;gap:5px;font-size:36px}
  #streak-box{display:flex;align-items:center;gap:5px}
  #streak-flame{font-size:38px;opacity:0;transition:opacity 0.3s}
  #streak-flame.active{opacity:1;animation:flamePulse 0.6s ease-in-out infinite alternate}
  @keyframes flamePulse{from{transform:scale(1) translateY(0)}to{transform:scale(1.15) translateY(-3px)}}
  #streak-count{font-family:'Fredoka One',cursive;font-size:36px;color:var(--coral);line-height:1}
  #score-area{text-align:right}
  #score{font-family:'Fredoka One',cursive;font-size:46px;color:var(--coral);line-height:1}
  #score-mult{font-size:18px;font-weight:700;color:var(--teal-dark);min-height:22px}

  /* ── Verb chain — giant centered watermark ── */
  #verb-chain{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);z-index:8;pointer-events:none}
  #verb-chain-inner{
    display:flex;flex-direction:column;align-items:center;gap:0;
    font-family:'Fredoka One',cursive;font-size:100px;line-height:1.1;text-transform:uppercase;
    opacity:0.18;
  }
  .chain-base{color:#0a4a7a}.chain-arrow{display:none}
  .chain-past{color:var(--teal-dark)}.chain-pp{color:var(--coral)}.chain-pending{color:#0a4a7a}
  .chain-pop{display:block;animation:chainPop 0.35s ease-out}
  @keyframes chainPop{0%{transform:scale(0.7);opacity:0}60%{transform:scale(1.05)}100%{transform:scale(1);opacity:1}}
  .chain-complete{animation:chainGlow 2.2s ease-out forwards}
  @keyframes chainGlow{0%{opacity:0.18}10%{opacity:0.9;filter:drop-shadow(0 0 15px rgba(255,209,102,0.5))}30%{opacity:0.75}70%{opacity:0.5}100%{opacity:0}}

  /* ── Game area ── */
  #game-area{position:absolute;inset:0;overflow:hidden;z-index:10}
  #slash-svg{position:absolute;inset:0;width:100%;height:100%;pointer-events:none;z-index:30}

  /* ── Balloons ── */
  .balloon{position:absolute;pointer-events:none;z-index:15;display:flex;flex-direction:column;align-items:center;filter:drop-shadow(0 5px 12px rgba(0,0,0,0.12));will-change:transform}
  .balloon-body{width:120px;height:145px;border-radius:50% 50% 50% 50% / 55% 55% 45% 45%;display:flex;align-items:center;justify-content:center;position:relative;overflow:hidden}
  .balloon-body::before{content:'';position:absolute;top:12%;left:18%;width:30%;height:22%;border-radius:50%;background:rgba(255,255,255,0.45);filter:blur(5px);z-index:2}
  .balloon-knot{width:0;height:0;border-left:8px solid transparent;border-right:8px solid transparent;border-top:11px solid;margin-top:-1px}
  .balloon-string{width:1px;height:40px;background:rgba(0,0,0,0.15)}
  .balloon-text{font-family:'Fredoka One',cursive;font-size:28px;color:white;text-align:center;line-height:1.1;text-shadow:0 2px 4px rgba(0,0,0,0.3);position:relative;z-index:3;padding:0 10px;text-transform:uppercase}
  .balloon-0 .balloon-body{background:linear-gradient(160deg,#ff8fab,#e84393);border:2px solid rgba(255,255,255,0.35)}
  .balloon-0 .balloon-knot{border-top-color:#c0356e}
  .balloon-1 .balloon-body{background:linear-gradient(160deg,#74b9ff,#0984e3);border:2px solid rgba(255,255,255,0.35)}
  .balloon-1 .balloon-knot{border-top-color:#0767b0}
  .balloon-2 .balloon-body{background:linear-gradient(160deg,#a29bfe,#6c5ce7);border:2px solid rgba(255,255,255,0.35)}
  .balloon-2 .balloon-knot{border-top-color:#5a4bd1}
  .balloon-hover{animation:balloonBob 2.5s ease-in-out infinite}
  @keyframes balloonBob{0%,100%{transform:translateY(0)}50%{transform:translateY(-12px)}}
  .balloon-pop{animation:balloonPop 0.25s ease-out forwards}
  @keyframes balloonPop{0%{transform:scale(1);opacity:1}50%{transform:scale(1.3);opacity:0.5}100%{transform:scale(0);opacity:0}}

  /* ── Beachballs ── */
  .verb-fruit{position:absolute;display:flex;align-items:center;justify-content:center;pointer-events:none;z-index:15;will-change:transform;filter:drop-shadow(0 5px 10px rgba(0,0,0,0.15))}
  .verb-fruit .fruit-body{width:100%;height:100%;border-radius:50%;display:flex;align-items:center;justify-content:center;position:relative;overflow:hidden}
  .verb-fruit .fruit-body::before{content:'';position:absolute;top:8%;left:15%;width:40%;height:28%;border-radius:50%;background:rgba(255,255,255,0.4);filter:blur(6px);z-index:3}
  .verb-fruit .fruit-body::after{content:'';position:absolute;inset:0;border-radius:50%;background:repeating-conic-gradient(rgba(255,255,255,0.1) 0deg 30deg,transparent 30deg 60deg);z-index:1}
  .fruit-text{font-family:'Fredoka One',cursive;color:var(--white);text-align:center;line-height:1.1;text-shadow:0 2px 4px rgba(0,0,0,0.35);position:relative;z-index:4;padding:3px 6px;text-transform:uppercase;white-space:nowrap}
  .fruit-correct .fruit-body{background:linear-gradient(145deg,#43d9a2,#00b377);border:3px solid rgba(255,255,255,0.5);box-shadow:inset 0 -5px 10px rgba(0,0,0,0.12),inset 0 3px 5px rgba(255,255,255,0.2)}
  .fruit-wrong .fruit-body{background:linear-gradient(145deg,#ff8fab,#e0527b);border:3px solid rgba(255,255,255,0.4);box-shadow:inset 0 -5px 10px rgba(0,0,0,0.12),inset 0 3px 5px rgba(255,255,255,0.2)}
  .fruit-wrong-alt .fruit-body{background:linear-gradient(145deg,#ffb347,#e88a20);border:3px solid rgba(255,255,255,0.4);box-shadow:inset 0 -5px 10px rgba(0,0,0,0.12),inset 0 3px 5px rgba(255,255,255,0.2)}
  .phase-pp-ball.fruit-correct .fruit-body{background:linear-gradient(145deg,#64b5f6,#1e88e5) !important}
  .phase-pp-ball.fruit-wrong .fruit-body{background:linear-gradient(145deg,#ce93d8,#9c27b0) !important}
  .phase-pp-ball.fruit-wrong-alt .fruit-body{background:linear-gradient(145deg,#ffab91,#e64a19) !important}

  /* ── Effects ── */
  .particle{position:absolute;border-radius:50%;pointer-events:none;z-index:35;animation:explode 0.5s ease-out forwards}
  @keyframes explode{from{transform:translate(0,0) scale(1);opacity:1}to{transform:translate(var(--dx),var(--dy)) scale(0);opacity:0}}
  .juice-drop{position:absolute;border-radius:50%;pointer-events:none;z-index:34;animation:juiceFall 0.7s ease-in forwards}
  @keyframes juiceFall{from{transform:translate(0,0) scale(1);opacity:0.8}to{transform:translate(var(--dx),var(--dy)) scale(0.3);opacity:0}}
  .score-pop{position:absolute;font-family:'Fredoka One',cursive;font-size:36px;pointer-events:none;z-index:40;animation:scorePop 0.7s ease-out forwards}
  @keyframes scorePop{from{transform:translateY(0) scale(0.8);opacity:1}to{transform:translateY(-60px) scale(1.3);opacity:0}}
  .correct-flash,.wrong-flash{position:absolute;border-radius:50%;pointer-events:none;z-index:25;animation:flashOut 0.4s ease-out forwards}
  .correct-flash{background:radial-gradient(circle,rgba(0,229,187,0.6),transparent 70%)}
  .wrong-flash{background:radial-gradient(circle,rgba(255,68,68,0.6),transparent 70%)}
  @keyframes flashOut{from{transform:scale(0.5);opacity:1}to{transform:scale(2.5);opacity:0}}
  #edge-flash{position:absolute;inset:0;z-index:50;pointer-events:none;opacity:0;box-shadow:inset 0 0 100px rgba(255,68,68,0.4)}
  #edge-flash.flash{animation:edgeFlash 0.35s ease-out forwards}
  @keyframes edgeFlash{0%{opacity:1}100%{opacity:0}}
  @keyframes shake{0%,100%{transform:translateX(0)}20%{transform:translateX(-6px)}40%{transform:translateX(6px)}60%{transform:translateX(-4px)}80%{transform:translateX(4px)}}
  .shaking{animation:shake 0.3s ease-out}

  /* ── Swipe tutorial ── */
  #swipe-tutorial{position:absolute;z-index:45;pointer-events:none;opacity:0;transition:opacity 0.4s}
  #swipe-tutorial.visible{opacity:1}
  #swipe-tutorial .swipe-hand{font-size:70px;position:absolute;animation:swipeAcross 1.8s ease-in-out infinite;filter:drop-shadow(0 3px 10px rgba(0,0,0,0.2))}
  #swipe-tutorial .swipe-text{position:absolute;top:-65px;left:50%;transform:translateX(-50%);white-space:nowrap;font-family:'Fredoka One',cursive;font-size:30px;color:var(--ocean-deep);text-shadow:0 1px 0 rgba(255,255,255,0.5);background:rgba(255,255,255,0.8);padding:12px 28px;border-radius:30px;box-shadow:0 3px 15px rgba(0,0,0,0.1)}
  #swipe-tutorial .swipe-line{position:absolute;top:30px;left:0;width:100%;height:6px;background:linear-gradient(90deg,transparent,rgba(2,136,209,0.5),transparent);border-radius:3px}
  @keyframes swipeAcross{0%{left:-15px;top:20px;opacity:0}15%{opacity:1}85%{opacity:1}100%{left:calc(100% - 50px);top:-10px;opacity:0}}

  /* ── Screens ── */
  .screen{position:absolute;inset:0;z-index:100;display:flex;flex-direction:column;align-items:center;justify-content:center;background:rgba(135,206,235,0.92);backdrop-filter:blur(12px);padding:30px;text-align:center;gap:16px}
  .screen.hidden{display:none}
  .screen-title{font-family:'Fredoka One',cursive;font-size:60px;line-height:1;margin-bottom:4px}
  .screen-sub{font-size:20px;color:rgba(0,0,0,0.5);max-width:500px;line-height:1.5}
  .screen-stat{font-family:'Fredoka One',cursive;font-size:28px;color:var(--coral)}
  .btn{font-family:'Fredoka One',cursive;font-size:26px;padding:16px 48px;border-radius:50px;border:none;cursor:pointer;letter-spacing:1px;transition:transform 0.15s,box-shadow 0.15s;margin-top:8px}
  .btn:active{transform:scale(0.95)}
  .btn-primary{background:linear-gradient(135deg,#ff6b6b,#e04848);color:white;box-shadow:0 4px 24px rgba(255,107,107,0.4)}
  .btn-secondary{background:linear-gradient(135deg,var(--teal),var(--teal-dark));color:white;box-shadow:0 4px 18px rgba(0,196,154,0.3);font-size:20px;padding:12px 32px}
  .crab-emoji{font-size:70px;line-height:1}
  .wave{display:inline-block;animation:wave 1s ease-in-out infinite alternate}
  @keyframes wave{from{transform:rotate(-10deg)}to{transform:rotate(10deg)}}
  #combo-display{position:absolute;top:150px;left:640px;transform:translateX(-50%);z-index:45;pointer-events:none;font-family:'Fredoka One',cursive;font-size:42px;opacity:0;white-space:nowrap}
  #combo-display.show{animation:comboFlash 1.8s ease-out 1.8s forwards}
  @keyframes comboFlash{0%{opacity:1;transform:translateX(-50%) scale(0.5)}10%{opacity:1;transform:translateX(-50%) scale(1.15)}60%{opacity:0.9;transform:translateX(-50%) scale(1.05)}100%{opacity:0;transform:translateX(-50%) scale(1.1) translateY(-12px)}}
</style>
</head>
<body>

<div id="game-world">
  <div id="bg"></div><div id="sun"></div>
  <div class="cloud cloud-1"><span></span></div><div class="cloud cloud-2"><span></span></div><div class="cloud cloud-3"><span></span></div>
  <div id="waterline"></div><div id="sand-floor"></div>
  <div id="crab-mascot">🦀</div>
  <div class="beach-deco" id="deco-shell1">🐚</div><div class="beach-deco" id="deco-shell2">🐚</div>
  <div class="beach-deco" id="deco-star">⭐</div><div class="beach-deco" id="deco-shell3">🪸</div>
  <div class="beach-deco" id="deco-palm">🌴</div>
  <div id="edge-flash"></div>

  <div class="screen" id="start-screen">
    <div class="crab-emoji"><span class="wave">🦀</span></div>
    <div class="screen-title" style="color:var(--ocean-deep)">Verb<span style="color:var(--coral)">Slash!</span></div>
    <div class="screen-sub">Swipe across a balloon to pick a verb, then slash the correct <b>simple past</b> and <b>past participle</b>!</div>
    <button class="btn btn-primary" id="start-btn" onclick="startGame()">Let's Go! 🏖️</button>
    <div style="font-size:14px;color:rgba(0,0,0,0.25);margin-top:2px">Swipe across to slash!</div>
  </div>

  <div class="screen hidden" id="gameover-screen">
    <div class="crab-emoji">😵</div>
    <div class="screen-title" style="color:var(--coral)">Game Over!</div>
    <div id="go-score" class="screen-stat"></div>
    <div id="go-best" class="screen-sub"></div>
    <div id="go-streak" class="screen-sub" style="color:var(--ocean-deep);font-weight:700"></div>
    <button class="btn btn-primary" id="restart-btn" onclick="startGame()">Play Again 🦀</button>
    <button class="btn btn-secondary" id="menu-btn" onclick="document.getElementById('gameover-screen').classList.add('hidden');document.getElementById('start-screen').classList.remove('hidden')">Menu</button>
  </div>

  <div id="top-bar">
    <div id="logo">Krab<span>sy</span></div>
    <div id="lives">❤️❤️❤️</div>
    <div id="streak-box"><div id="streak-flame">🔥</div><div id="streak-count"></div></div>
    <div id="score-area"><div id="score">0</div><div id="score-mult"></div></div>
  </div>

  <div id="game-area">
    <svg id="slash-svg"></svg>
    <div id="verb-chain"><div id="verb-chain-inner"></div></div>
    <div id="swipe-tutorial">
      <div class="swipe-text">Swipe across! ✨</div>
      <div class="swipe-line"></div>
      <div class="swipe-hand">👆</div>
    </div>
  </div>

  <div id="combo-display"></div>
</div>

<script>
// ═══════════════════════════════════════════════════
//  FIXED GAME WORLD — 1280×720, scaled to fit
// ═══════════════════════════════════════════════════
const GW=1280,GH=720;
const gameWorld=document.getElementById('game-world');

function resizeWorld(){
  const vw=window.innerWidth,vh=window.innerHeight;
  const scale=Math.min(vw/GW,vh/GH);
  const left=(vw-GW*scale)/2;
  const top=(vh-GH*scale)/2;
  gameWorld.style.transform=`translate(${left}px,${top}px) scale(${scale})`;
  // Store scale for input coordinate conversion
  gameWorld._scale=scale;
  gameWorld._left=left;
  gameWorld._top=top;
}
resizeWorld();
window.addEventListener('resize',resizeWorld);

// ═══════════════════════════════════════════════════
//  VERBS
// ═══════════════════════════════════════════════════
const VERBS=[
  {verb:"go",past:"went",pp:"gone",pw:["goed","wented","goeded"],ppw:["goned","wented","goden"]},
  {verb:"run",past:"ran",pp:"run",pw:["runned","ranned","runed"],ppw:["runned","ranned","runed"]},
  {verb:"eat",past:"ate",pp:"eaten",pw:["eated","ated","eatted"],ppw:["eated","aten","ated"]},
  {verb:"swim",past:"swam",pp:"swum",pw:["swimmed","swimd","swammed"],ppw:["swimmed","swammed","swimd"]},
  {verb:"fly",past:"flew",pp:"flown",pw:["flied","flyed","flewed"],ppw:["flied","flyed","flewed"]},
  {verb:"see",past:"saw",pp:"seen",pw:["seed","sawed","seeed"],ppw:["seed","sawed","seened"]},
  {verb:"write",past:"wrote",pp:"written",pw:["writed","wroted","writeed"],ppw:["writed","wroten","writeed"]},
  {verb:"sing",past:"sang",pp:"sung",pw:["singed","sanged","singged"],ppw:["singed","sanged","singged"]},
  {verb:"drive",past:"drove",pp:"driven",pw:["drived","droved","driveed"],ppw:["drived","droved","driveen"]},
  {verb:"break",past:"broke",pp:"broken",pw:["breaked","broked","breakd"],ppw:["breaked","broked","breakd"]},
  {verb:"take",past:"took",pp:"taken",pw:["taked","tooked","takeed"],ppw:["taked","tooked","takeed"]},
  {verb:"give",past:"gave",pp:"given",pw:["gived","giveed","gaved"],ppw:["gived","giveed","gaved"]},
  {verb:"know",past:"knew",pp:"known",pw:["knowed","knewed","knowd"],ppw:["knowed","knewed","knowd"]},
  {verb:"come",past:"came",pp:"come",pw:["comed","camed","comeed"],ppw:["comed","camed","comen"]},
  {verb:"think",past:"thought",pp:"thought",pw:["thinked","thinkd","thinkted"],ppw:["thinked","thinkd","thinkted"]},
  {verb:"buy",past:"bought",pp:"bought",pw:["buyed","buyd","buyted"],ppw:["buyed","buyd","buyted"]},
  {verb:"make",past:"made",pp:"made",pw:["maked","maded","makeed"],ppw:["maked","maded","makeed"]},
  {verb:"find",past:"found",pp:"found",pw:["finded","findeed","findd"],ppw:["finded","findeed","findd"]},
  {verb:"tell",past:"told",pp:"told",pw:["telled","telld","telleed"],ppw:["telled","telld","telleed"]},
  {verb:"drink",past:"drank",pp:"drunk",pw:["drinked","drinkd","dranked"],ppw:["drinked","dranked","drunkd"]},
  {verb:"begin",past:"began",pp:"begun",pw:["beginned","begined","beganned"],ppw:["beginned","begined","begonned"]},
  {verb:"speak",past:"spoke",pp:"spoken",pw:["speaked","spoked","speakd"],ppw:["speaked","spoked","speakened"]},
  {verb:"fall",past:"fell",pp:"fallen",pw:["falled","felled","falld"],ppw:["falled","felled","falld"]},
  {verb:"grow",past:"grew",pp:"grown",pw:["growed","grewed","growd"],ppw:["growed","grewed","growd"]},

function fillQ(){
  let av=VERBS.filter((_,i)=>!S.usedVerbSet.has(i)&&!S.verbQueue.includes(VERBS[i]));
  for(let i=av.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[av[i],av[j]]=[av[j],av[i]]}
  S.verbQueue.push(...av);
  if(!S.verbQueue.length){S.usedVerbSet.clear();fillQ()}
}
function getPickVerbs(n){
  if(S.verbQueue.length<n)fillQ();
  return S.verbQueue.splice(0,Math.min(n,S.verbQueue.length));
}

function launchBalls(labels,correctLabel,extraClass){
  document.querySelectorAll('.verb-fruit').forEach(e=>e.remove());
  S.fruits=[];
  const answers=[...labels];
  for(let i=answers.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[answers[i],answers[j]]=[answers[j],answers[i]]}
  const count=answers.length;

  let pattern;
  if(count<=1){
    pattern={name:'1-solo',spawns:[0.4+Math.random()*0.2],apexes:[{x:0.3+Math.random()*0.4,vy:0}]};
  } else if(count===2){
    pattern=PATTERNS_2[patternIdx2%PATTERNS_2.length];patternIdx2++;
  } else {
    pattern=PATTERNS_3[patternIdx3%PATTERNS_3.length];patternIdx3++;
  }
  patternLabel.textContent=pattern.name;

  const baseVy=LAUNCH_VY_MIN+Math.random()*(LAUNCH_VY_MAX-LAUNCH_VY_MIN);
  const minVy=-Math.sqrt(2*GRAVITY*GH*0.70);

  let wrongIdx=0;
  answers.forEach((ans,i)=>{
    const isCorrect=ans===correctLabel;
    const el=document.createElement('div');
    let colorClass;
    if(isCorrect) colorClass='fruit-correct';
    else {colorClass=wrongIdx===0?'fruit-wrong':'fruit-wrong-alt';wrongIdx++;}
    el.className=`verb-fruit ${colorClass}`;
    if(extraClass) el.classList.add(extraClass);
    el.style.width=FRUIT_SIZE+'px';el.style.height=FRUIT_SIZE+'px';
    const body=document.createElement('div');body.className='fruit-body';
    const txt=document.createElement('div');txt.className='fruit-text';
    txt.textContent=ans;txt.style.fontSize=fontSz(ans);
    body.appendChild(txt);el.appendChild(body);gameArea.appendChild(el);

    const p=pattern.apexes[i]||pattern.apexes[0];
    const sx=Math.max(10,Math.min(GW-FRUIT_SIZE-10, pattern.spawns[i]*GW-FRUIT_SIZE/2));
    const apexX=Math.max(FRUIT_SIZE/2,Math.min(GW-FRUIT_SIZE/2, p.x*GW));
    const ballVy=Math.min(baseVy+(p.vy||0), minVy);
    const tApex=Math.abs(ballVy)/GRAVITY;
    const vx=(apexX-sx-FRUIT_SIZE/2)/tApex;

    el.style.left=sx+'px';el.style.top=(GH+FRUIT_SIZE)+'px';
    S.fruits.push({el,ans,x:sx,y:GH+FRUIT_SIZE,vx,vy:ballVy,rot:0,rotSpeed:(Math.random()-0.5)*0.4,
      isCorrect,alive:true,slashed:false,hasBeenOnScreen:false,launchDelay:0,launched:true});
  });
}

// ═══════════════════════════════════════════════════
//  INPUT — SLASH ONLY, coordinates converted from screen to game world
// ═══════════════════════════════════════════════════
function getPos(e){
  const src=e.touches?e.touches[0]:e;
  const scale=gameWorld._scale||1;
  const left=gameWorld._left||0;
  const top=gameWorld._top||0;
  // Convert screen coordinates to game world coordinates
  const rect=gameWorld.getBoundingClientRect();
  return{x:(src.clientX-rect.left)/scale, y:(src.clientY-rect.top)/scale};
}

function slashDist(){
  let d=0;
  for(let i=1;i<S.slashPoints.length;i++){
    const dx=S.slashPoints[i].x-S.slashPoints[i-1].x;
    const dy=S.slashPoints[i].y-S.slashPoints[i-1].y;
    d+=Math.sqrt(dx*dx+dy*dy);
  }
  return d;
}

function slashHitsCircle(pts,cx,cy,r){
  if(pts.length<2)return false;
  for(let i=0;i<pts.length-1;i++){
    const p1=pts[i],p2=pts[i+1],dx=p2.x-p1.x,dy=p2.y-p1.y,l=dx*dx+dy*dy;
    if(!l)continue;let t=((cx-p1.x)*dx+(cy-p1.y)*dy)/l;t=Math.max(0,Math.min(1,t));
    const nx=p1.x+t*dx-cx,ny=p1.y+t*dy-cy;
    if(nx*nx+ny*ny<=r*r)return true;
  }
  return false;
}

function onStart(e){e.preventDefault();if(!S.running)return;const p=getPos(e);S.isSlashing=true;S.slashPoints=[p];clearTimeout(S.slashTimeout);updSvg()}
function onMove(e){e.preventDefault();if(!S.running||!S.isSlashing)return;const p=getPos(e);S.slashPoints.push(p);if(S.slashPoints.length>30)S.slashPoints.shift();updSvg();if(slashDist()>=MIN_SLASH_DIST)checkSlash()}
function onEnd(e){e.preventDefault();if(!S.running)return;S.isSlashing=false;S.slashTimeout=setTimeout(()=>{S.slashPoints=[];updSvg()},180)}
function updSvg(){const p=S.slashPoints;if(p.length<2){slashSvg.innerHTML='';return}const d=p.map((pt,i)=>`${i===0?'M':'L'}${pt.x},${pt.y}`).join(' ');slashSvg.innerHTML=`<defs><linearGradient id="sg" x1="0%" y1="0%" x2="100%" y2="0%"><stop offset="0%" style="stop-color:rgba(255,255,255,0)"/><stop offset="100%" style="stop-color:rgba(255,255,255,0.8)"/></linearGradient><filter id="glow"><feGaussianBlur stdDeviation="3" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter></defs><path d="${d}" stroke="rgba(255,255,255,0.15)" stroke-width="14" fill="none" stroke-linecap="round"/><path d="${d}" stroke="url(#sg)" stroke-width="3" fill="none" stroke-linecap="round" filter="url(#glow)"/>`}

function checkSlash(){
  S.balloons.forEach(b=>{if(!b.alive)return;if(slashHitsCircle(S.slashPoints,b.x+60,b.y+72,65)){b.alive=false;handleBalloonPop(b)}});
  S.fruits.forEach(f=>{if(!f.alive||f.slashed)return;if(slashHitsCircle(S.slashPoints,f.x+FRUIT_SIZE/2,f.y+FRUIT_SIZE/2,FRUIT_SIZE/2+8)){f.slashed=true;f.alive=false;handleHit(f)}});
}

// ═══════════════════════════════════════════════════
//  BALLOON POP
// ═══════════════════════════════════════════════════
function handleBalloonPop(b){
  const cx=b.x+60,cy=b.y+72;
  spawnParticles(cx,cy,true);spawnFlash(cx,cy,true);
  b.el.classList.add('balloon-pop');setTimeout(()=>b.el.remove(),300);
  S.balloons.forEach(ob=>{if(ob.alive){ob.alive=false;ob.el.style.transition='opacity 0.3s';ob.el.style.opacity='0';setTimeout(()=>ob.el.remove(),300)}});
  S.chosenVerb=b.verb;
  const unchosen=S.pickVerbs.filter(v=>v!==b.verb);
  S.verbQueue.unshift(...unchosen);
  swipeTutorial.classList.remove('visible');S.showingTutorial=false;
  S.phase='past';S.phaseLost=false;
  chainEl.classList.remove('chain-complete');
  updatePrompt();
  const v=b.verb,bc=getBallCount(S.roundNum);
  const answers=[v.past];if(bc>=2)answers.push(v.pw[0]);if(bc>=3)answers.push(v.pw[1]);
  launchBalls(answers,v.past);
}

// ═══════════════════════════════════════════════════
//  BEACHBALL HIT
// ═══════════════════════════════════════════════════
function handleHit(fruit){
  const cx=fruit.x+FRUIT_SIZE/2,cy=fruit.y+FRUIT_SIZE/2;
  if(fruit.isCorrect){
    const mult=getMult();const pts=Math.round((10+S.streak*3)*mult);
    S.score+=pts;S.streak++;if(S.streak>S.maxStreak)S.maxStreak=S.streak;
    updateHUD();spawnParticles(cx,cy,true);spawnFlash(cx,cy,true);
    spawnScorePop(cx,cy,mult>1?`+${pts} x${mult}`:`+${pts}`);
    fruit.el.style.transition='transform 0.25s ease-out,opacity 0.3s ease-out';
    fruit.el.style.transform+=' scale(1.4)';fruit.el.style.opacity='0';
    setTimeout(()=>fruit.el.remove(),300);
    if(S.phase==='past'){
      S.phase='pp';S.phaseLost=false;
      S.fruits.forEach(f=>{if(f.alive){f.alive=false;f.el.style.transition='opacity 0.15s';f.el.style.opacity='0';setTimeout(()=>f.el.remove(),150)}});
      updatePrompt();
      const v=S.chosenVerb,bc=getBallCount(S.roundNum);
      const ans=[v.pp];if(bc>=2)ans.push(v.ppw[0]);if(bc>=3)ans.push(v.ppw[1]);
      launchBalls(ans,v.pp,'phase-pp-ball');
    } else {
      S.fruits.forEach(f=>{if(f.alive){f.alive=false;f.el.style.transition='opacity 0.15s';f.el.style.opacity='0';setTimeout(()=>f.el.remove(),150)}});
      const vi=VERBS.indexOf(S.chosenVerb);if(vi>=0)S.usedVerbSet.add(vi);
      showComplete();if(S.streak>=3)showCombo(S.streak);startPick();
    }
  } else {
    if(!S.phaseLost){loseLife();S.phaseLost=true;}
    spawnParticles(cx,cy,false);spawnFlash(cx,cy,false);
    fruit.el.style.transition='transform 0.3s ease-out,opacity 0.3s ease-out';
    fruit.el.style.transform+=' scale(0.4) rotate(15deg)';fruit.el.style.opacity='0';
    setTimeout(()=>fruit.el.remove(),350);
  }
}

function loseLife(){S.lives--;S.streak=0;updateHUD();edgeFlash.classList.remove('flash');void edgeFlash.offsetWidth;edgeFlash.classList.add('flash');gameArea.classList.remove('shaking');void gameArea.offsetWidth;gameArea.classList.add('shaking');if(S.lives<=0)setTimeout(gameOver,500)}
function fruitMissed(f){if(f.isCorrect&&!S.phaseLost){loseLife();S.phaseLost=true;}f.el.remove()}

function spawnParticles(cx,cy,ok){const cols=ok?['#00e5bb','#43d9a2','#fff','#ffd166','#87ceeb']:['#ff4444','#ff9a9a','#ffaa00','#fff'];for(let i=0;i<14;i++){const p=document.createElement('div');p.className='particle';const s=4+Math.random()*9;const a=Math.random()*Math.PI*2,d=40+Math.random()*80;p.style.cssText=`width:${s}px;height:${s}px;left:${cx-s/2}px;top:${cy-s/2}px;background:${cols[Math.floor(Math.random()*cols.length)]};--dx:${Math.cos(a)*d}px;--dy:${Math.sin(a)*d}px;animation-duration:${0.3+Math.random()*0.3}s`;gameArea.appendChild(p);setTimeout(()=>p.remove(),700)}if(ok)for(let i=0;i<6;i++){const d=document.createElement('div');d.className='juice-drop';const s=5+Math.random()*6;d.style.cssText=`width:${s}px;height:${s}px;left:${cx}px;top:${cy}px;background:#43d9a2;--dx:${(Math.random()-0.5)*70}px;--dy:${35+Math.random()*90}px`;gameArea.appendChild(d);setTimeout(()=>d.remove(),700)}}

function spawnScorePop(cx,cy,t){const p=document.createElement('div');p.className='score-pop';p.textContent=t;p.style.cssText=`left:${cx}px;top:${cy-25}px;color:${S.streak>4?'#ffd166':'#00c49a'};text-shadow:0 2px 4px rgba(0,0,0,0.2)`;gameArea.appendChild(p);setTimeout(()=>p.remove(),700)}
function showCombo(c){comboEl.textContent=`🔥 ${c}x Streak!`;comboEl.style.color=c>=9?'#ffd166':c>=6?'#ff6b6b':'#00c49a';comboEl.style.textShadow='0 3px 10px rgba(0,0,0,0.15)';comboEl.classList.remove('show');void comboEl.offsetWidth;comboEl.classList.add('show')}
function updateHUD(){
  scoreEl.textContent=S.score;
  livesEl.textContent='❤️'.repeat(Math.max(0,S.lives))+'🖤'.repeat(Math.max(0,3-S.lives));
  if(S.streak>=2){streakFlame.classList.add('active');streakCount.textContent=S.streak;const m=getMult();scoreMultEl.textContent=m>1?`x${m}`:'';}
  else{streakFlame.classList.remove('active');streakCount.textContent='';scoreMultEl.textContent=''}
}

// ═══════════════════════════════════════════════════
//  GAME LOOP
// ═══════════════════════════════════════════════════
function gameLoop(){
  if(!S.running)return;S.frame++;

  S.balloons.forEach(b=>{
    if(!b.alive)return;
    if(b.hoverDelay>0){b.hoverDelay--;return}
    if(b.rising){
      const dist=b.y-b.targetY;
      const speed=Math.max(0.08,dist*0.006+0.08);
      b.y-=speed;
      if(dist<2){b.y=b.targetY;b.rising=false;b.hovering=true;b.el.classList.add('balloon-hover')}
      b.el.style.top=b.y+'px';
    }
  });

  if(S.showingTutorial&&S.balloons.length>0){
    const b=S.balloons[0];
    const riseProgress=1-(b.y-b.targetY)/(GH+160-b.targetY);
    if(riseProgress>0.4&&!swipeTutorial.classList.contains('visible')){
      swipeTutorial.style.left=(b.x-20)+'px';
      swipeTutorial.style.top=(b.targetY+60)+'px';
      swipeTutorial.style.width='180px';
      swipeTutorial.classList.add('visible');
    }
  }

  let anyFruitAlive=false;
  S.fruits.forEach(f=>{
    if(!f.alive)return;
    if(!f.launched){f.launchDelay--;if(f.launchDelay<=0)f.launched=true;else{anyFruitAlive=true;return}}
    anyFruitAlive=true;
    f.vy+=GRAVITY;f.x+=f.vx;f.y+=f.vy;
    f.rot+=f.rotSpeed;
    if(f.rot>MAX_ROT){f.rot=MAX_ROT;f.rotSpeed*=-0.5}
    if(f.rot<-MAX_ROT){f.rot=-MAX_ROT;f.rotSpeed*=-0.5}
    if(f.x<0){f.x=0;f.vx=Math.abs(f.vx)*0.3}
    if(f.x>GW-FRUIT_SIZE){f.x=GW-FRUIT_SIZE;f.vx=-Math.abs(f.vx)*0.3}
    if(f.y<0){f.y=0;f.vy=Math.abs(f.vy)*0.3}
    if(f.y<GH-10)f.hasBeenOnScreen=true;
    f.el.style.left=f.x+'px';f.el.style.top=f.y+'px';f.el.style.transform=`rotate(${f.rot}deg)`;
    if(f.hasBeenOnScreen&&f.y>GH+FRUIT_SIZE+20){f.alive=false;fruitMissed(f)}
  });

  if(!S.waitingForNext&&S.phase!=='pick'&&S.fruits.length>0&&!anyFruitAlive){
    S.waitingForNext=true;
    if(S.phaseLost&&S.chosenVerb)S.verbQueue.unshift(S.chosenVerb);
    setTimeout(()=>{S.waitingForNext=false;if(S.running)startPick()},600);
  }

  S.animId=requestAnimationFrame(gameLoop);
}

// ═══════════════════════════════════════════════════
//  ROUND FLOW
// ═══════════════════════════════════════════════════
function startPick(){
  if(!S.running)return;
  S.roundNum++;S.phase='pick';S.chosenVerb=null;
  S.pickVerbs=getPickVerbs(getBalloonCount());
  updatePrompt();
  if(S.roundNum===1){S.showingTutorial=true;}
  spawnBalloons(S.pickVerbs);
}

function startGame(){
  S.score=0;S.lives=3;S.streak=0;S.maxStreak=0;S.frame=0;S.roundNum=0;
  S.running=true;S.usedVerbSet=new Set();S.verbQueue=[];S.pickVerbs=[];
  S.fruits=[];S.balloons=[];S.slashPoints=[];S.waitingForNext=false;S.showingTutorial=false;S.phaseLost=false;
  S.phase='pick';S.chosenVerb=null;
  patternIdx2=0;patternIdx3=0;
  fillQ();
  swipeTutorial.classList.remove('visible');startScreen.classList.add('hidden');goScreen.classList.add('hidden');
  chainEl.innerHTML='';updateHUD();startPick();gameLoop();
}

function gameOver(){
  S.running=false;cancelAnimationFrame(S.animId);
  if(S.score>S.bestScore){S.bestScore=S.score;localStorage.setItem('krabsy_vs_best',S.bestScore)}
  document.querySelectorAll('.verb-fruit,.balloon').forEach(e=>e.remove());
  $('go-score').textContent=`Score: ${S.score}`;
  $('go-best').textContent=`Best: ${S.bestScore}`;
  $('go-streak').textContent=S.maxStreak>0?`Best streak: ${S.maxStreak} 🔥`:'';
  goScreen.classList.remove('hidden');
}

// ═══════════════════════════════════════════════════
//  EVENT LISTENERS
// ═══════════════════════════════════════════════════
$('start-btn').addEventListener('click',startGame);
$('restart-btn').addEventListener('click',startGame);
$('menu-btn').addEventListener('click',()=>{goScreen.classList.add('hidden');startScreen.classList.remove('hidden')});

gameArea.addEventListener('touchstart',onStart,{passive:false});
gameArea.addEventListener('touchmove',onMove,{passive:false});
gameArea.addEventListener('touchend',onEnd,{passive:false});
document.addEventListener('touchmove',e=>{if(S.running)e.preventDefault()},{passive:false});

gameArea.addEventListener('mousedown',onStart);
gameArea.addEventListener('mousemove',e=>{if(e.buttons===1)onMove(e)});
gameArea.addEventListener('mouseup',onEnd);
</script>
