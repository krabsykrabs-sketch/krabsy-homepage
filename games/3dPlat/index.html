<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Krabsy 3D Platformer</title>

  <style>
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      overflow: hidden;
      background: #87ceeb;
      font-family: system-ui, -apple-system, "Segoe UI", sans-serif;
      color: #fff;
      user-select: none;
      -webkit-user-select: none;
    }

    #game {
      display: block;
      width: 100vw;
      height: calc(100vh - 48px);
      margin-top: 48px;
      touch-action: none;
    }

    /* ---------- In-game HUD ---------- */
    #hud {
      position: fixed;
      top: 60px;
      left: 12px;
      right: 12px;
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      pointer-events: none;
      z-index: 4;
    }
    #hud[hidden] { display: none; }

    #level-info {
      font-size: 22px;
      font-weight: 700;
      text-shadow: 0 1px 3px rgba(0, 0, 0, 0.6);
      pointer-events: none;
    }

    #menu-btn {
      pointer-events: auto;
      font-size: 15px;
      font-weight: 600;
      padding: 8px 16px;
      border: none;
      border-radius: 6px;
      background: rgba(0, 0, 0, 0.55);
      color: #fff;
      cursor: pointer;
      backdrop-filter: blur(4px);
    }
    #menu-btn:hover { background: rgba(0, 0, 0, 0.75); }

    /* ---------- Progress bar ---------- */
    #progress {
      position: fixed;
      bottom: 22px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 4;
      text-align: center;
      pointer-events: none;
      font-weight: 600;
      color: #fff;
      text-shadow: 0 1px 2px rgba(0, 0, 0, 0.6);
    }
    #progress[hidden] { display: none; }
    #progress-text {
      font-size: 14px;
      margin-bottom: 5px;
      letter-spacing: 0.3px;
    }
    #progress-bar {
      width: 220px;
      height: 6px;
      background: rgba(0, 0, 0, 0.35);
      border-radius: 3px;
      overflow: hidden;
      border: 1px solid rgba(255, 255, 255, 0.2);
    }
    #progress-fill {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, #4eb3ff, #2bbf5f);
      transition: width 0.35s ease-out;
    }

    /* ---------- HUD question (style 5 of the Q/A test level) ---------- */
    #hud-question {
      position: fixed;
      bottom: 70px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(0, 0, 0, 0.7);
      padding: 10px 22px;
      border-radius: 10px;
      font-size: 22px;
      font-weight: 700;
      letter-spacing: 0.4px;
      text-shadow: 0 1px 2px rgba(0, 0, 0, 0.5);
      pointer-events: none;
      z-index: 5;
      box-shadow: 0 4px 14px rgba(0, 0, 0, 0.35);
    }
    #hud-question[hidden] { display: none; }

    /* ---------- Answer reveal (after wrong answer) ---------- */
    #answer-reveal {
      position: fixed;
      top: 28%;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(0, 0, 0, 0.82);
      padding: 22px 38px;
      border-radius: 14px;
      font-size: 44px;
      font-weight: 700;
      text-align: center;
      z-index: 11;
      pointer-events: none;
      opacity: 1;
      transition: opacity 0.55s ease-out;
      white-space: nowrap;
      box-shadow: 0 8px 28px rgba(0, 0, 0, 0.4);
    }
    #answer-reveal[hidden] { display: none; }
    #reveal-prompt  { color: #fff; }
    #reveal-correct { color: #41d775; margin-left: 4px; }

    /* ---------- Death flash ---------- */
    #death-flash {
      position: fixed;
      inset: 0;
      background: #ff2030;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.4s ease-out;
      z-index: 8;
    }

    /* ---------- Level complete overlay ---------- */
    #level-complete {
      position: fixed;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: rgba(0, 0, 0, 0.55);
      text-align: center;
      z-index: 9;
    }
    #level-complete[hidden] { display: none; }
    #level-complete h1 { font-size: 64px; margin: 0 0 12px; }
    #level-complete p { font-size: 22px; margin: 0; opacity: 0.9; }

    /* ---------- Touch controls ---------- */
    #touch-joystick {
      position: fixed;
      left: 24px;
      bottom: 24px;
      width: 140px;
      height: 140px;
      z-index: 5;
    }
    #touch-jump {
      position: fixed;
      right: 32px;
      bottom: 56px;
      width: 96px;
      height: 96px;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.25);
      border: 2px solid rgba(255, 255, 255, 0.7);
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      font-size: 18px;
      z-index: 5;
      touch-action: none;
    }
    #touch-jump[hidden], #touch-joystick[hidden] { display: none; }

    /* ---------- Level select menu ---------- */
    #menu {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(180deg, #87ceeb 0%, #f9c89b 100%);
      z-index: 10;
    }
    #menu[hidden] { display: none; }

    .menu-card {
      background: rgba(255, 255, 255, 0.92);
      color: #1f2c3a;
      padding: 36px 44px;
      border-radius: 16px;
      box-shadow: 0 12px 36px rgba(0, 0, 0, 0.25);
      text-align: center;
      min-width: 360px;
      max-width: 460px;
    }
    .menu-card h1 {
      margin: 0 0 4px;
      font-size: 40px;
      color: #ff7a3a;
      letter-spacing: -0.5px;
    }
    .menu-card .subtitle {
      margin: 0 0 24px;
      font-size: 16px;
      color: #5a6573;
    }
    .menu-card .hint {
      margin: 24px 0 0;
      font-size: 12px;
      color: #7a8593;
    }

    #menu-list {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .level-btn {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 16px 20px;
      font-size: 18px;
      font-weight: 600;
      border: 2px solid #f1d5b8;
      border-radius: 10px;
      background: #fff;
      color: #1f2c3a;
      cursor: pointer;
      text-align: left;
      transition: transform 0.08s ease, background 0.15s ease, border-color 0.15s ease;
    }
    .level-btn:hover {
      background: #fff5ed;
      border-color: #ff7a3a;
      transform: translateY(-1px);
    }
    .level-btn:active { transform: translateY(1px); }
    .level-btn .num   { color: #ff7a3a; font-weight: 800; min-width: 26px; }
    .level-btn .title { flex: 1; }
    .level-btn .tick  { color: #2bbf5f; font-weight: 800; }
  </style>

  <script type="importmap">
  {
    "imports": {
      "three": "https://unpkg.com/three@0.169.0/build/three.module.js",
      "three/addons/": "https://unpkg.com/three@0.169.0/examples/jsm/",
      "@dimforge/rapier3d-compat": "https://unpkg.com/@dimforge/rapier3d-compat@0.19.3/rapier.mjs",
      "nipplejs": "https://unpkg.com/nipplejs@1.0.1/dist/index.mjs"
    }
  }
  </script>
</head>
<body>
  <canvas id="game"></canvas>

  <!-- In-game HUD -->
  <div id="hud" hidden>
    <div id="level-info">Level —</div>
    <button id="menu-btn">Menu</button>
  </div>

  <!-- Bottom-center progress -->
  <div id="progress" hidden>
    <div id="progress-text">Gate 1 / 5</div>
    <div id="progress-bar"><div id="progress-fill"></div></div>
  </div>

  <!-- Persistent HUD question (style 5 of the Q/A test level) -->
  <div id="hud-question" hidden></div>

  <!-- Wrong-answer reveal overlay -->
  <div id="answer-reveal" hidden>
    <span id="reveal-prompt"></span><span id="reveal-correct"></span>
  </div>

  <!-- Touch controls (tablet only) -->
  <div id="touch-jump" hidden>JUMP</div>
  <div id="touch-joystick" hidden></div>

  <!-- Death flash overlay -->
  <div id="death-flash" hidden></div>

  <!-- Level complete overlay -->
  <div id="level-complete" hidden>
    <h1>Level Complete!</h1>
    <p>Returning to menu…</p>
  </div>

  <!-- Level select menu (initial screen) -->
  <div id="menu" hidden>
    <div class="menu-card">
      <h1>Krabsy 3D</h1>
      <p class="subtitle">Pick a Level</p>
      <div id="menu-list"></div>
      <p class="hint">Click canvas to capture mouse · WASD to move · Space to jump · Esc to release</p>
    </div>
  </div>

  <script type="module">
  // =====================================================================================
  // Krabsy 3D Platformer — standalone bundle (build v5.0-three-levels)
  // All local modules concatenated into one ES module. CDN libraries via the importmap above.
  // Asset paths are relative; upload the ./assets/ directory alongside this HTML.
  // =====================================================================================

  import * as THREE from 'three';
  import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
  import RAPIER from '@dimforge/rapier3d-compat';
  import nipplejs from 'nipplejs';

  // ============================== data/questions.js ==============================
  const QUESTIONS = [
    { verb: 'go',    correct: 'went',    wrong: ['goed',     'wented']  },
    { verb: 'run',   correct: 'ran',     wrong: ['runned',   'ranned']  },
    { verb: 'eat',   correct: 'ate',     wrong: ['eated',    'eaten']   },
    { verb: 'swim',  correct: 'swam',    wrong: ['swimmed',  'swum']    },
    { verb: 'fly',   correct: 'flew',    wrong: ['flied',    'flown']   },
    { verb: 'see',   correct: 'saw',     wrong: ['seed',     'seen']    },
    { verb: 'write', correct: 'wrote',   wrong: ['writed',   'written'] },
    { verb: 'sing',  correct: 'sang',    wrong: ['singed',   'sung']    },
    { verb: 'drive', correct: 'drove',   wrong: ['drived',   'driven']  },
    { verb: 'break', correct: 'broke',   wrong: ['breaked',  'broken']  },
    { verb: 'take',  correct: 'took',    wrong: ['taked',    'taken']   },
    { verb: 'give',  correct: 'gave',    wrong: ['gived',    'given']   },
    { verb: 'know',  correct: 'knew',    wrong: ['knowed',   'known']   },
    { verb: 'come',  correct: 'came',    wrong: ['comed',    'come']    },
    { verb: 'think', correct: 'thought', wrong: ['thinked',  'thunk']   },
  ];

  function formatPrompt(verb) {
    return `${verb} → ___`;
  }

  function getQuestion(verb) {
    const q = QUESTIONS.find(q => q.verb === verb);
    if (!q) throw new Error(`No question for verb "${verb}"`);
    return { verb: q.verb, correct: q.correct, wrong: shuffle([...q.wrong]) };
  }

  function buildQuestionQueue(verbPool, gateCount, repeatsAllowed = 1) {
    const available = QUESTIONS.filter(q => verbPool.includes(q.verb));
    if (available.length === 0) throw new Error('no questions match verb pool');
    if (available.length * repeatsAllowed < gateCount) {
      throw new Error(`not enough questions: ${available.length} verbs × ${repeatsAllowed} repeats < ${gateCount} gates`);
    }
    const counts = new Map(available.map(q => [q.verb, 0]));
    const queue = [];
    for (let i = 0; i < gateCount; i++) {
      const minCount = Math.min(...counts.values());
      const candidates = available.filter(q => counts.get(q.verb) === minCount);
      const pick = candidates[Math.floor(Math.random() * candidates.length)];
      counts.set(pick.verb, counts.get(pick.verb) + 1);
      queue.push({
        verb: pick.verb,
        correct: pick.correct,
        wrong: shuffle([...pick.wrong]),
      });
    }
    return queue;
  }

  function shuffle(arr) {
    for (let i = arr.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [arr[i], arr[j]] = [arr[j], arr[i]];
    }
    return arr;
  }

  // ============================== physics.js ==============================
  let _rapierReady = false;
  async function initPhysics() {
    if (!_rapierReady) {
      await RAPIER.init();
      _rapierReady = true;
    }
    const gravity = { x: 0, y: -25, z: 0 };
    const world = new RAPIER.World(gravity);
    return { RAPIER, world };
  }

  function addStaticBox(world, RAPIER, center, halfExtents) {
    const bodyDesc = RAPIER.RigidBodyDesc.fixed().setTranslation(center.x, center.y, center.z);
    const body = world.createRigidBody(bodyDesc);
    const colDesc = RAPIER.ColliderDesc.cuboid(halfExtents.x, halfExtents.y, halfExtents.z);
    const collider = world.createCollider(colDesc, body);
    return { body, collider };
  }

  function addKinematicBox(world, RAPIER, center, halfExtents) {
    const bodyDesc = RAPIER.RigidBodyDesc.kinematicPositionBased().setTranslation(center.x, center.y, center.z);
    const body = world.createRigidBody(bodyDesc);
    const colDesc = RAPIER.ColliderDesc.cuboid(halfExtents.x, halfExtents.y, halfExtents.z);
    const collider = world.createCollider(colDesc, body);
    return { body, collider };
  }

  // ============================== assets.js ==============================
  const _gltfLoader = new GLTFLoader();
  const _texLoader = new THREE.TextureLoader();
  const _modelCache = new Map();
  const _texCache = new Map();

  function _loadOnce(url) {
    if (!_modelCache.has(url)) {
      _modelCache.set(url, new Promise((resolve, reject) => {
        _gltfLoader.load(url, resolve, undefined, reject);
      }));
    }
    return _modelCache.get(url);
  }

  async function loadModel(url) {
    const gltf = await _loadOnce(url);
    const scene = gltf.scene.clone(true);
    scene.traverse(o => {
      if (o.isMesh) {
        o.castShadow = false;
        o.receiveShadow = false;
      }
    });
    return scene;
  }

  async function preload(urls) {
    await Promise.all(urls.map(_loadOnce));
  }

  function loadTexture(url, { colorSpace = THREE.SRGBColorSpace, mapping } = {}) {
    if (_texCache.has(url)) return _texCache.get(url);
    const tex = _texLoader.load(url);
    tex.colorSpace = colorSpace;
    if (mapping) tex.mapping = mapping;
    _texCache.set(url, tex);
    return tex;
  }

  function loadAudio(url, { volume = 1, loop = false } = {}) {
    const a = new Audio(url);
    a.volume = volume;
    a.loop = loop;
    return a;
  }

  function playSfx(audio) {
    const clone = audio.cloneNode();
    clone.volume = audio.volume;
    clone.play().catch(() => {});
  }

  // ============================== controls.js ==============================
  function createControls(canvas) {
    const input = {
      move: { x: 0, y: 0 },
      lookDelta: { x: 0, y: 0 },
      jumpPressed: false,
      pointerLocked: false,
      isTouch: false,
    };

    const keys = new Set();
    const SCROLL_CODES = new Set(['Space', 'ArrowUp', 'ArrowDown', 'ArrowLeft', 'ArrowRight', 'PageUp', 'PageDown', 'Home', 'End']);
    window.addEventListener('keydown', e => {
      if (SCROLL_CODES.has(e.code)) e.preventDefault();
      if (e.repeat) return;
      keys.add(e.code);
      if (e.code === 'Space') input.jumpPressed = true;
    }, { passive: false });
    window.addEventListener('keyup', e => {
      if (SCROLL_CODES.has(e.code)) e.preventDefault();
      keys.delete(e.code);
    }, { passive: false });

    function readKeyboard() {
      let x = 0, y = 0;
      if (keys.has('KeyW') || keys.has('ArrowUp')) y -= 1;
      if (keys.has('KeyS') || keys.has('ArrowDown')) y += 1;
      if (keys.has('KeyA') || keys.has('ArrowLeft')) x -= 1;
      if (keys.has('KeyD') || keys.has('ArrowRight')) x += 1;
      return { x, y };
    }

    canvas.addEventListener('click', () => {
      if (!input.pointerLocked && !input.isTouch) canvas.requestPointerLock();
    });
    document.addEventListener('pointerlockchange', () => {
      input.pointerLocked = document.pointerLockElement === canvas;
    });
    window.addEventListener('mousemove', e => {
      if (!input.pointerLocked) return;
      input.lookDelta.x += e.movementX;
      input.lookDelta.y += e.movementY;
    });

    const isTouchDevice = 'ontouchstart' in window && window.innerWidth >= 768;
    let touchAxes = { x: 0, y: 0 };

    if (isTouchDevice) {
      input.isTouch = true;
      const stickEl = document.getElementById('touch-joystick');
      const jumpEl = document.getElementById('touch-jump');
      stickEl.hidden = false;
      jumpEl.hidden = false;
      const hintEl = document.querySelector('.menu-card .hint');
      if (hintEl) hintEl.hidden = true;

      const stick = nipplejs.create({
        zone: stickEl,
        mode: 'static',
        position: { left: '50%', bottom: '50%' },
        color: 'white',
        size: 120,
      });
      stick.on('move', (_, data) => {
        const r = Math.min(data.distance / 60, 1);
        touchAxes.x = Math.cos(data.angle.radian) * r;
        touchAxes.y = -Math.sin(data.angle.radian) * r;
      });
      stick.on('end', () => { touchAxes.x = 0; touchAxes.y = 0; });

      jumpEl.addEventListener('touchstart', e => {
        e.preventDefault();
        input.jumpPressed = true;
      }, { passive: false });
    }

    input.update = () => {
      if (input.isTouch) {
        input.move.x = touchAxes.x;
        input.move.y = touchAxes.y;
      } else {
        const k = readKeyboard();
        input.move.x = k.x;
        input.move.y = k.y;
      }
    };

    input.consumeJump = () => {
      const j = input.jumpPressed;
      input.jumpPressed = false;
      return j;
    };

    input.consumeLook = () => {
      const d = { x: input.lookDelta.x, y: input.lookDelta.y };
      input.lookDelta.x = 0;
      input.lookDelta.y = 0;
      return d;
    };

    return input;
  }

  // ============================== camera.js ==============================
  function createFollowCamera(camera) {
    const state = {
      yaw: 0,
      pitch: 0.5,
      distance: 7,
      height: 1.2,
      sensitivity: 0.0025,
      pitchMin: -0.4,
      pitchMax: 1.2,
      smoothPos: 0.18,
    };

    const tmpTarget = new THREE.Vector3();
    const tmpDesired = new THREE.Vector3();

    function applyLook(deltaX, deltaY) {
      state.yaw -= deltaX * state.sensitivity;
      state.pitch += deltaY * state.sensitivity;
      state.pitch = Math.max(state.pitchMin, Math.min(state.pitchMax, state.pitch));
    }

    function update(targetPos) {
      tmpTarget.set(targetPos.x, targetPos.y + state.height, targetPos.z);
      const cx = Math.cos(state.pitch) * state.distance;
      const cy = Math.sin(state.pitch) * state.distance;
      tmpDesired.set(
        tmpTarget.x + Math.sin(state.yaw) * cx,
        tmpTarget.y + cy,
        tmpTarget.z + Math.cos(state.yaw) * cx,
      );
      camera.position.lerp(tmpDesired, state.smoothPos);
      camera.lookAt(tmpTarget);
    }

    function getForwardXZ(out) {
      out.set(-Math.sin(state.yaw), 0, -Math.cos(state.yaw));
      return out;
    }

    return { state, applyLook, update, getForwardXZ };
  }

  // ============================== particles.js ==============================
  const DUST_URL  = './assets/models/dust.glb';
  const BRICK_URL = './assets/models/brick-particle.glb';
  let _dustTpl = null;
  let _brickTpl = null;

  async function preloadParticles() {
    _dustTpl  = await loadModel(DUST_URL);
    _brickTpl = await loadModel(BRICK_URL);
  }

  const _PARTICLE_GRAVITY = 14;
  const _PARTICLE_TTL = 1.0;

  class ParticleSystem {
    constructor(scene) {
      this.scene = scene;
      this.list = [];
    }

    spawnPuff(pos, count = 5) {
      if (!_dustTpl || !_brickTpl) return;
      for (let i = 0; i < count; i++) {
        const useBrick = Math.random() < 0.5;
        const mesh = (useBrick ? _brickTpl : _dustTpl).clone(true);
        mesh.position.set(pos.x, pos.y + 0.2, pos.z);
        mesh.scale.setScalar(0.6 + Math.random() * 0.5);
        const angle = Math.random() * Math.PI * 2;
        const speed = 1.5 + Math.random() * 2.5;
        const vel = new THREE.Vector3(
          Math.cos(angle) * speed,
          2.0 + Math.random() * 2.0,
          Math.sin(angle) * speed,
        );
        const spin = new THREE.Vector3(
          (Math.random() - 0.5) * 8,
          (Math.random() - 0.5) * 8,
          (Math.random() - 0.5) * 8,
        );
        this.scene.add(mesh);
        this.list.push({ mesh, vel, spin, life: _PARTICLE_TTL });
      }
    }

    update(dt) {
      const remaining = [];
      for (const p of this.list) {
        p.mesh.position.x += p.vel.x * dt;
        p.mesh.position.y += p.vel.y * dt;
        p.mesh.position.z += p.vel.z * dt;
        p.vel.y -= _PARTICLE_GRAVITY * dt;
        p.mesh.rotation.x += p.spin.x * dt;
        p.mesh.rotation.y += p.spin.y * dt;
        p.mesh.rotation.z += p.spin.z * dt;
        p.life -= dt;
        if (p.life > 0) remaining.push(p);
        else this.scene.remove(p.mesh);
      }
      this.list = remaining;
    }

    clear() {
      for (const p of this.list) this.scene.remove(p.mesh);
      this.list = [];
    }
  }

  // ============================== gates.js ==============================
  const FALLING_DEF = {
    url: './assets/models/platform-falling.glb',
    half: { x: 1.1, y: 0.25, z: 1.1 },
    height: 0.5,
  };

  const LANE_OFFSETS = [
    [-5, 0, 0],
    [ 0, 0, 0],
    [ 5, 0, 0],
  ];

  const BUBBLE_H = 0.6;
  const BUBBLE_MIN_W = 1.0;
  const BUBBLE_Y = 1.2;
  const BUBBLE_TINT = 'rgba(110, 180, 255, 0.85)';
  const BUBBLE_TEXT = '#ffffff';
  const BUBBLE_FONT_PX = 280;
  const BUBBLE_PAD_PX = 110;

  function makeAnswerBubble(text) {
    const group = new THREE.Group();
    const H = 512;
    const font = `bold ${BUBBLE_FONT_PX}px Arial, sans-serif`;

    const measure = document.createElement('canvas').getContext('2d');
    measure.font = font;
    const textW = measure.measureText(text).width;
    const W = Math.max(700, Math.ceil(textW + 2 * BUBBLE_PAD_PX));

    const c = document.createElement('canvas');
    c.width = W; c.height = H;
    const ctx = c.getContext('2d');
    ctx.clearRect(0, 0, W, H);

    const r = 80;
    ctx.fillStyle = BUBBLE_TINT;
    ctx.beginPath();
    ctx.moveTo(r, 0);
    ctx.arcTo(W, 0, W, H, r);
    ctx.arcTo(W, H, 0, H, r);
    ctx.arcTo(0, H, 0, 0, r);
    ctx.arcTo(0, 0, W, 0, r);
    ctx.closePath();
    ctx.fill();

    ctx.fillStyle = BUBBLE_TEXT;
    ctx.font = font;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(text, W / 2, H / 2);

    const tex = new THREE.CanvasTexture(c);
    tex.colorSpace = THREE.SRGBColorSpace;
    tex.minFilter = THREE.LinearFilter;
    tex.magFilter = THREE.LinearFilter;
    tex.generateMipmaps = false;
    tex.needsUpdate = true;

    const planeW = Math.max(BUBBLE_MIN_W, BUBBLE_H * (W / H));
    const geo = new THREE.PlaneGeometry(planeW, BUBBLE_H);
    const mat = new THREE.MeshBasicMaterial({
      map: tex, transparent: true, depthWrite: false, fog: false,
      side: THREE.DoubleSide, opacity: 0.95,
    });
    const sign = new THREE.Mesh(geo, mat);
    sign.position.y = BUBBLE_Y;
    group.add(sign);

    return { group, sign, mats: [mat] };
  }

  async function spawnOption(scene, world, RAPIER, gatePos, optData, { noSignposts = false } = {}) {
    const def = FALLING_DEF;
    const pos = {
      x: gatePos[0] + optData.offset[0],
      y: gatePos[1] + optData.offset[1],
      z: gatePos[2] + optData.offset[2],
    };

    const mesh = await loadModel(def.url);
    mesh.position.set(pos.x, pos.y - def.height, pos.z);
    scene.add(mesh);

    const colliderCenter = { x: pos.x, y: pos.y - def.half.y, z: pos.z };
    const phys = addStaticBox(world, RAPIER, colliderCenter, def.half);

    let post = null;
    if (!noSignposts) {
      post = makeAnswerBubble(optData.text);
      post.group.position.set(pos.x, pos.y, pos.z);
      scene.add(post.group);
    }

    return {
      pos, half: def.half, top: pos.y,
      mesh, body: phys.body, collider: phys.collider,
      post,
      correct: optData.correct, text: optData.text,
      state: 'idle',
      timer: 0,
      fallVel: 0,
      extras: [],
    };
  }

  async function spawnGate(scene, world, RAPIER, particles, sfx, gateData, callbacks = {}, options = {}) {
    const opts = await Promise.all(
      gateData.options.map(opt => spawnOption(scene, world, RAPIER, gateData.position, opt, options))
    );
    return new AnswerGate(scene, world, particles, sfx, opts, gateData.question, callbacks);
  }

  const SHAKE_DURATION = 0.2;
  const FALL_DURATION  = 1.5;
  const SHAKE_AMPLITUDE = 0.06;
  const FALL_GRAVITY    = 22;

  class AnswerGate {
    constructor(scene, world, particles, sfx, options, question, callbacks) {
      this.scene = scene;
      this.world = world;
      this.particles = particles;
      this.sfx = sfx;
      this.options = options;
      this.question = question;
      this.callbacks = callbacks;
      this.cleared = false;
    }

    update(dt, playerPos, playerGrounded) {
      for (const opt of this.options) {
        if (opt.state === 'shaking') {
          opt.timer -= dt;
          const jx = (Math.random() - 0.5) * SHAKE_AMPLITUDE;
          const jz = (Math.random() - 0.5) * SHAKE_AMPLITUDE;
          opt.mesh.position.x = opt.pos.x + jx;
          opt.mesh.position.z = opt.pos.z + jz;
          if (opt.post) {
            opt.post.group.position.x = opt.pos.x + jx;
            opt.post.group.position.z = opt.pos.z + jz;
          }
          for (const ex of opt.extras) {
            ex.mesh.position.x = ex.basePos.x + jx;
            ex.mesh.position.z = ex.basePos.z + jz;
          }
          if (opt.timer <= 0) this._dropCollider(opt);
        } else if (opt.state === 'falling') {
          opt.fallVel += FALL_GRAVITY * dt;
          const dy = opt.fallVel * dt;
          opt.mesh.position.y -= dy;
          if (opt.post) opt.post.group.position.y -= dy;
          for (const ex of opt.extras) ex.mesh.position.y -= dy;
          const fade = Math.max(0, opt.timer / FALL_DURATION);
          if (opt.post) {
            for (const m of opt.post.mats) m.opacity = fade * 0.95;
          }
          for (const ex of opt.extras) {
            for (const m of (ex.mats || [])) { m.transparent = true; m.opacity = fade; }
          }
          opt.timer -= dt;
          if (opt.timer <= 0) {
            this.scene.remove(opt.mesh);
            if (opt.post) this.scene.remove(opt.post.group);
            for (const ex of opt.extras) this.scene.remove(ex.mesh);
            opt.state = 'gone';
          }
        }
      }

      if (!playerGrounded || this.cleared) return;
      for (const opt of this.options) {
        if (opt.state !== 'idle') continue;
        if (!this._playerOnOption(playerPos, opt)) continue;
        if (opt.correct) {
          opt.state = 'cleared';
          this.cleared = true;
          if (this.sfx?.correct) playSfx(this.sfx.correct);
          this.callbacks.onCleared?.(this);
        } else {
          this._startCrumble(opt);
          this.callbacks.onWrong?.(this, opt);
        }
      }
    }

    _playerOnOption(p, opt) {
      if (Math.abs(p.x - opt.pos.x) > opt.half.x) return false;
      if (Math.abs(p.z - opt.pos.z) > opt.half.z) return false;
      if (Math.abs(p.y - opt.top) > 0.3) return false;
      return true;
    }

    _startCrumble(opt) {
      opt.state = 'shaking';
      opt.timer = SHAKE_DURATION;
    }

    _dropCollider(opt) {
      this.world.removeRigidBody(opt.body);
      opt.body = null;
      opt.collider = null;
      opt.state = 'falling';
      opt.timer = FALL_DURATION;
      opt.fallVel = 0;
      this.particles.spawnPuff({ x: opt.pos.x, y: opt.top, z: opt.pos.z });
      if (this.sfx?.break) playSfx(this.sfx.break);
    }

    dispose() {
      for (const opt of this.options) {
        if (opt.mesh.parent) this.scene.remove(opt.mesh);
        if (opt.post && opt.post.group.parent) this.scene.remove(opt.post.group);
        for (const ex of opt.extras) if (ex.mesh.parent) this.scene.remove(ex.mesh);
        if (opt.body) this.world.removeRigidBody(opt.body);
      }
      this.options = [];
    }
  }

  // ============================== qa-styles.js ==============================
  function _drawCard(ctx, W, H, { bg = '#ffffff', border = '#1a2435', borderW = 18, fg = '#1a2435', font = 'bold 220px Arial, sans-serif', text }) {
    ctx.fillStyle = bg;
    ctx.fillRect(0, 0, W, H);
    if (borderW > 0) {
      ctx.strokeStyle = border;
      ctx.lineWidth = borderW;
      ctx.strokeRect(borderW / 2, borderW / 2, W - borderW, H - borderW);
    }
    ctx.fillStyle = fg;
    ctx.font = font;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(text, W / 2, H / 2);
  }

  function _canvasTexture(c) {
    const tex = new THREE.CanvasTexture(c);
    tex.colorSpace = THREE.SRGBColorSpace;
    tex.minFilter = THREE.LinearFilter;
    tex.magFilter = THREE.LinearFilter;
    tex.generateMipmaps = false;
    tex.needsUpdate = true;
    return tex;
  }

  function _makeTextPlane(text, { w, h, font = 'bold 220px Arial, sans-serif', bg = '#ffffff', fg = '#1a2435', borderW = 18, alpha = 1 }) {
    const W = 1024, H = 512;
    const c = document.createElement('canvas');
    c.width = W; c.height = H;
    const ctx = c.getContext('2d');
    _drawCard(ctx, W, H, { bg, fg, font, borderW, text });
    const tex = _canvasTexture(c);
    const geo = new THREE.PlaneGeometry(w, h);
    const mat = new THREE.MeshBasicMaterial({
      map: tex, transparent: true, depthWrite: false, fog: false,
      side: THREE.DoubleSide, opacity: alpha,
    });
    return new THREE.Mesh(geo, mat);
  }

  function _makeFloorDecal(text, { w, h, font = 'bold 240px Arial, sans-serif', bg = '#ffffff', fg = '#1a2435', borderW = 18 }) {
    const mesh = _makeTextPlane(text, { w, h, font, bg, fg, borderW });
    mesh.rotation.x = Math.PI / 2;
    return mesh;
  }

  async function _spawnSignlessGate(scene, world, RAPIER, particles, sfx, gateData, callbacks) {
    return spawnGate(scene, world, RAPIER, particles, sfx, gateData, callbacks, { noSignposts: true });
  }

  function _attachExtra(opt, mesh, mats) {
    opt.extras.push({
      mesh,
      basePos: { x: mesh.position.x, y: mesh.position.y, z: mesh.position.z },
      mats: mats || (mesh.material ? [mesh.material] : []),
    });
  }

  function _makeBubble(text) {
    const W = 1024, H = 512;
    const c = document.createElement('canvas');
    c.width = W; c.height = H;
    const ctx = c.getContext('2d');
    ctx.clearRect(0, 0, W, H);
    const r = 80;
    ctx.fillStyle = 'rgba(110, 180, 255, 0.85)';
    ctx.beginPath();
    ctx.moveTo(r, 0);
    ctx.arcTo(W, 0, W, H, r);
    ctx.arcTo(W, H, 0, H, r);
    ctx.arcTo(0, H, 0, 0, r);
    ctx.arcTo(0, 0, W, 0, r);
    ctx.closePath();
    ctx.fill();
    ctx.fillStyle = '#ffffff';
    ctx.font = 'bold 280px Arial, sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(text, W / 2, H / 2);
    const tex = _canvasTexture(c);
    const geo = new THREE.PlaneGeometry(1.4, 0.6);
    const mat = new THREE.MeshBasicMaterial({
      map: tex, transparent: true, depthWrite: false, fog: false,
      side: THREE.DoubleSide, opacity: 0.85,
    });
    return new THREE.Mesh(geo, mat);
  }

  function _makeArch(scene, centerX, baseY, z, { w, h, post = 0.15, color = 0x6e6e7a }) {
    const meshes = [];
    const postGeo = new THREE.BoxGeometry(post, h, post);
    const barGeo  = new THREE.BoxGeometry(w + post * 2, post, post);
    const mat = new THREE.MeshBasicMaterial({ color });
    const left = new THREE.Mesh(postGeo, mat);
    left.position.set(centerX - w / 2 - post / 2, baseY + h / 2, z);
    scene.add(left); meshes.push(left);
    const right = new THREE.Mesh(postGeo, mat);
    right.position.set(centerX + w / 2 + post / 2, baseY + h / 2, z);
    scene.add(right); meshes.push(right);
    const top = new THREE.Mesh(barGeo, mat);
    top.position.set(centerX, baseY + h + post / 2, z);
    scene.add(top); meshes.push(top);
    return { meshes, mat, topY: baseY + h + post };
  }

    const gate = await _spawnSignlessGate(scene, world, RAPIER, particles, sfx, gateData, callbacks);

      sign.position.set(opt.pos.x, arch.topY + 0.35, opt.pos.z);
      scene.add(sign);
      for (const m of arch.meshes) _attachExtra(opt, m, [arch.mat]);
      _attachExtra(opt, sign);
    }
    if (ctx.approachPos) {
      const ap = ctx.approachPos;
      const arch = _makeArch(scene, ap.x, ap.y, ap.z, { w: 4.0, h: 3.2, post: 0.2 });
      const sign = _makeTextPlane(formatPrompt(gateData.question.verb), { w: 3.6, h: 1.0 });
      sign.position.set(ap.x, arch.topY + 0.55, ap.z);
      scene.add(sign);
      extras.push(...arch.meshes, sign);
    }
    return { gate, extras };
  }

  const WIDE_DEF = {
    url: './assets/models/platform-large.glb',
    half: { x: 2.5, y: 0.275, z: 2.5 },
    height: 0.55,
  };
  const WIDE_PAD_X = [-1.6, 0, 1.6];
  const WIDE_PAD_HALF_X = 0.7;
  const WIDE_PAD_HALF_Z = 0.8;

  class WideAnswerGate {
    constructor(scene, world, particles, sfx, plat, pads, question, callbacks) {
      this.scene = scene;
      this.world = world;
      this.particles = particles;
      this.sfx = sfx;
      this.plat = plat;
      this.pads = pads;
      this.question = question;
      this.callbacks = callbacks;
      this.cleared = false;
      this.state = 'idle';
      this.timer = 0;
      this.fallVel = 0;
    }

    update(dt, playerPos, playerGrounded) {
      if (this.state === 'shaking') {
        this.timer -= dt;
        const jx = (Math.random() - 0.5) * 0.06;
        const jz = (Math.random() - 0.5) * 0.06;
        this.plat.mesh.position.x = this.plat.pos.x + jx;
        this.plat.mesh.position.z = this.plat.pos.z + jz;
        for (const d of this.plat.decals) {
          d.mesh.position.x = d.basePos.x + jx;
          d.mesh.position.z = d.basePos.z + jz;
        }
        if (this.timer <= 0) this._drop();
        return;
      }
      if (this.state === 'falling') {
        this.fallVel += 22 * dt;
        const dy = this.fallVel * dt;
        this.plat.mesh.position.y -= dy;
        for (const d of this.plat.decals) d.mesh.position.y -= dy;
        const fade = Math.max(0, this.timer / 1.5);
        for (const d of this.plat.decals) { d.mat.transparent = true; d.mat.opacity = fade; }
        this.timer -= dt;
        if (this.timer <= 0) {
          this.scene.remove(this.plat.mesh);
          for (const d of this.plat.decals) this.scene.remove(d.mesh);
          this.state = 'gone';
        }
        return;
      }

      if (!playerGrounded || this.cleared) return;
      if (Math.abs(playerPos.x - this.plat.pos.x) > this.plat.half.x) return;
      if (Math.abs(playerPos.z - this.plat.pos.z) > this.plat.half.z) return;
      if (Math.abs(playerPos.y - this.plat.top) > 0.3) return;
      if (Math.abs(playerPos.z - this.plat.pos.z) > WIDE_PAD_HALF_Z) return;
      const padIdx = this.pads.findIndex(p => Math.abs(playerPos.x - (this.plat.pos.x + p.x)) < WIDE_PAD_HALF_X);
      if (padIdx === -1) return;
      const pad = this.pads[padIdx];
      if (pad.correct) {
        this.cleared = true;
        this.callbacks.onCleared?.(this);
      } else {
        this._startCrumble();
        this.callbacks.onWrong?.(this, pad);
      }
    }

    _startCrumble() { this.state = 'shaking'; this.timer = 0.2; }

    _drop() {
      this.world.removeRigidBody(this.plat.body);
      this.plat.body = null;
      this.state = 'falling';
      this.timer = 1.5;
      this.fallVel = 0;
      this.particles.spawnPuff({ x: this.plat.pos.x, y: this.plat.top, z: this.plat.pos.z });
    }

    dispose() {
      if (this.plat.mesh.parent) this.scene.remove(this.plat.mesh);
      for (const d of this.plat.decals) if (d.mesh.parent) this.scene.remove(d.mesh);
      if (this.plat.body) this.world.removeRigidBody(this.plat.body);
    }
  }

    const wall = new THREE.Mesh(wallGeo, wallMat);
    wall.position.set(gx, gy + 3.0, wallZ);
    scene.add(wall);
    extras.push(wall);
    return { gate, extras };
  }

  const STYLES = {
    1: spawnStyle1, 2: spawnStyle2, 3: spawnStyle3, 4: spawnStyle4,
    5: spawnStyle5, 6: spawnStyle6, 7: spawnStyle7,
  };

  async function spawnStyledGate(style, scene, world, RAPIER, particles, sfx, gateData, callbacks, ctx) {
    const fn = STYLES[style];
    if (!fn) throw new Error(`Unknown Q/A style: ${style}`);
    return fn(scene, world, RAPIER, particles, sfx, gateData, callbacks, ctx);

  // ============================== player.js ==============================
  const _MOVE_SPEED = 6.0;
  const _JUMP_SPEED = 10.0;
  const _PLAYER_GRAVITY = 28.0;
  const _TURN_LERP = 0.25;
  const _MAX_FALL = 35.0;

  async function createPlayer(scene, world, RAPIER, spawn = { x: 0, y: 5, z: 0 }) {
    const mesh = await loadModel('./assets/models/character.glb');
    scene.add(mesh);

    const bodyDesc = RAPIER.RigidBodyDesc.kinematicPositionBased()
      .setTranslation(spawn.x, spawn.y, spawn.z);
    const body = world.createRigidBody(bodyDesc);
    const collider = world.createCollider(
      RAPIER.ColliderDesc.capsule(0.4, 0.3),
      body,
    );

    const ctrl = world.createCharacterController(0.02);
    ctrl.setApplyImpulsesToDynamicBodies(true);
    ctrl.enableAutostep(0.3, 0.2, true);
    ctrl.enableSnapToGround(0.4);

    const sfxJump = loadAudio('./assets/sounds/jump.ogg', { volume: 0.5 });

    const state = {
      vy: 0,
      grounded: false,
      jumpsLeft: 2,
    };

    const moveDir = new THREE.Vector3();
    const desiredMove = new THREE.Vector3();
    const targetQuat = new THREE.Quaternion();

    function update(dt, input, camera, riderDelta = null) {
      const fwd = camera.getForwardXZ(new THREE.Vector3());
      const right = new THREE.Vector3(-fwd.z, 0, fwd.x);

      moveDir.set(0, 0, 0)
        .addScaledVector(fwd,  -input.move.y)
        .addScaledVector(right,  input.move.x);
      if (moveDir.lengthSq() > 1) moveDir.normalize();

      if (input.consumeJump() && state.jumpsLeft > 0) {
        state.vy = _JUMP_SPEED;
        state.jumpsLeft -= 1;
        state.grounded = false;
        playSfx(sfxJump);
      }

      state.vy -= _PLAYER_GRAVITY * dt;
      if (state.vy < -_MAX_FALL) state.vy = -_MAX_FALL;

      desiredMove.set(
        moveDir.x * _MOVE_SPEED * dt,
        state.vy * dt,
        moveDir.z * _MOVE_SPEED * dt,
      );

      ctrl.computeColliderMovement(collider, desiredMove);
      const corrected = ctrl.computedMovement();

      const t = body.translation();
      const rd = riderDelta;
      const newX = t.x + corrected.x + (rd ? rd.dx : 0);
      const newY = t.y + corrected.y + (rd ? rd.dy : 0);
      const newZ = t.z + corrected.z + (rd ? rd.dz : 0);
      body.setNextKinematicTranslation({ x: newX, y: newY, z: newZ });

      state.grounded = ctrl.computedGrounded();
      if (state.grounded) {
        state.jumpsLeft = 2;
        if (state.vy < 0) state.vy = 0;
      }

      mesh.position.set(newX, newY - 0.7, newZ);

      if (moveDir.lengthSq() > 0.001) {
        const yaw = Math.atan2(moveDir.x, moveDir.z);
        targetQuat.setFromAxisAngle(new THREE.Vector3(0, 1, 0), yaw);
        mesh.quaternion.slerp(targetQuat, _TURN_LERP);
      }
    }

    function getPosition() {
      const t = body.translation();
      return { x: t.x, y: t.y - 0.7, z: t.z };
    }

    function teleport(pos) {
      body.setNextKinematicTranslation({ x: pos.x, y: pos.y + 0.7, z: pos.z });
      body.setTranslation({ x: pos.x, y: pos.y + 0.7, z: pos.z }, true);
      state.vy = 0;
      state.jumpsLeft = 2;
    }

    return { mesh, body, collider, update, getPosition, teleport, state };
  }

  // ============================== level-loader.js ==============================
  const PLATFORM_DEFS = {
    large:  { url: './assets/models/platform-large.glb',  half: { x: 2.5, y: 0.275, z: 2.5 }, height: 0.55 },
    medium: { url: './assets/models/platform-medium.glb', half: { x: 1.5, y: 0.275, z: 1.5 }, height: 0.55 },
    small:  { url: './assets/models/platform.glb',        half: { x: 1.0, y: 0.275, z: 1.0 }, height: 0.55 },
  };

  const FLAG_URL   = './assets/models/flag.glb';
  const FLAG_REACH = 1.6;

  const Q_BUBBLE_H = 1.3;
  const Q_BUBBLE_MIN_W = 2.5;
  const Q_BUBBLE_Y = 4.5;
  const Q_BUBBLE_TINT = 'rgba(255, 138, 70, 0.9)';
  const Q_BUBBLE_FONT_PX = 220;
  const Q_BUBBLE_PAD_PX = 140;

  function makeQuestionBubble(prompt) {
    const H = 512;
    const font = `bold ${Q_BUBBLE_FONT_PX}px Arial, sans-serif`;
    const measure = document.createElement('canvas').getContext('2d');
    measure.font = font;
    const textW = measure.measureText(prompt).width;
    const W = Math.max(900, Math.ceil(textW + 2 * Q_BUBBLE_PAD_PX));

    const c = document.createElement('canvas');
    c.width = W; c.height = H;
    const ctx = c.getContext('2d');
    ctx.clearRect(0, 0, W, H);
    const r = 90;
    ctx.fillStyle = Q_BUBBLE_TINT;
    ctx.beginPath();
    ctx.moveTo(r, 0);
    ctx.arcTo(W, 0, W, H, r);
    ctx.arcTo(W, H, 0, H, r);
    ctx.arcTo(0, H, 0, 0, r);
    ctx.arcTo(0, 0, W, 0, r);
    ctx.closePath();
    ctx.fill();
    ctx.fillStyle = '#ffffff';
    ctx.font = font;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(prompt, W / 2, H / 2);

    const tex = new THREE.CanvasTexture(c);
    tex.colorSpace = THREE.SRGBColorSpace;
    tex.minFilter = THREE.LinearFilter;
    tex.magFilter = THREE.LinearFilter;
    tex.generateMipmaps = false;
    tex.needsUpdate = true;

    const planeW = Math.max(Q_BUBBLE_MIN_W, Q_BUBBLE_H * (W / H));
    const geo = new THREE.PlaneGeometry(planeW, Q_BUBBLE_H);
    const mat = new THREE.MeshBasicMaterial({
      map: tex, transparent: true, depthWrite: false, fog: false,
      side: THREE.DoubleSide, opacity: 0.95,
    });
    return new THREE.Mesh(geo, mat);
  }

  function makeFloorTag(text) {
    const W = 512, H = 256;
    const c = document.createElement('canvas');
    c.width = W; c.height = H;
    const ctx = c.getContext('2d');
    ctx.fillStyle = 'rgba(255, 255, 255, 0.92)';
    ctx.fillRect(0, 0, W, H);
    ctx.strokeStyle = '#1a2435';
    ctx.lineWidth = 10;
    ctx.strokeRect(5, 5, W - 10, H - 10);
    ctx.fillStyle = '#1a2435';
    ctx.font = 'bold 140px Arial, sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(text, W / 2, H / 2);
    const tex = new THREE.CanvasTexture(c);
    tex.colorSpace = THREE.SRGBColorSpace;
    tex.minFilter = THREE.LinearFilter;
    tex.magFilter = THREE.LinearFilter;
    tex.generateMipmaps = false;
    tex.needsUpdate = true;
    const geo = new THREE.PlaneGeometry(1.0, 0.5);
    const mat = new THREE.MeshBasicMaterial({
      map: tex, transparent: true, depthWrite: false, fog: false, side: THREE.DoubleSide,
    });
    const mesh = new THREE.Mesh(geo, mat);
    mesh.rotation.x = Math.PI / 2;
    return mesh;
  }

  async function spawnPlatform(scene, world, RAPIER, p) {
    const def = PLATFORM_DEFS[p.size];
    if (!def) throw new Error(`unknown platform size: ${p.size}`);
    const mesh = await loadModel(def.url);
    const [x, y, z] = p.position;
    mesh.position.set(x, y - def.height, z);
    scene.add(mesh);
    const phys = addStaticBox(world, RAPIER, { x, y: y - def.half.y, z }, def.half);
    let tagMesh = null;
    if (p.floorLabel) {
      tagMesh = makeFloorTag(p.floorLabel);
      tagMesh.position.set(x, y + 0.03, z - def.half.z * 0.3);
      tagMesh.renderOrder = 1;
      scene.add(tagMesh);
    }
    return { mesh, body: phys.body, position: p.position, size: p.size, half: def.half, tagMesh };
  }

  class MovingPlatform {
    constructor(mesh, body, basePos, def, motion) {
      this.mesh = mesh;
      this.body = body;
      this.basePos = basePos;
      this.def = def;
      this.motion = motion;
    }
    _offset(elapsed) {
      const t = (elapsed + (this.motion.phase || 0)) / this.motion.period;
      return Math.sin(t * Math.PI * 2) * this.motion.amplitude;
    }
    _animatedPos(elapsed) {
      const p = { x: this.basePos.x, y: this.basePos.y, z: this.basePos.z };
      p[this.motion.axis] += this._offset(elapsed);
      return p;
    }
    prePhysics(elapsed) {
      const p = this._animatedPos(elapsed);
      this.body.setNextKinematicTranslation({ x: p.x, y: p.y - this.def.half.y, z: p.z });
    }
    postPhysics(elapsed) {
      const p = this._animatedPos(elapsed);
      this.mesh.position.set(p.x, p.y - this.def.height, p.z);
    }
  }

  async function spawnMovingPlatform(scene, world, RAPIER, p) {
    const def = PLATFORM_DEFS[p.size];
    if (!def) throw new Error(`unknown moving platform size: ${p.size}`);
    const mesh = await loadModel(def.url);
    const [x, y, z] = p.position;
    mesh.position.set(x, y - def.height, z);
    scene.add(mesh);
    const phys = addKinematicBox(world, RAPIER, { x, y: y - def.half.y, z }, def.half);
    const motion = {
      axis:      p.axis      || 'x',
      amplitude: p.amplitude || 2,
      period:    p.period    || 3,
      phase:     p.phase     || 0,
    };
    return new MovingPlatform(mesh, phys.body, { x, y, z }, def, motion);
  }

  async function spawnFlag(scene, pos) {
    const mesh = await loadModel(FLAG_URL);
    const [x, y, z] = pos;
    mesh.position.set(x, y, z);
    scene.add(mesh);
    return { mesh, pos: { x, y, z } };
  }

  function buildGateOptions(question) {
    const entries = [
      { text: question.correct,  correct: true  },
      { text: question.wrong[0], correct: false },
      { text: question.wrong[1], correct: false },
    ];
    for (let i = entries.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [entries[i], entries[j]] = [entries[j], entries[i]];
    }
    return LANE_OFFSETS.map((offset, i) => ({
      text: entries[i].text,
      correct: entries[i].correct,
      offset,
    }));
  }

  async function loadLevel(scene, world, RAPIER, particles, sfx, data, callbacks = {}, uiHooks = {}) {
    const layout = data.layout;
    const gateEntries = layout.filter(e => e.type === 'gate');
    const needsQueue = gateEntries.some(g => !g.verb);
    const questionQueue = needsQueue
      ? buildQuestionQueue(data.verbs, gateEntries.length, data.repeatsAllowed || 1)
      : [];

    const platforms = [];
    const movingPlatforms = [];
    const gates = [];
    const extras = [];
    let spawn = null;
    let flag = null;
    let qIdx = 0;

    const previousPlatform = (i) => {
      for (let j = i - 1; j >= 0; j--) if (layout[j].type === 'platform') return layout[j];
      return null;
    };
    const nextPlatform = (i) => {
      for (let j = i + 1; j < layout.length; j++) if (layout[j].type === 'platform') return layout[j];
      return null;
    };

    for (let i = 0; i < layout.length; i++) {
      const e = layout[i];
      if (e.type === 'spawn') {
        spawn = e.position;
      } else if (e.type === 'platform') {
        const p = await spawnPlatform(scene, world, RAPIER, e);
        platforms.push(p);
      } else if (e.type === 'moving') {
        const mp = await spawnMovingPlatform(scene, world, RAPIER, e);
        movingPlatforms.push(mp);
      } else if (e.type === 'flag') {
        flag = await spawnFlag(scene, e.position);
      }
    }

    for (let i = 0; i < layout.length; i++) {
      const e = layout[i];
      if (e.type !== 'gate') continue;

      const question = e.verb ? getQuestion(e.verb) : questionQueue[qIdx];
      const options = buildGateOptions(question);

      const checkpoint = nextPlatform(i);
      const checkpointPos = checkpoint
        ? { x: checkpoint.position[0], y: checkpoint.position[1], z: checkpoint.position[2] }
        : null;
      const approachLayout = previousPlatform(i);
      const approachPos = approachLayout
        ? { x: approachLayout.position[0], y: approachLayout.position[1], z: approachLayout.position[2] }
        : null;

      const myGateIndex = qIdx;
      const gateData = {
        position: e.position,
        options,
        question: { verb: question.verb, correct: question.correct },
      };
      const gateCallbacks = {
        onCleared: () => callbacks.onGateCleared?.(myGateIndex, checkpointPos),
        onWrong:   (g, opt) => callbacks.onGateWrong?.(myGateIndex, gateData.question, opt),
      };

      let gate, gateExtras = [], hudQuestion = null;
      if (e.style) {
        const styled = await spawnStyledGate(e.style, scene, world, RAPIER, particles, sfx, gateData, gateCallbacks, { approachPos });
        gate = styled.gate;
        gateExtras = styled.extras || [];
        hudQuestion = styled.hudQuestion || null;
      } else {
        gate = await spawnGate(scene, world, RAPIER, particles, sfx, gateData, gateCallbacks);
        const banner = makeQuestionBubble(formatPrompt(question.verb));
        const [gx, gy, gz] = e.position;
        banner.position.set(gx, gy + Q_BUBBLE_Y, gz);
        scene.add(banner);
        gateExtras = [banner];
      }

      gates.push({ gate, checkpointPos, question, layoutIndex: i, hudQuestion });
      extras.push(...gateExtras);
      qIdx++;
    }

    return new LoadedLevel(scene, world, platforms, movingPlatforms, gates, flag, extras, spawn, uiHooks);
  }

  class LoadedLevel {
    constructor(scene, world, platforms, movingPlatforms, gates, flag, extras, spawn, uiHooks) {
      this.scene = scene;
      this.world = world;
      this.platforms = platforms;
      this.movingPlatforms = movingPlatforms;
      this.gates = gates;
      this.flag = flag;
      this.extras = extras;
      this.spawn = spawn;
      this.uiHooks = uiHooks || {};
      this.clearedCount = 0;
      this._lastHudText = null;
      this.elapsed = 0;
    }

    get gateCount() { return this.gates.length; }

    markCleared(idx) {
      if (idx + 1 > this.clearedCount) this.clearedCount = idx + 1;
    }

    prePhysics(fixedDt) {
      this.elapsed += fixedDt;
      for (const mp of this.movingPlatforms) mp.prePhysics(this.elapsed);
    }

    findRiderDelta(playerPos, playerGrounded, fixedDt) {
      if (!playerGrounded) return null;
      for (const mp of this.movingPlatforms) {
        const now  = mp._animatedPos(this.elapsed);
        const half = mp.def.half;
        if (Math.abs(playerPos.x - now.x) > half.x) continue;
        if (Math.abs(playerPos.z - now.z) > half.z) continue;
        if (Math.abs(playerPos.y - now.y) > 0.4)    continue;
        const next = mp._animatedPos(this.elapsed + fixedDt);
        return { dx: next.x - now.x, dy: next.y - now.y, dz: next.z - now.z };
      }
      return null;
    }

    update(dt, playerPos, playerGrounded) {
      for (const mp of this.movingPlatforms) mp.postPhysics(this.elapsed);
      for (const g of this.gates) g.gate.update(dt, playerPos, playerGrounded);
      if (this.flag?.mesh) this.flag.mesh.rotation.y += dt * 1.2;

      let wantHud = null;
      for (let i = this.clearedCount; i < this.gates.length; i++) {
        const g = this.gates[i];
        if (g.hudQuestion) { wantHud = g.hudQuestion; break; }
        break;
      }
      if (wantHud !== this._lastHudText) {
        this._lastHudText = wantHud;
        this.uiHooks.setHudQuestion?.(wantHud);
      }
    }

    flagReached(playerPos) {
      if (!this.flag) return false;
      const dx = playerPos.x - this.flag.pos.x;
      const dz = playerPos.z - this.flag.pos.z;
      const dy = playerPos.y - this.flag.pos.y;
      return (dx * dx + dz * dz) < (FLAG_REACH * FLAG_REACH) && Math.abs(dy) < 2.5;
    }

    dispose() {
      for (const p of this.platforms) {
        this.scene.remove(p.mesh);
        if (p.tagMesh) this.scene.remove(p.tagMesh);
        this.world.removeRigidBody(p.body);
      }
      for (const mp of this.movingPlatforms) {
        this.scene.remove(mp.mesh);
        this.world.removeRigidBody(mp.body);
      }
      for (const g of this.gates) g.gate.dispose();
      for (const e of this.extras) this.scene.remove(e);
      if (this.flag) this.scene.remove(this.flag.mesh);
      this.uiHooks.setHudQuestion?.(null);
      this.platforms = [];
      this.movingPlatforms = [];
      this.gates = [];
      this.extras = [];
      this.flag = null;
    }
  }

  function createUI({ onMenu }) {
    const hud = document.getElementById('hud');
    const levelInfo = document.getElementById('level-info');
    const menuBtn = document.getElementById('menu-btn');
    const flash = document.getElementById('death-flash');
    const complete = document.getElementById('level-complete');

    const progressEl = document.getElementById('progress');
    const progressText = document.getElementById('progress-text');
    const progressFill = document.getElementById('progress-fill');

    const reveal = document.getElementById('answer-reveal');
    const revealPrompt = document.getElementById('reveal-prompt');
    const revealCorrect = document.getElementById('reveal-correct');

    const hudQuestion = document.getElementById('hud-question');

    let revealHideTimer = null;
    let revealClearTimer = null;

    menuBtn.addEventListener('click', () => onMenu?.());

    return {
      showHud() { hud.hidden = false; progressEl.hidden = false; },
      hideHud() { hud.hidden = true;  progressEl.hidden = true;  },
      setLevel(text) { levelInfo.textContent = text; },

      setProgress(currentGate, total) {
        if (currentGate > total) {
          progressText.textContent = 'Reach the flag!';
          progressFill.style.width = '100%';
        } else {
          progressText.textContent = `Gate ${currentGate} / ${total}`;
          progressFill.style.width = `${((currentGate - 1) / total) * 100}%`;
        }
      },

      deathFlash() {
        flash.hidden = false;
        flash.style.opacity = '0.55';
        requestAnimationFrame(() => requestAnimationFrame(() => { flash.style.opacity = '0'; }));
        setTimeout(() => { flash.hidden = true; }, 600);
      },

      showAnswerReveal(verb, correct) {
        revealPrompt.textContent = `${verb} → `;
        revealCorrect.textContent = `${correct} ✓`;
        reveal.hidden = false;
        reveal.style.opacity = '1';
        clearTimeout(revealHideTimer);
        clearTimeout(revealClearTimer);
        revealHideTimer  = setTimeout(() => { reveal.style.opacity = '0'; }, 1500);
        revealClearTimer = setTimeout(() => { reveal.hidden = true; },        2100);
      },
      hideAnswerReveal() {
        clearTimeout(revealHideTimer);
        clearTimeout(revealClearTimer);
        reveal.hidden = true;
        reveal.style.opacity = '0';
      },

      showLevelComplete() { complete.hidden = false; },
      hideLevelComplete() { complete.hidden = true; },

      setHudQuestion(text) {
        if (text == null) {
          hudQuestion.hidden = true;
          return;
        }
        if (hudQuestion.textContent !== text) hudQuestion.textContent = text;
        hudQuestion.hidden = false;
      },
    };
  }

  // ============================== menu.js ==============================
  const _STORAGE_KEY = 'krabsy_3d_completed';

  function getCompleted() {
    try { return JSON.parse(localStorage.getItem(_STORAGE_KEY) || '[]'); }
    catch { return []; }
  }

  function markCompleted(id) {
    const c = getCompleted();
    if (!c.includes(id)) {
      c.push(id);
      localStorage.setItem(_STORAGE_KEY, JSON.stringify(c));
    }
  }

  function createMenu({ levels, onPick }) {
    const root = document.getElementById('menu');
    const list = document.getElementById('menu-list');

    function render() {
      const completed = new Set(getCompleted());
      list.innerHTML = '';
      for (const lvl of levels) {
        const btn = document.createElement('button');
        btn.className = 'level-btn';
        const tick = completed.has(lvl.id) ? ' ✓' : '';
        const numLabel = typeof lvl.id === 'number' ? `${lvl.id}.` : '★';
        btn.innerHTML = `<span class="num">${numLabel}</span> <span class="title">${lvl.name}</span><span class="tick">${tick}</span>`;
        btn.addEventListener('click', () => onPick(lvl));
        list.appendChild(btn);
      }
    }

    return {
      show() { render(); root.hidden = false; },
      hide() { root.hidden = true; },
    };
  }

  // ============================== game.js ==============================
  const FALL_Y    = -15;
  const FIXED_DT  = 1 / 60;
  const RESPAWN_DELAY_MS = 350;

  async function createGame(canvas) {
    const renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.setSize(window.innerWidth, window.innerHeight - 48, false); // reserve Krabsy nav
    renderer.outputColorSpace = THREE.SRGBColorSpace;

    const scene = new THREE.Scene();
    const skyColor = new THREE.Color('#87ceeb');
    const skyTex = loadTexture('./assets/sprites/skybox.png', { mapping: THREE.EquirectangularReflectionMapping });
    scene.background = skyTex;
    scene.fog = new THREE.Fog(skyColor, 40, 160);

    scene.add(new THREE.AmbientLight(0xffffff, 0.7));
    const sun = new THREE.DirectionalLight(0xffe0b3, 0.95);
    sun.position.set(10, 20, 8);
    scene.add(sun);

    const camera = new THREE.PerspectiveCamera(60, window.innerWidth / (window.innerHeight - 48), 0.1, 250);
    const followCam = createFollowCamera(camera);

    const { RAPIER: R, world } = await initPhysics();

    const player = await createPlayer(scene, world, R, { x: 0, y: 50, z: 0 });

    const shadowTex = loadTexture('./assets/sprites/blob_shadow.png');
    const blobShadow = new THREE.Mesh(
      new THREE.PlaneGeometry(1.0, 1.0),
      new THREE.MeshBasicMaterial({ map: shadowTex, transparent: true, depthWrite: false, opacity: 0.55 }),
    );
    blobShadow.rotation.x = -Math.PI / 2;
    blobShadow.visible = false;
    scene.add(blobShadow);

    await preloadParticles();
    const particles = new ParticleSystem(scene);
    const sfx = {
      jump:    loadAudio('./assets/sounds/jump.ogg',  { volume: 0.5 }),
      fall:    loadAudio('./assets/sounds/fall.ogg',  { volume: 0.6 }),
      break:   loadAudio('./assets/sounds/break.ogg', { volume: 0.7 }),
      correct: loadAudio('./assets/sounds/coin.ogg',  { volume: 0.5 }),
    };

    const input = createControls(canvas);

    window.addEventListener('resize', () => {
      const H = window.innerHeight - 48;
      renderer.setSize(window.innerWidth, H, false);
      camera.aspect = window.innerWidth / H;
      camera.updateProjectionMatrix();
    });

    let currentLevel = null;
    let currentLevelData = null;
    let alive = false;
    let lockedOut = false;
    let lastCheckpoint = null;
    let gatesCleared = 0;
    let onComplete = () => {};
    let onFall = () => {};
    let onGateCleared = () => {};
    let onGateWrong = () => {};
    let setHudQuestion = null;

    function spawnPosition() {
      if (lastCheckpoint) return { ...lastCheckpoint };
      const s = currentLevelData.layout.find(e => e.type === 'spawn').position;
      return { x: s[0], y: s[1], z: s[2] };
    }

    async function startLevel(data) {
      if (currentLevel) {
        currentLevel.dispose();
        particles.clear();
      }
      currentLevelData = data;
      lastCheckpoint = null;
      gatesCleared = 0;
      currentLevel = await loadLevel(scene, world, R, particles, sfx, data, {
        onGateCleared: (gateIdx, checkpointPos) => {
          gatesCleared = gateIdx + 1;
          if (checkpointPos) lastCheckpoint = checkpointPos;
          currentLevel?.markCleared(gateIdx);
          onGateCleared(gatesCleared, currentLevel.gateCount);
        },
        onGateWrong: (gateIdx, question) => {
          onGateWrong(question);
        },
      }, {
        setHudQuestion: (text) => setHudQuestion?.(text),
      });
      player.teleport(spawnPosition());
      alive = true;
      lockedOut = false;
      onGateCleared(0, currentLevel.gateCount);
    }

    function respawn() {
      alive = false;
      lockedOut = true;
      setTimeout(() => {
        player.teleport(spawnPosition());
        alive = true;
        lockedOut = false;
      }, RESPAWN_DELAY_MS);
    }

    function stopGame() {
      alive = false;
      lockedOut = true;
      if (currentLevel) {
        currentLevel.dispose();
        currentLevel = null;
      }
      particles.clear();
      currentLevelData = null;
      lastCheckpoint = null;
      gatesCleared = 0;
      setHudQuestion?.(null);
      if (document.pointerLockElement) document.exitPointerLock();
    }

    window.addEventListener('krabsy-teleport', (e) => {
      if (currentLevel) player.teleport(e.detail);
    });

    let last = performance.now();
    let acc = 0;

    function frame(now) {
      requestAnimationFrame(frame);
      const dt = Math.min((now - last) / 1000, 0.1);
      last = now;
      acc += dt;

      input.update();
      const look = input.consumeLook();
      if (look.x || look.y) followCam.applyLook(look.x, look.y);

      while (acc >= FIXED_DT) {
        let riderDelta = null;
        if (currentLevel && alive) {
          riderDelta = currentLevel.findRiderDelta(player.getPosition(), player.state.grounded, FIXED_DT);
        }
        if (currentLevel) currentLevel.prePhysics(FIXED_DT);
        if (alive) player.update(FIXED_DT, input, followCam, riderDelta);
        world.step();
        acc -= FIXED_DT;
      }

      const playerPos = player.getPosition();
      followCam.update(playerPos);

      if (currentLevel) currentLevel.update(dt, playerPos, player.state.grounded);
      particles.update(dt);

      if (alive && player.state.grounded) {
        blobShadow.visible = true;
        blobShadow.position.set(playerPos.x, playerPos.y + 0.01, playerPos.z);
      } else {
        blobShadow.visible = false;
      }

      if (alive && !lockedOut && currentLevel) {
        if (playerPos.y < FALL_Y) {
          alive = false;
          playSfx(sfx.fall);
          onFall();
          respawn();
        } else if (currentLevel.flagReached(playerPos)) {
          alive = false;
          lockedOut = true;
          onComplete(currentLevelData.id);
        }
      }

      renderer.render(scene, camera);
    }
    requestAnimationFrame(now => { last = now; frame(now); });

    return {
      startLevel,
      stopGame,
      setHandlers(h) {
        if (h.onComplete)     onComplete     = h.onComplete;
        if (h.onFall)         onFall         = h.onFall;
        if (h.onGateCleared)  onGateCleared  = h.onGateCleared;
        if (h.onGateWrong)    onGateWrong    = h.onGateWrong;
        if (h.setHudQuestion) setHudQuestion = h.setHudQuestion;

    };

      el = document.createElement('div');
      el.id = 'fatal';
      Object.assign(el.style, {
        position: 'fixed', inset: '20px', padding: '16px 20px',
        background: 'rgba(0,0,0,0.85)', color: '#ffb4b4', fontFamily: 'monospace',
        fontSize: '13px', whiteSpace: 'pre-wrap', overflow: 'auto', zIndex: 1000,
        border: '2px solid #ff6464', borderRadius: '8px',
      });
      document.body.appendChild(el);
    }
    el.textContent = msg;
  }
  window.addEventListener('error', e => showFatal(`Error: ${e.message}\n${e.filename}:${e.lineno}`));
