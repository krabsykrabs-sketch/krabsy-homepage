<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Verb Runway 👗✨ — Krabsy</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='80' font-size='80'>👗</text></svg>">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;700;800&display=swap" rel="stylesheet">
<style>
:root{
  --teal:#2ee6c0; --coral:#ff8585; --amber:#ffcf5e; --navy:#0d2240;
  --card:#15315a; --card2:#1b3b6b; --ink:#2a2440;
  --txt:#f3f7ff; --dim:#9fb4d8;
}
*{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
html,body{margin:0; padding:0; height:100%;}
body{
  background:var(--navy);
  background-image:radial-gradient(1200px 700px at 50% -200px, #1a3a68 0%, var(--navy) 60%);
  color:var(--txt); font-family:'Nunito',sans-serif; overflow:hidden;
}
h1,h2,h3,.fredoka{font-family:'Fredoka One',cursive; font-weight:400; letter-spacing:.5px;}
button{font-family:'Nunito',sans-serif; cursor:pointer; border:none;}

.screen{position:fixed; inset:0; display:none; flex-direction:column; align-items:center; overflow:hidden;}
.screen.on{display:flex;}

/* ---------- corner buttons ---------- */
.corner{position:absolute; top:10px; z-index:40; display:flex; gap:8px;}
.corner.left{left:10px;} .corner.right{right:10px;}
.iconbtn{
  width:42px; height:42px; border-radius:14px; background:rgba(255,255,255,.08);
  color:var(--txt); font-size:20px; display:flex; align-items:center; justify-content:center;
  border:2px solid rgba(255,255,255,.12); transition:transform .12s;
}
.iconbtn:active{transform:scale(.92);}
.coinpill{
  height:42px; padding:0 14px; border-radius:14px; background:rgba(255,207,94,.14);
  border:2px solid rgba(255,207,94,.4); color:var(--amber); font-weight:800; font-size:17px;
  display:flex; align-items:center; gap:6px;
}

/* ---------- start screen ---------- */
#scr-start{justify-content:center; gap:14px; padding:20px; text-align:center;}
#scr-start .mascot{font-size:64px; line-height:1; filter:drop-shadow(0 6px 0 rgba(0,0,0,.25)); animation:bob 2.4s ease-in-out infinite;}
@keyframes bob{0%,100%{transform:translateY(0) rotate(-3deg);}50%{transform:translateY(-10px) rotate(3deg);}}
#scr-start h1{font-size:clamp(34px,8vw,52px); margin:0;}
#scr-start h1 .vw{color:var(--amber);} #scr-start h1 .rw{color:var(--teal);}
.tagline{color:var(--dim); font-size:16px; font-weight:700; margin:-6px 0 8px;}
.howto{display:flex; flex-direction:column; gap:9px; max-width:380px; width:100%;}
.howrow{
  display:flex; align-items:center; gap:12px; background:rgba(255,255,255,.06);
  border-radius:16px; padding:10px 14px; text-align:left; font-weight:700; font-size:15px;
  border:1.5px solid rgba(255,255,255,.08);
}
.howrow .e{font-size:24px;}
.bigbtn{
  margin-top:10px; font-family:'Fredoka One',cursive; font-size:21px; color:#5c3d00;
  background:linear-gradient(180deg,#ffe39a,var(--amber)); border-radius:20px; padding:15px 38px;
  box-shadow:0 6px 0 #c79527, 0 10px 24px rgba(0,0,0,.35); transition:transform .1s;
}
.bigbtn:active{transform:translateY(4px); box-shadow:0 2px 0 #c79527;}
.ghostbtn{
  font-family:'Fredoka One',cursive; font-size:16px; color:var(--teal);
  background:rgba(46,230,192,.1); border:2px solid rgba(46,230,192,.5);
  border-radius:16px; padding:11px 26px;
}
.streakline{color:var(--dim); font-size:14px; font-weight:700;}
.streakline b{color:var(--coral);}

/* ---------- theme reveal card ---------- */
#themecard{
  position:fixed; inset:0; z-index:60; display:none; align-items:center; justify-content:center;
  background:rgba(8,18,38,.78); backdrop-filter:blur(4px);
}
#themecard.on{display:flex;}
#themecard .card{
  background:linear-gradient(180deg,#234a86,var(--card)); border-radius:26px; padding:30px 26px;
  text-align:center; max-width:340px; width:88%; border:2px solid rgba(255,255,255,.15);
  box-shadow:0 24px 60px rgba(0,0,0,.5); animation:cardpop .45s cubic-bezier(.2,1.6,.4,1);
}
@keyframes cardpop{from{transform:scale(.6) rotate(-4deg); opacity:0;}to{transform:scale(1); opacity:1;}}
#themecard .te{font-size:56px;}
#themecard h2{font-size:26px; margin:8px 0 4px; color:var(--amber);}
#themecard .mode{font-size:13px; font-weight:800; color:var(--dim); text-transform:uppercase; letter-spacing:1px;}
.hintchips{display:flex; gap:6px; justify-content:center; flex-wrap:wrap; margin:14px 0 18px;}
.hintchip{background:rgba(46,230,192,.13); border:1.5px solid rgba(46,230,192,.45); color:var(--teal);
  border-radius:999px; padding:4px 12px; font-size:13.5px; font-weight:800;}

/* ---------- styling screen ---------- */
#scr-style{flex-direction:row; padding:0;}
#stageCol{flex:1.1; display:flex; flex-direction:column; align-items:center; min-width:0; height:100%; position:relative;}
#themebar{
  margin-top:60px; display:flex; align-items:center; gap:8px; background:rgba(255,255,255,.07);
  border:1.5px solid rgba(255,255,255,.12); border-radius:16px; padding:7px 14px; max-width:92%;
}
#themebar .te{font-size:22px;}
#themebar .tn{font-family:'Fredoka One',cursive; font-size:15px; color:var(--amber);}
#themebar .th{font-size:12px; color:var(--dim); font-weight:700;}
#dollwrap{flex:1; display:flex; align-items:center; justify-content:center; width:100%; min-height:0; padding:8px 0;}
#dollwrap svg{height:100%; max-height:62vh; filter:drop-shadow(0 10px 16px rgba(0,0,0,.35));}
#runwayBtn{
  margin-bottom:16px; font-family:'Fredoka One',cursive; font-size:19px; color:#5c1230;
  background:linear-gradient(180deg,#ffacac,var(--coral)); border-radius:18px; padding:13px 30px;
  box-shadow:0 5px 0 #c1495c, 0 8px 18px rgba(0,0,0,.3); transition:transform .1s;
}
#runwayBtn:active{transform:translateY(3px); box-shadow:0 2px 0 #c1495c;}

#panel{
  width:380px; max-width:44%; height:100%; background:rgba(0,0,0,.22);
  border-left:2px solid rgba(255,255,255,.07); display:flex; flex-direction:column; padding:60px 12px 10px;
}
#skinrow{display:flex; gap:8px; align-items:center; padding:2px 6px 10px; font-size:13px; font-weight:800; color:var(--dim);}
.skindot{width:28px; height:28px; border-radius:50%; border:2.5px solid rgba(255,255,255,.25); cursor:pointer;}
.skindot.sel{border-color:var(--teal); box-shadow:0 0 0 3px rgba(46,230,192,.3);}
#tabs{display:flex; gap:6px; flex-wrap:wrap; padding-bottom:8px;}
.tab{
  border-radius:12px; padding:7px 11px; background:rgba(255,255,255,.07); color:var(--dim);
  font-weight:800; font-size:13.5px; border:1.5px solid transparent;
}
.tab.sel{background:rgba(46,230,192,.14); color:var(--teal); border-color:rgba(46,230,192,.5);}
#itemgrid{
  flex:1; overflow-y:auto; display:grid; grid-template-columns:repeat(3,1fr); gap:9px;
  align-content:start; padding:4px 2px 12px;
}
.itemcard{
  background:rgba(255,255,255,.07); border:2px solid rgba(255,255,255,.1); border-radius:16px;
  padding:6px 4px 7px; display:flex; flex-direction:column; align-items:center; gap:3px;
  cursor:pointer; position:relative; transition:transform .12s;
}
.itemcard:active{transform:scale(.94);}
.itemcard.worn{border-color:var(--amber); background:rgba(255,207,94,.12);}
.itemcard.none{justify-content:center; min-height:96px; color:var(--dim); font-size:24px;}
.itemcard svg{width:100%; height:64px;}
.itemcard .nm{font-size:11px; font-weight:800; color:var(--txt); text-align:center; line-height:1.1;}
.itemcard.locked svg{filter:brightness(0); opacity:.35;}
.itemcard.locked .nm{color:var(--dim);}
.lockbadge{position:absolute; top:4px; right:6px; font-size:14px;}
.cwrow{display:flex; gap:5px; justify-content:center; margin-top:1px;}
.cwdot{width:15px; height:15px; border-radius:50%; border:2px solid rgba(255,255,255,.35); cursor:pointer; position:relative;}
.cwdot.sel{border-color:#fff; box-shadow:0 0 0 2px rgba(255,255,255,.4);}
.cwdot.lockcw{opacity:.32;}
.cwdot.lockcw::after{content:''; position:absolute; inset:4px; border-radius:50%; background:rgba(0,0,0,.55);}

/* ---------- runway ---------- */
#scr-runway{background:#08142b; justify-content:center;}
#stage{position:absolute; inset:0; overflow:hidden;}
#floor{position:absolute; left:50%; bottom:0; transform:translateX(-50%); width:min(92vw,560px); height:62vh;}
#spot{
  position:absolute; left:50%; top:0; transform:translateX(-50%); width:120vmax; height:120vmax; pointer-events:none;
  background:radial-gradient(closest-side at 50% 38%, rgba(255,244,210,.20), rgba(255,244,210,.05) 45%, transparent 70%);
  animation:spotsweep 3.2s ease-in-out infinite alternate;
}
@keyframes spotsweep{from{transform:translateX(-58%);}to{transform:translateX(-42%);}}
.curtain{position:absolute; top:0; bottom:0; width:54%; z-index:30;
  background:repeating-linear-gradient(90deg,#a72654 0 26px,#8f1d46 26px 52px);
  box-shadow:inset 0 -40px 60px rgba(0,0,0,.4);}
.curtain.l{left:0; border-right:10px solid #6e1233; transform:translateX(0); transition:transform 1.1s cubic-bezier(.6,.05,.4,1);}
.curtain.r{right:0; border-left:10px solid #6e1233; transform:translateX(0); transition:transform 1.1s cubic-bezier(.6,.05,.4,1);}
#scr-runway.open .curtain.l{transform:translateX(-104%);}
#scr-runway.open .curtain.r{transform:translateX(104%);}
#runwayDollWrap{position:absolute; left:50%; bottom:9vh; z-index:20; transform:translateX(-50%);}
#runwayDollWrap svg{height:54vh; filter:drop-shadow(0 14px 18px rgba(0,0,0,.5));}
#scr-runway.open #runwayDollWrap{animation:strut 4.4s ease-in-out forwards;}
@keyframes strut{
  0%{transform:translateX(-50%) translateY(-30vh) scale(.42); opacity:0;}
  8%{opacity:1;}
  46%{transform:translateX(-50%) translateY(0) scale(1);}
  56%{transform:translateX(-50%) translateY(0) scale(1) rotate(-5deg);}
  66%{transform:translateX(-50%) translateY(0) scale(1) rotate(5deg);}
  76%{transform:translateX(-50%) translateY(-1.5vh) scale(1) rotate(0deg);}
  82%{transform:translateX(-50%) translateY(0) scale(1);}
  100%{transform:translateX(-50%) translateY(0) scale(1);}
}
.flash{position:absolute; width:90px; height:90px; border-radius:50%; pointer-events:none; z-index:25;
  background:radial-gradient(circle,rgba(255,255,255,.95),rgba(255,255,255,0) 65%); opacity:0; animation:flashpop .5s ease-out forwards;}
@keyframes flashpop{0%{opacity:0; transform:scale(.3);}18%{opacity:1;}100%{opacity:0; transform:scale(1.5);}}
.spark{position:absolute; font-size:18px; pointer-events:none; z-index:26; animation:sparkfall 1.6s linear forwards;}
@keyframes sparkfall{from{opacity:1; transform:translateY(0) rotate(0);}to{opacity:0; transform:translateY(70px) rotate(160deg);}}
#runwayTitle{position:absolute; top:9vh; width:100%; text-align:center; z-index:22; font-family:'Fredoka One',cursive;
  font-size:clamp(20px,5vw,30px); color:var(--amber); text-shadow:0 4px 0 rgba(0,0,0,.3); opacity:0; transition:opacity .8s .9s;}
#scr-runway.open #runwayTitle{opacity:1;}
.qa-freeze *{animation-play-state:paused !important; transition:none !important;}

/* ---------- judging ---------- */
#scr-judge{padding:18px 14px; overflow-y:auto; justify-content:flex-start;}
#judgeInner{width:100%; max-width:460px; display:flex; flex-direction:column; gap:10px; align-items:center; padding:46px 0 24px;}
#judgeTheme{font-size:15px; color:var(--dim); font-weight:800;}
#judgeTheme b{color:var(--amber);}
.judgecard{
  width:100%; background:var(--card); border:2px solid rgba(255,255,255,.1); border-radius:18px;
  padding:10px 14px; display:flex; gap:12px; align-items:center;
  opacity:0; transform:translateY(14px); transition:opacity .4s, transform .4s;
}
.judgecard.in{opacity:1; transform:translateY(0);}
.javatar{width:52px; height:52px; border-radius:50%; background:rgba(255,255,255,.1); display:flex; align-items:center; justify-content:center; font-size:30px; flex:none;}
.jbody{flex:1; min-width:0;}
.jname{font-family:'Fredoka One',cursive; font-size:15px;}
.jrole{font-size:11.5px; color:var(--dim); font-weight:700;}
.jcomment{font-size:13.5px; font-weight:700; margin-top:3px; line-height:1.3;}
.jscore{margin-left:auto; flex:none; font-family:'Fredoka One',cursive; font-size:22px; color:var(--teal);
  background:rgba(46,230,192,.1); border:2px solid rgba(46,230,192,.4); border-radius:14px; padding:6px 11px;}
#totalbox{margin-top:6px; text-align:center; opacity:0; transform:scale(.7); transition:opacity .5s, transform .5s cubic-bezier(.2,1.6,.4,1);}
#totalbox.in{opacity:1; transform:scale(1);}
#totalnum{font-family:'Fredoka One',cursive; font-size:54px; color:var(--amber); line-height:1; text-shadow:0 5px 0 rgba(0,0,0,.25);}
#totalnum small{font-size:22px; color:var(--dim);}
#stars{font-size:30px; letter-spacing:4px; margin-top:2px;}
#chiprow{display:flex; flex-wrap:wrap; gap:6px; justify-content:center; margin-top:8px;}
.matchchip{background:rgba(46,230,192,.13); border:1.5px solid rgba(46,230,192,.45); color:var(--teal);
  border-radius:999px; padding:3px 11px; font-size:12.5px; font-weight:800;}
.matchchip.color{background:rgba(255,207,94,.13); border-color:rgba(255,207,94,.5); color:var(--amber);}
#coinsEarned{margin-top:6px; font-weight:800; color:var(--amber); font-size:17px;}
#practiceNote{font-size:12.5px; color:var(--dim); font-weight:700;}
#judgeBtns{display:flex; gap:10px; margin-top:12px; flex-wrap:wrap; justify-content:center;}

/* ---------- delivery modal ---------- */
#delivery{
  position:fixed; inset:0; z-index:70; display:none; align-items:center; justify-content:center;
  background:rgba(8,18,38,.82); backdrop-filter:blur(4px); padding:14px;
}
#delivery.on{display:flex;}
#delcard{
  background:linear-gradient(180deg,#23498a,var(--card)); border-radius:24px; border:2px solid rgba(255,255,255,.16);
  width:100%; max-width:400px; max-height:92vh; overflow-y:auto; padding:20px 18px; text-align:center;
  box-shadow:0 24px 60px rgba(0,0,0,.5);
}
#delcard h2{margin:0 0 4px; font-size:22px; color:var(--amber);}
#boxart{font-size:58px; margin:6px 0; display:inline-block;}
#boxart.shake{animation:boxshake .5s ease-in-out infinite;}
@keyframes boxshake{0%,100%{transform:rotate(-5deg);}50%{transform:rotate(5deg);}}
#delslots{display:flex; gap:10px; justify-content:center; margin:10px 0 14px;}
.delslot{
  width:86px; height:104px; border-radius:14px; background:rgba(0,0,0,.25); border:2px dashed rgba(255,255,255,.25);
  display:flex; flex-direction:column; align-items:center; justify-content:center; gap:2px; font-size:26px; position:relative;
}
.delslot svg{width:72px; height:66px;}
.delslot .sl-name{font-size:9.5px; font-weight:800; line-height:1.05; padding:0 2px;}
.delslot.won{border-style:solid; border-color:var(--teal); background:rgba(46,230,192,.1); animation:cardpop .4s cubic-bezier(.2,1.6,.4,1);}
.delslot.lost{opacity:.45;}
.delslot.coin{border-style:solid; border-color:rgba(255,207,94,.6); background:rgba(255,207,94,.1);}
#qbox{background:rgba(0,0,0,.22); border-radius:18px; padding:14px 12px; margin-top:4px;}
#qprompt{font-size:15px; font-weight:800; color:var(--dim);}
#qverb{font-family:'Fredoka One',cursive; font-size:30px; margin:4px 0 2px;}
#qform{display:inline-block; border-radius:999px; padding:2px 12px; font-size:12.5px; font-weight:800; color:#222; margin-bottom:10px;}
#qform.f-past{background:var(--teal);} #qform.f-pp{background:var(--coral);}
#qsentence{font-size:13.5px; color:var(--dim); font-weight:700; font-style:italic; margin-bottom:10px;}
#qchips{display:flex; flex-direction:column; gap:8px;}
.qchip{
  font-size:18px; font-weight:800; padding:11px; border-radius:14px; background:rgba(255,255,255,.09);
  border:2px solid rgba(255,255,255,.16); color:var(--txt); transition:transform .1s;
}
.qchip:active{transform:scale(.97);}
.qchip.right{background:rgba(46,230,192,.2); border-color:var(--teal);}
.qchip.wrong{background:rgba(255,133,133,.2); border-color:var(--coral);}
#teach{margin-top:10px; font-size:15px; font-weight:800; display:none;}
#teach.on{display:block; animation:cardpop .35s;}
#teach .fb{color:var(--amber);} #teach .fp{color:var(--teal);} #teach .fpp{color:var(--coral);}
#teach .arr{color:var(--dim); margin:0 5px;}
#delprogress{font-size:12.5px; color:var(--dim); font-weight:800; margin-top:8px;}

/* ---------- toast ---------- */
#toast{
  position:fixed; left:50%; bottom:24px; transform:translateX(-50%) translateY(80px); z-index:90;
  background:#223f73; border:2px solid rgba(255,255,255,.2); color:var(--txt); border-radius:16px;
  padding:10px 18px; font-weight:800; font-size:14px; transition:transform .3s; max-width:88vw; text-align:center;
  box-shadow:0 10px 28px rgba(0,0,0,.4);
}
#toast.on{transform:translateX(-50%) translateY(0);}

/* ---------- QA closet ---------- */
#qa-closet{position:fixed; inset:0; z-index:100; overflow-y:auto; background:var(--navy); display:none; padding:18px;}
#qa-closet.on{display:block;}
#qa-closet h2{color:var(--amber); margin:6px 0 12px; text-align:center;}
.qa-grid{display:grid; grid-template-columns:repeat(auto-fill,minmax(140px,1fr)); gap:12px; max-width:1180px; margin:0 auto;}
.qa-cell{background:rgba(255,255,255,.06); border:1.5px solid rgba(255,255,255,.1); border-radius:16px; padding:8px 4px 9px; text-align:center;}
.qa-cell svg{width:100%; height:170px;}
.qa-cell .nm{font-size:12px; font-weight:800; margin-top:2px;}
.qa-cell .cat{font-size:10px; color:var(--dim); font-weight:800; text-transform:uppercase; letter-spacing:.6px;}
.qa-cell .cwrow{margin-top:4px;}
.qa-skinrow{display:flex; gap:12px; justify-content:center; margin-bottom:14px; flex-wrap:wrap;}
.qa-skinrow .qa-cell{width:120px;} .qa-skinrow svg{height:140px;}

/* ---------- confetti ---------- */
.confetti{position:fixed; top:-12px; z-index:95; width:9px; height:13px; pointer-events:none; animation:confall linear forwards;}
@keyframes confall{to{transform:translateY(108vh) rotate(560deg);}}

/* ---------- mobile ---------- */
@media (max-width:700px){
  #scr-style{flex-direction:column;}
  #panel{width:100%; max-width:100%; height:47%; border-left:none; border-top:2px solid rgba(255,255,255,.1);
    padding:8px 10px 8px; border-radius:22px 22px 0 0; background:rgba(0,0,0,.3);}
  #stageCol{flex:1; min-height:0;}
  #themebar{margin-top:56px; padding:5px 10px;}
  #themebar .th{display:none;}
  #dollwrap svg{max-height:34vh;}
  #runwayBtn{margin-bottom:8px; padding:10px 24px; font-size:17px;}
  #tabs{flex-wrap:nowrap; overflow-x:auto; scrollbar-width:none;}
  #skinrow{padding-bottom:6px;}
}
</style>
</head>
<body>

<!-- ============ START ============ -->
<div id="scr-start" class="screen on">
  <div class="corner right"><button class="iconbtn" id="sndBtn1">🔊</button></div>
  <div class="mascot">👗</div>
  <h1><span class="vw">Verb</span> <span class="rw">Runway</span></h1>
  <div class="tagline" id="tagline"></div>
  <div class="howto" id="howto"></div>
  <button class="bigbtn" id="btnDaily"></button>
  <button class="ghostbtn" id="btnFree"></button>
  <div class="streakline" id="streakline"></div>
</div>

<!-- ============ THEME CARD ============ -->
<div id="themecard">
  <div class="card">
    <div class="mode" id="tcMode"></div>
    <div class="te" id="tcEmoji"></div>
    <h2 id="tcName"></h2>
    <div class="hintchips" id="tcHints"></div>
    <button class="bigbtn" id="tcGo" style="font-size:18px; padding:12px 30px;"></button>
  </div>
</div>

<!-- ============ STYLING ============ -->
<div id="scr-style" class="screen">
  <div class="corner left"><button class="iconbtn" id="homeBtn">🏠</button></div>
  <div class="corner right">
    <div class="coinpill"><span>🪙</span><span id="coinNum">0</span></div>
    <button class="iconbtn" id="boxBtn">📦</button>
    <button class="iconbtn" id="sndBtn2">🔊</button>
  </div>
  <div id="stageCol">
    <div id="themebar">
      <span class="te" id="tbEmoji"></span>
      <span><div class="tn" id="tbName"></div><div class="th" id="tbHints"></div></span>
    </div>
    <div id="dollwrap"></div>
    <button id="runwayBtn"></button>
  </div>
  <div id="panel">
    <div id="skinrow"></div>
    <div id="tabs"></div>
    <div id="itemgrid"></div>
  </div>
</div>

<!-- ============ RUNWAY ============ -->
<div id="scr-runway" class="screen">

const CATS = ['hair','top','bottom','dress','shoes','acc'];
const CAT_THUMB = {hair:'48 0 124 124', top:'52 100 116 118', bottom:'52 168 116 152', dress:'48 100 124 172', shoes:'56 262 108 96', acc:'52 100 116 118'};

/* ---------- doll renderer ---------- */
/* outfit = {hair:{id,cw}, top:{..}, bottom:{..}, dress:{..}, shoes:{..}, acc:{..}} */
function renderDoll(outfit, skinIdx){
  const uid = ++uidCounter;
  const sk = SKINS[skinIdx] || SKINS[0];
  const layer = slot => {
    const w = outfit[slot]; if(!w) return '';
    const it = ITEM[w.id]; if(!it) return '';
    const pal = PAL[it.cws[w.cw] || it.cws[0]];
    return it.draw(pal, uid);
  };
  const dressOn = !!outfit.dress;
  return `<svg viewBox="0 0 220 364" xmlns="http://www.w3.org/2000/svg">
    ${bodySVG(sk)}
    ${layer('shoes')}
    ${dressOn ? '' : layer('bottom')}
    ${dressOn ? layer('dress') : layer('top')}
    ${faceSVG()}
    ${layer('hair')}
    ${layer('acc')}
  </svg>`;
}
function itemThumb(it, cwIdx, skinIdx){
  const uid = ++uidCounter;
  const pal = PAL[it.cws[cwIdx] || it.cws[0]];
  const sk = SKINS[skinIdx] || SKINS[0];
  const vb = it.thumb || CAT_THUMB[it.cat];
  const itemSvg = it.draw(pal, uid);
  const hairSvg = it.cat==='hair' ? itemSvg : ITEM.bob.draw(PAL.cocoa, ++uidCounter);
  const bodyLayer = (it.cat==='hair'||it.cat==='acc') ? '' : itemSvg;
  const accLayer = it.cat==='acc' ? itemSvg : '';
  return `<svg viewBox="${vb}" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMid meet">
    ${bodySVG(sk)}${bodyLayer}${faceSVG()}${hairSvg}${accLayer}
  </svg>`;
}

let AC=null, muted = localStorage.getItem('krabsy_vrunway_sound')==='off';
function ac(){ if(!AC){ try{AC = new (window.AudioContext||window.webkitAudioContext)();}catch(e){} } return AC; }
function tone(f, t0, dur, type='sine', g=0.18, slide=0){
  const a=ac(); if(!a||muted) return;
  const o=a.createOscillator(), gn=a.createGain();
  o.type=type; o.frequency.setValueAtTime(f, a.currentTime+t0);
  if(slide) o.frequency.exponentialRampToValueAtTime(Math.max(40,f+slide), a.currentTime+t0+dur);
  gn.gain.setValueAtTime(0, a.currentTime+t0);
  gn.gain.linearRampToValueAtTime(g, a.currentTime+t0+0.012);
  gn.gain.exponentialRampToValueAtTime(0.001, a.currentTime+t0+dur);
  o.connect(gn).connect(a.destination);
  o.start(a.currentTime+t0); o.stop(a.currentTime+t0+dur+0.05);
}
function noise(t0, dur, g=0.14, hp=1200){
  const a=ac(); if(!a||muted) return;
  const n=a.sampleRate*dur, buf=a.createBuffer(1,n,a.sampleRate), d=buf.getChannelData(0);
  for(let i=0;i<n;i++) d[i]=(Math.random()*2-1)*(1-i/n);
  const src=a.createBufferSource(); src.buffer=buf;
  const f=a.createBiquadFilter(); f.type='highpass'; f.frequency.value=hp;
  const gn=a.createGain(); gn.gain.value=g;
  src.connect(f).connect(gn).connect(a.destination); src.start(a.currentTime+t0);
}

function hashStr(s){ let h=2166136261; for(let i=0;i<s.length;i++){h^=s.charCodeAt(i); h=Math.imul(h,16777619);} return h>>>0; }
function themeForDate(key){ return THEMES[hashStr('vrw:'+key)%THEMES.length]; }

function tryWear(id,cw){
  const it=ITEM[id];
  if(!ownsAny(id)){ toast(L.lockedToast); sWrong(); return; }
  if(!owns(id,cw)){ toast(L.lockedCw); sWrong(); return; }
  const slot=it.cat;
  const worn=S.worn[slot];
  if(worn && worn.id===id && worn.cw===cw){ S.worn[slot]=null; }  // toggle off
  else{
    S.worn[slot]={id,cw};
    if(slot==='dress'){ S.worn.top=null; S.worn.bottom=null; }
    if(slot==='top'||slot==='bottom'){ S.worn.dress=null; }
  }
  save(); sSwish(); buildGrid(); drawDoll();
}

/* ---------- judging ---------- */
function wornItems(){
  const list=[];
  for(const slot of ['hair','top','bottom','dress','shoes','acc']){
    const w=S.worn[slot]; if(!w) continue;
    const it=ITEM[w.id]; if(!it) continue;
    list.push({it, cw:w.cw, palId:it.cws[w.cw]});
  }
  return list;
}
function scoreOutfit(){
  const worn=wornItems();
  const matches=[];   // {item, tag}
  for(const w of worn) for(const tg of w.it.tags) if(theme.want.includes(tg)) matches.push({w, tag:tg});
  const bonusFam=PAL[theme.bonus].fam;
  let colorPts=0;
  for(const w of worn){
    if(w.palId===theme.bonus) colorPts+=1;
    else if(PAL[w.palId].fam===bonusFam) colorPts+=0.4;
  }
  colorPts=Math.min(colorPts,2);
  const outfitTags=new Set(); worn.forEach(w=>w.it.tags.forEach(t=>outfitTags.add(t)));
  const scores=JUDGES.map(j=>{
    let v=3 + Math.min(matches.length,5)*1.1 + colorPts*0.8;
    if(j.loves.some(t=>outfitTags.has(t))) v+=0.6;
    v+= (rnd()*0.7-0.35);
    return Math.max(1, Math.min(10, Math.round(v*10)/10));
  });
  const total=Math.round(scores.reduce((a,b)=>a+b,0)/3*10)/10;
  return {worn, matches, colorPts, scores, total};
}
function judgeNow(){
  const r=scoreOutfit();
  const practice = mode==='daily' && S.daily.date===dayKey() && S.daily.done;
  const stars = r.total>=8?3 : r.total>=5.5?2 : 1;
  const coins = mode==='daily' && !practice ? Math.max(3,Math.round(r.total)) : Math.max(2,Math.round(r.total*0.6));
  S.coins+=coins;
  if(mode==='daily' && !practice){
    const today=dayKey();
    const yest=dayKey(new Date(Date.now()-864e5));
    S.streak.n = (S.streak.last===yest) ? S.streak.n+1 : 1;
    S.streak.last=today;
    S.daily={date:today, done:true, score:r.total};
  }
  if(!S.best[theme.id] || r.total>S.best[theme.id]) S.best[theme.id]=r.total;
  save();
  lastResult={...r, stars, coins, practice};
  renderJudging(r, stars, coins, practice);
}
function commentFor(j, band, r){
  // prefer an item that matched the theme; else any worn item
  const matched=r.matches.map(m=>m.w);
  const w = matched.length?pick(matched):(r.worn.length?pick(r.worn):null);
  const itemName = w ? w.it.n[LANG] : (LANG==='de'?'dieses Outfit':'este look');
  const tpl = pick(COMMENTS[j.id][band][LANG]);
  const themeName = theme.n[LANG].replace(/[!¡]/g,'').trim();
  return fmt(tpl, {item:itemName, theme:themeName});
}

/* ---------- deliveries ---------- */
const BOX_COST=5;
function lockedPool(){
  const pool=[];
  for(const it of ITEMS) for(let ci=0; ci<it.cws.length; ci++)
    if(!owns(it.id,ci)) pool.push({id:it.id, cw:ci});
  return pool;
}
function makeQuestion(){
  // occasionally lead with a review of a missed verb
  const missedList=Object.keys(S.missed).filter(v=>S.missed[v]>0);
  let vb=null, review=false;
  if(missedList.length && rnd()<0.45){ const mv=pick(missedList); vb=VERBS.find(x=>x.v===mv)||null; review=!!vb; }
  if(!vb) vb=pick(VERBS);
  const form = rnd()<0.5?'past':'pp';
  const correct = vb[form];
  const wrongs = (form==='past'?vb.wp:vb.wpp).filter(w=>w!==correct);
  const w2 = []; const seen=new Set([correct]);
  for(const w of wrongs){ if(!seen.has(w) && w2.length<2){w2.push(w); seen.add(w);} }
  while(w2.length<2){ const f=pick(VERBS)[form]; if(!seen.has(f)){w2.push(f); seen.add(f);} }
  const chips=[correct,...w2];
  for(let i=chips.length-1;i>0;i--){const k=ri(i+1); [chips[i],chips[k]]=[chips[k],chips[i]];}
  return {vb, form, correct, chips, review};
}

function startBox(){
  S.coins-=BOX_COST; save(); updateCoins();
  const pool=lockedPool();
  // pick up to 3 distinct locked rewards; pad with coin rewards
  const rewards=[];
  const cp=pool.slice();
  for(let i=0;i<3;i++){
    if(cp.length){ const k=ri(cp.length); rewards.push({type:'item', ...cp.splice(k,1)[0]}); }
    else rewards.push({type:'coins', n:4});
  }
  delState={rewards, qi:0, results:[null,null,null]};
  $('delIntro').textContent='';
  $('boxart').textContent='📦'; $('boxart').classList.add('shake');
  renderSlots(); nextQuestion();
}
function renderSlots(){
  $('delslots').innerHTML=delState.rewards.map((r,i)=>{
    const res=delState.results[i];
    if(res==='won'){
      if(r.type==='coins') return `<div class="delslot coin won">🪙<div class="sl-name">+${r.n}</div></div>`;
      const it=ITEM[r.id];
      return `<div class="delslot won">${itemThumb(it,r.cw,S.skin)}<div class="sl-name">${it.n[LANG]}</div></div>`;
    }
    if(res==='lost') return `<div class="delslot lost">🔒</div>`;
    return `<div class="delslot">${i<delState.qi?'':'❓'}</div>`;
  }).join('');
}
function nextQuestion(){
  if(delState.qi>=3){ finishBox(); return; }
  const q=makeQuestion();
  delState.q=q;
  $('qbox').style.display='block';
  $('qprompt').textContent=(q.review?('🔁 '+L.review+' · '):'')+L.qWhich;
  $('qverb').innerHTML=`<span style="color:var(--amber)">${q.vb.v}</span> <span style="color:var(--dim)">→</span> ?`;
  const f=$('qform');
  f.textContent = q.form==='past' ? L.qPast : L.qPp;
  f.className = q.form==='past' ? 'f-past' : 'f-pp';
  $('qsentence').textContent='';
  $('teach').className=''; $('teach').innerHTML='';
  $('delprogress').textContent=fmt(L.qOf,{i:delState.qi+1});
  $('qchips').innerHTML=q.chips.map(c=>`<button class="qchip" data-a="${esc(c)}">${esc(c)}</button>`).join('');
  $('delbtns').innerHTML='';
  $('qchips').querySelectorAll('.qchip').forEach(b=>b.addEventListener('click',()=>answer(b.dataset.a, b)));
}
function answer(a, btn){
  if(!delState||!delState.q) return;
  const q=delState.q; delState.q=null;
  const right = a===q.correct;
  $('qchips').querySelectorAll('.qchip').forEach(b=>{
    b.disabled=true;
    if(b.dataset.a===q.correct) b.classList.add('right');
    else if(btn && b===btn && !right) b.classList.add('wrong');
  });
  const reward=delState.rewards[delState.qi];
  if(right){
    sDing(); setTimeout(sSparkle,150);
    if(reward.type==='coins'){ S.coins+=reward.n; delState.results[delState.qi]='won'; }
    else{
      const fresh=grant(reward.id, reward.cw);
      delState.results[delState.qi]='won';
      if(!fresh){ S.coins+=3; }
    }
    if(q.review) S.missed[q.vb.v]=Math.max(0,(S.missed[q.vb.v]||0)-1);
  }else{
    sWrong();
    delState.results[delState.qi]='lost';
    S.missed[q.vb.v]=(S.missed[q.vb.v]||0)+1;
  }
  // teaching beat: always show the full chain
  $('teach').innerHTML=`<span class="fb">${q.vb.v}</span><span class="arr">→</span><span class="fp">${q.vb.past}</span><span class="arr">→</span><span class="fpp">${q.vb.pp}</span>`;
  $('teach').classList.add('on');
  save(); updateCoins();
  delState.qi++;
  renderSlots();
  setTimeout(nextQuestion, right?1300:2100);
}
function finishBox(){
  $('boxart').classList.remove('shake'); $('boxart').textContent='🎁';
  $('qbox').style.display='none';
  $('delprogress').textContent='';
  const can=S.coins>=BOX_COST;
  $('delIntro').textContent=L.delDone;
  $('delbtns').innerHTML=`
    <button class="bigbtn" id="delAgain" style="font-size:16px;padding:11px 22px;${can?'':'opacity:.45;'}">${L.delAgain}</button>
    <button class="ghostbtn" id="delClose2">${L.delClose}</button>`;
  $('delAgain').addEventListener('click',()=>{
    if(S.coins<BOX_COST){ toast(L.delNoCoins); sWrong(); return; }
    sCoin(); startBox();
  });
  $('delClose2').addEventListener('click',closeDelivery);
  sSparkle();
}

/* ---------- QA scenes ---------- */
function qaCloset(){
  const el=$('qa-closet');
  let html=`<h2 class="fredoka">${L.closetTitle}</h2>`;
  html+='<div class="qa-skinrow">'+SKINS.map((sk,i)=>
    `<div class="qa-cell">${renderDoll({hair:{id:'bob',cw:0}},i)}<div class="nm">Skin ${i+1}</div></div>`).join('')+'</div>';
  html+='<div class="qa-skinrow">'+[
    {hair:{id:'waves',cw:2}, dress:{id:'partydress',cw:0}, shoes:{id:'maryjanes',cw:0}, acc:{id:'necklace',cw:0}},
    {hair:{id:'crop',cw:0}, top:{id:'hoodie',cw:1}, bottom:{id:'cargo',cw:1}, shoes:{id:'sneakers',cw:1}, acc:{id:'bag',cw:1}},
    {hair:{id:'bun',cw:1}, dress:{id:'raincoat',cw:0}, shoes:{id:'boots',cw:1}, acc:{id:'glasses',cw:0}},
    {hair:{id:'bob',cw:2}, top:{id:'tee',cw:0}, bottom:{id:'skirt',cw:0}, shoes:{id:'sandals',cw:1}, acc:{id:'sunhat',cw:2}},
  ].map((o,i)=>`<div class="qa-cell">${renderDoll(o,i)}<div class="nm">Look ${i+1}</div></div>`).join('')+'</div>';
  html+='<div class="qa-grid">';
  for(const it of ITEMS){
    const dots=it.cws.map(cid=>`<div class="cwdot" style="background:${PAL[cid].m}"></div>`).join('');
    html+=`<div class="qa-cell">${itemThumb(it,0,0)}
      <div class="nm">${it.n[LANG]}</div><div class="cat">${it.cat}</div>
      <div class="cwrow">${dots}</div></div>`;
  }
  html+='</div>';
  el.innerHTML=html; el.classList.add('on');
}
function qaSetup(){
  if(!QA) return false;
  // deterministic state for every QA scene
  S=freshSave(); S.coins=25;
  ['waves','blouse','skirt','partydress','boots','sunhat'].forEach(id=>grant(id,0));
  theme=THEMES[0]; mode='free';
  if(QA==='closet'){ qaCloset(); return true; }
  if(QA==='styling'){ enterStyling(); return true; }
  if(QA==='runway'){
    S.worn={hair:{id:'waves',cw:0}, top:null, bottom:null, dress:{id:'partydress',cw:0}, shoes:{id:'maryjanes',cw:0}, acc:{id:'necklace',cw:0}};
    grant('maryjanes',0);
    toRunway();
    // freeze mid-strut for the screenshot
    setTimeout(()=>{
      const scr=$('scr-runway');
      scr.querySelectorAll('*').forEach(n=>{});
      $('runwayDollWrap').style.animation='none';
      $('runwayDollWrap').style.transform='translateX(-50%)';
      scr.classList.add('qa-freeze');
      spawnFlash(); spawnFlash(); spawnSpark();
    }, 1400);
    return true;
  }
  if(QA==='judges'){
    S.worn={hair:{id:'waves',cw:0}, top:null, bottom:null, dress:{id:'sundress',cw:0}, shoes:{id:'sneakers',cw:0}, acc:{id:'sunhat',cw:1}};
    grant('sunhat',1);
    judgeNow();
    // fast-forward reveal animations
    setTimeout(()=>{
      document.querySelectorAll('.judgecard').forEach(c=>c.classList.add('in'));
      $('totalbox').classList.add('in');
    }, 250);
    return true;
  }
  return false;
}

/* ---------- QA hook ---------- */
window.__VR = {
  get state(){ return S; },
  save, load,
  reset(){ localStorage.removeItem(SAVE_KEY); S=freshSave(); save(); initStart(); },
  grantCoins(n){ S.coins+=n; save(); updateCoins(); return S.coins; },
  unlockAll(){ ITEMS.forEach(it=>it.cws.forEach((c,i)=>grant(it.id,i))); save(); return Object.keys(S.owned).length; },
  unlock(id,cw=0){ return grant(id,cw) && (save()||true); },
  setTheme(i){ theme=THEMES[i%THEMES.length]; return theme.id; },
  get theme(){ return theme; },
  setMode(m){ mode=m; return mode; },
  wear(slot,id,cw=0){ S.worn[slot]=id?{id,cw}:null; if(slot==='dress'&&id){S.worn.top=null;S.worn.bottom=null;} save(); return S.worn; },
  startRound, enterStyling, toRunway, judgeNow,
  get lastResult(){ return lastResult; },
  scoreOutfit,
  openDelivery(){ openDeliveryModal(); if(S.coins>=BOX_COST) startBox(); return !!delState; },
  get delState(){ return delState; },
  get currentQ(){ return delState && delState.q; },
  answer(correct){ // answer current question right or wrong
    if(!delState||!delState.q) return null;
    const q=delState.q;
    const a = correct ? q.correct : q.chips.find(c=>c!==q.correct);
    answer(a, null); return a;
  },
  answerText(a){ if(!delState||!delState.q) return null; answer(a,null); return a; },
  themeForDate(k){ return themeForDate(k).id; },
  dayKey, itemCount: ITEMS.length,
  items: ITEMS.map(i=>({id:i.id, cat:i.cat, tags:i.tags, cws:i.cws})),
  renderDoll, toast,
  scene(n){ history.replaceState(null,'','?qa='+n); location.reload(); },
};

/* ---------- boot ---------- */
load();
setMuted(muted);
if(!qaSetup()){ initStart(); }
if(PARAMS.get('debug')==='m'){
  window.addEventListener('load',()=>{ setTimeout(()=>{
    const d=document.createElement('div'); d.id='dbg';
    d.style.cssText='position:fixed;left:0;top:0;z-index:9999;background:#000;color:#0f0;font:bold 13px monospace;padding:6px;white-space:pre-wrap;width:300px;';
    const r=$('scr-start').getBoundingClientRect();
    const t=$('tagline').getBoundingClientRect();
    d.textContent='DBGM '+JSON.stringify({iw:innerWidth, ih:innerHeight,
      dsw:document.documentElement.scrollWidth, bsw:document.body.scrollWidth,
      start:[r.left,r.width], tag:[t.left,t.width], vv:[visualViewport.offsetLeft, visualViewport.width, visualViewport.scale]},null,1);
    document.body.appendChild(d);
  }, 300); });
}
