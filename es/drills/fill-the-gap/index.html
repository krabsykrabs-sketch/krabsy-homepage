  <!-- Feedback flash overlays -->
  <div id="fg-flash-correct" class="k-flash is-correct" aria-hidden="true"></div>
  <div id="fg-flash-wrong" class="k-flash is-wrong" aria-hidden="true"></div>

  <script type="module">
    import { loadStrings, getQuestions } from '/lib/krabsy-data.js';
    import { recordAttempt } from '/lib/krabsy-stats.js';

    /* ── Config ─────────────────────────────────────────────────────── */
    const QUESTIONS_PER_RUN = 10;
    const BEST_KEY = 'krabsy_best_fill_gap';
    const HUB_URL = '/es/';
    const FLASH_MS = 150;
    const CORRECT_ADVANCE_MS = 250;
    const WRONG_ADVANCE_MS = 700;

    /* ── State ──────────────────────────────────────────────────────── */
    let strings = null;
    let questions = [];    // 10 d4 fill_gap entries
    let qIndex = 0;
    let submitLocked = false;
    let startTimestamp = 0;
    let timerHandle = null;
    let missed = [];       // [{ q, typed }]
    let totalAnswered = 0;
    let correctCount = 0;
    let advanceTimer = null;

    /* ── DOM ────────────────────────────────────────────────────────── */
    const $ = (id) => document.getElementById(id);
    const loadingEl    = $('fg-loading');
    const startEl      = $('fg-start');
    const playEl       = $('fg-play');
    const endEl        = $('fg-end');
    const startBtn     = $('fg-start-btn');
    const replayBtn    = $('fg-replay-btn');
    const bestLineEl   = $('fg-best-line');
    const bestValStart = $('fg-best-value-start');
    const sentenceEl   = $('fg-sentence');
    const baseHintEl   = $('fg-base-hint');
    const formEl       = $('fg-form');
    const inputEl      = $('fg-input');
    const feedbackEl   = $('fg-feedback');
    const progressEl   = $('fg-progress-text');
    const timerEl      = $('fg-timer-value');
    const endTimeEl    = $('fg-end-time');
    const endAccEl     = $('fg-end-accuracy');
    const endBestEl    = $('fg-end-best');
    const newBestEl    = $('fg-new-best');
    const missedWrap   = $('fg-missed-wrap');
    const missedListEl = $('fg-missed-list');
    const flashCorrect = $('fg-flash-correct');
    const flashWrong   = $('fg-flash-wrong');

    /* ── Helpers ────────────────────────────────────────────────────── */
    function getNested(obj, path) {
      return path.split('.').reduce((acc, k) => (acc && acc[k] != null ? acc[k] : null), obj);
    }

    function applyStrings(root) {
      root.querySelectorAll('[data-string]').forEach((el) => {
        const key = el.getAttribute('data-string');
        const val = getNested(strings, key);
        if (typeof val === 'string') el.textContent = val;
      });
      root.querySelectorAll('[data-string-attr]').forEach((el) => {
        const spec = el.getAttribute('data-string-attr');
        // Format: "attrName:dotted.key"
        const idx = spec.indexOf(':');
        if (idx < 0) return;
        const attr = spec.slice(0, idx).trim();
        const key = spec.slice(idx + 1).trim();
        const val = getNested(strings, key);
        if (typeof val === 'string') el.setAttribute(attr, val);
      });
    }

    function showScreen(which) {
      for (const [el, name] of [[startEl, 'start'], [playEl, 'play'], [endEl, 'end']]) {
        const on = name === which;
        el.classList.toggle('fg-hidden', !on);
        el.setAttribute('aria-hidden', on ? 'false' : 'true');
      }
    }

    function formatSeconds(ms) {
      return (ms / 1000).toFixed(1);
    }

    function readBest() {
      try {
        const raw = localStorage.getItem(BEST_KEY);
        if (raw == null) return null;
        const n = Number(raw);
        return Number.isFinite(n) && n > 0 ? n : null;
      } catch (_) { return null; }
    }

    function writeBest(ms) {
      try { localStorage.setItem(BEST_KEY, String(ms)); } catch (_) {}
    }

    function updateBestLineOnStart() {
      const best = readBest();
      if (best == null) {
        bestLineEl.hidden = true;
      } else {
        bestLineEl.hidden = false;
        bestValStart.textContent = `${formatSeconds(best)}${strings.common.seconds_short}`;
      }
    }

    function flash(kind) {
      const el = kind === 'wrong' ? flashWrong : flashCorrect;
      el.classList.add('is-on');
      setTimeout(() => el.classList.remove('is-on'), FLASH_MS);
    }

    function normalize(s) {
      return (s == null ? '' : String(s)).trim().toLowerCase();
    }

    /* ── Timer ──────────────────────────────────────────────────────── */
    function startTimer() {
      startTimestamp = performance.now();
      tickTimer();
      timerHandle = setInterval(tickTimer, 100);
    }

    function stopTimer() {
      if (timerHandle != null) {
        clearInterval(timerHandle);
        timerHandle = null;
      }
    }

    function elapsedMs() {
      if (!startTimestamp) return 0;
      return performance.now() - startTimestamp;
    }

    function tickTimer() {
      timerEl.textContent = Math.floor(elapsedMs() / 1000);
    }

    /* ── Sentence rendering ─────────────────────────────────────────── */
    /**
     * Build the prompt sentence with a visual `___` blank. Splits on the
     * literal "___" token and inserts a styled span in the middle. If the
     * token is missing for some reason, render the prompt as-is.
     */
    function renderSentence(q) {
      sentenceEl.innerHTML = '';
      const prompt = q.context_sentence || q.prompt || '';
      const parts = prompt.split('___');
      if (parts.length < 2) {
        sentenceEl.textContent = prompt;
        return;
      }
      for (let i = 0; i < parts.length; i++) {
        if (parts[i]) {
          sentenceEl.appendChild(document.createTextNode(parts[i]));
        }
        if (i < parts.length - 1) {
          const blank = document.createElement('span');
          blank.className = 'fg-blank';
          blank.textContent = '___';
          sentenceEl.appendChild(blank);
        }
      }
    }

    function clearFeedback() {
      feedbackEl.innerHTML = '';
    }

    function renderQuestion() {
      const q = questions[qIndex];
      submitLocked = false;

      renderSentence(q);
      baseHintEl.textContent = `(to ${q.verb})`;

      progressEl.textContent = strings.common.question_of
        .replace('{n}', String(qIndex + 1))
        .replace('{total}', String(questions.length));

      inputEl.value = '';
      inputEl.disabled = false;
      clearFeedback();

      // Auto-focus on each new question.
      setTimeout(() => inputEl.focus(), 0);
    }

    function makePill(text, ok) {
      const span = document.createElement('span');
      span.className = ok ? 'k-pill k-pill-correct' : 'k-pill k-pill-wrong';
      span.textContent = text;
      return span;
    }

    /* ── Submit handling ────────────────────────────────────────────── */
    function handleSubmit() {
      if (submitLocked) return;
      const typed = inputEl.value;
      // Don't submit empty input — let the user type something first.
      if (normalize(typed) === '') {
        inputEl.focus();
        return;
      }
      submitLocked = true;

      const q = questions[qIndex];
      const altOk = Array.isArray(q.correct_alt)
        && q.correct_alt.some((a) => normalize(a) === normalize(typed));
      const isCorrect = normalize(typed) === normalize(q.correct_answer) || altOk;

      // Stats: use the question's own `form` field, source = "fill_gap".
      recordAttempt(q.verb, q.form, isCorrect, 'fill_gap');

      totalAnswered += 1;
      if (isCorrect) correctCount += 1;

      // Visual feedback.
      if (isCorrect) {
        flash('correct');
        feedbackEl.appendChild(makePill(q.correct_answer, true));
      } else {
        flash('wrong');
        missed.push({ q, typed });
        // Show wrong typed + correct answer side by side.
        if (typed && normalize(typed).length) {
          feedbackEl.appendChild(makePill(typed, false));
        }
        feedbackEl.appendChild(makePill(q.correct_answer, true));
      }

      inputEl.disabled = true;

      // Advance — give the user time to see the correct answer on wrong.
      const wait = isCorrect ? CORRECT_ADVANCE_MS : WRONG_ADVANCE_MS;
      clearTimeout(advanceTimer);
      advanceTimer = setTimeout(() => {
        qIndex += 1;
        if (qIndex >= questions.length) {
          finishRun();
        } else {
          renderQuestion();
        }
      }, wait);
    }

    /* ── Missed list rendering ──────────────────────────────────────── */
    function buildMissedSentenceFragment(q, typed) {
      // Inline sentence with the user's wrong answer struck through and the
      // correct answer pill next to it. Returns a DocumentFragment.
      const frag = document.createDocumentFragment();
      const prompt = q.context_sentence || q.prompt || '';
      const parts = prompt.split('___');

      const sentenceP = document.createElement('p');
      sentenceP.className = 'fg-missed-sentence';

      if (parts.length < 2) {
        sentenceP.textContent = prompt;
      } else {
        for (let i = 0; i < parts.length; i++) {
          if (parts[i]) {
            sentenceP.appendChild(document.createTextNode(parts[i]));
          }
          if (i < parts.length - 1) {
            // Show the correct answer inline as a pill within the sentence.
            sentenceP.appendChild(makePill(q.correct_answer, true));
          }
        }
        // Append the base-form parenthetical for context.
        sentenceP.appendChild(document.createTextNode(` (to ${q.verb})`));
      }
      frag.appendChild(sentenceP);

      // Row with "Du:" + the user's wrong answer pill.
      const pillsRow = document.createElement('div');
      pillsRow.className = 'fg-missed-pills';
      const lbl = document.createElement('small');
      lbl.textContent = strings.common.missed_short;
      pillsRow.appendChild(lbl);
      const typedDisplay = typed && typed.trim().length
        ? typed
        : strings.common.skip;
      pillsRow.appendChild(makePill(typedDisplay, false));
      frag.appendChild(pillsRow);

      return frag;
    }

    /* ── Run lifecycle ──────────────────────────────────────────────── */
    async function beginRun() {
      qIndex = 0;
      missed = [];
      totalAnswered = 0;
      correctCount = 0;
      submitLocked = false;
      clearTimeout(advanceTimer);

      try {
        questions = await getQuestions({
          type: 'fill_gap',
          // New verb-data schema uses difficulty 2 for all entries (each
          // entry carries a context_sentence already, so the old
          // difficulty-4 partitioning is gone).
          difficulty: 2,
          shuffle: true,
          limit: QUESTIONS_PER_RUN,
        });
      } catch (err) {
        console.error('[fill_gap] failed to load questions', err);
        return;
      }

      if (!questions.length) {
        console.warn('[fill_gap] no d4 fill_gap questions available');
        return;
      }

      showScreen('play');
      renderQuestion();
      startTimer();
    }

    function finishRun() {
      stopTimer();
      const finalMs = elapsedMs();

      const previousBest = readBest();
      const isNewBest = previousBest == null || finalMs < previousBest;
      if (isNewBest) writeBest(finalMs);

      endTimeEl.textContent = `${formatSeconds(finalMs)}${strings.common.seconds_short}`;
      endTimeEl.classList.toggle('is-new-best', isNewBest);

      const accPct = totalAnswered > 0
        ? Math.round((correctCount / totalAnswered) * 100)
        : 0;
      endAccEl.textContent = `${accPct}%`;

      const newBest = readBest();
      endBestEl.textContent = newBest != null
        ? `${formatSeconds(newBest)}${strings.common.seconds_short}`
        : strings.common.no_best_yet;

      newBestEl.hidden = !isNewBest;

      // Missed sentences list.
      if (missed.length) {
        missedWrap.hidden = false;
        missedListEl.innerHTML = '';
        for (const m of missed) {
          const li = document.createElement('li');
          li.appendChild(buildMissedSentenceFragment(m.q, m.typed));
          missedListEl.appendChild(li);
        }
      } else {
        missedWrap.hidden = true;
      }

      showScreen('end');
    }

    /* ── Event wiring ───────────────────────────────────────────────── */
    formEl.addEventListener('submit', (e) => {
      e.preventDefault();
      handleSubmit();
    });

    // Enter from the input → submit.
    inputEl.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') {
        e.preventDefault();
        handleSubmit();
      }
    });

    // ESC anywhere → back to hub.
    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape') {
        window.location.href = HUB_URL;
      }
    });

    /* ── Boot ───────────────────────────────────────────────────────── */
    (async function boot() {
      try {
        strings = await loadStrings();
      } catch (err) {
        console.error('[fill_gap] failed to load UI strings', err);
        loadingEl.textContent = 'Fehler beim Laden.';
        return;
      }

      applyStrings(document);

      loadingEl.classList.add('fg-hidden');
      updateBestLineOnStart();
      showScreen('start');

      startBtn.addEventListener('click', beginRun);
      replayBtn.addEventListener('click', beginRun);
    })();
  </script>
  <script type="module">
    import { initDrillPage } from '/lib/krabsy-nav.js';
    initDrillPage('fill_gap');
  </script>
    <script src="/lib/krabsy-footer.js" defer></script>
    <script src="/lib/krabsy-lang-switch.js" defer></script>
  <script src="/lib/krabsy-analytics.js" defer></script>
</body>
