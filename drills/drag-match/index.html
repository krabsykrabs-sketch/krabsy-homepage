  <style>
    /* ── Drag Match layout ─────────────────────────────────────────────── */
    .dm-wrap {
      max-width: 1040px;
      margin: 0 auto;
      padding: var(--space-5) var(--space-4);
      width: 100%;
    }

    .dm-hidden { display: none !important; }

    .dm-loading {
      text-align: center;
      padding: var(--space-7) var(--space-4);
      color: var(--krabsy-ink-mute);
      font-size: 0.95rem;
    }

    /* ── Start / End shared card ──────────────────────────────────────── */
    .dm-start-card,
    .dm-end-card {
      text-align: center;
      padding: var(--space-6) var(--space-5);
    }
    .dm-start-card .k-h1,
    .dm-end-card .k-h1 {
      font-size: 2rem;
      margin-bottom: var(--space-3);
    }
    .dm-tagline {
      font-size: 1rem;
      color: var(--krabsy-ink-mute);
      margin: 0 0 var(--space-4);
    }
    .dm-intro {
      font-size: 0.95rem;
      color: var(--krabsy-ink);
      max-width: 620px;
      margin: 0 auto var(--space-5);
      line-height: 1.55;
    }
    .dm-best-line {
      font-size: 0.9rem;
      color: var(--krabsy-ink-mute);
      margin: var(--space-4) 0 0;
    }
    .dm-best-value {
      color: var(--krabsy-coral-dark);
      font-weight: 700;
      font-variant-numeric: tabular-nums;
    }

    /* ── Play topbar ──────────────────────────────────────────────────── */
    .dm-topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: var(--space-3);
      margin-bottom: var(--space-4);
      min-height: 36px;
      flex-wrap: wrap;
    }
    .dm-stage-pill {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      font-family: var(--font-body);
      font-weight: 700;
      font-size: 0.85rem;
      letter-spacing: 0.5px;
      text-transform: uppercase;
      color: var(--krabsy-ink-mute);
    }
    .dm-stage-num {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 22px; height: 22px;
      padding: 0 7px;
      border-radius: var(--radius-pill);
      background: var(--krabsy-lavender-soft);
      color: var(--krabsy-ink);
      font-size: 0.75rem;
    }
    .dm-stage-pill.is-pp .dm-stage-num {
      background: var(--krabsy-coral);
      color: var(--krabsy-white);
    }
    .dm-progress-text {
      font-size: 0.85rem;
      color: var(--krabsy-ink-mute);
      font-variant-numeric: tabular-nums;
    }
    .dm-timer {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      font-family: var(--font-display);
      font-size: 1.6rem;
      color: var(--krabsy-ink);
      font-variant-numeric: tabular-nums;
      padding: 6px 16px;
      background: var(--krabsy-lavender-soft);
      border-radius: var(--radius-pill);
      position: relative;
    }
    .dm-penalty {
      position: absolute;
      right: -10px; top: -10px;
      background: var(--krabsy-coral);
      color: var(--krabsy-white);
      font-family: var(--font-body);
      font-size: 0.75rem; font-weight: 700;
      padding: 3px 9px;
      border-radius: var(--radius-pill);
      opacity: 0;
      transform: translateY(4px);
      transition: opacity 0.18s ease, transform 0.18s ease;
      pointer-events: none;
    }
    .dm-penalty.is-on {
      opacity: 1;
      transform: translateY(0);
    }
    .dm-wrong-hint {
      font-size: 0.85rem;
      color: var(--krabsy-ink-mute);
      text-align: center;
      margin: 0 0 var(--space-4);
      min-height: 1.2em;
    }

    /* ── Stage-complete banner (between past and pp stages) ──────────── */
    .dm-stage-banner {
      text-align: center;
      padding: var(--space-3) var(--space-4);
      background: var(--krabsy-sage);
      color: var(--krabsy-ink);
      border-radius: var(--radius-md);
      font-family: var(--font-display);
      font-size: 1.1rem;
      margin-bottom: var(--space-4);
      transform: translateY(-4px);
      opacity: 0;
      transition: transform 0.25s ease, opacity 0.25s ease;
      pointer-events: none;
    }
    .dm-stage-banner.is-on {
      transform: translateY(0);
      opacity: 1;
    }

    /* ── Board ────────────────────────────────────────────────────────── */
    .dm-board {
      display: grid;
      grid-template-columns: 1fr;
      gap: var(--space-4);
    }
    @media (min-width: 640px) {
      .dm-board {
        grid-template-columns: 1.05fr 1fr;
        gap: var(--space-5);
      }
    }

    .dm-col {
      display: flex;
      flex-direction: column;
      gap: var(--space-2);
    }

    .dm-col-heading {
      font-family: var(--font-display);
      font-size: 1.05rem;
      color: var(--krabsy-ink-mute);
      text-align: center;
      margin: 0 0 var(--space-2);
    }

    /* ── Rows on the left column: [base + maybe past sub-line] + [drop slot] ─ */
    .dm-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: var(--space-2);
      align-items: stretch;
      min-height: 56px;
      padding: 4px;
      border-radius: var(--radius-md);
      transition: background-color 0.15s ease;
    }
    /* Stage 2 row: 3 cells side-by-side [base | past-locked | drop-slot] */
    .dm-row.is-stage-pp {
      grid-template-columns: 1fr 1fr 1.05fr;
    }
    .dm-row.is-drop-active {
      background: var(--krabsy-coral-soft);
    }

    .dm-base {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      justify-self: center;
      align-self: center;
      background: var(--krabsy-white);
      border: 2px solid var(--krabsy-lavender);
      border-radius: var(--radius-sm);
      padding: 7px 14px;
      min-width: 90px;
      max-width: 100%;
      font-family: var(--font-body);
      font-weight: 700;
      font-size: 1.05rem;
      color: var(--krabsy-ink);
      cursor: pointer;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
      transition: border-color 0.15s ease, background-color 0.15s ease;
      text-align: center;
    }
    .dm-base.is-selected,
    .dm-row.is-drop-active .dm-base {
      border-color: var(--krabsy-coral);
      background: var(--krabsy-coral-soft);
    }
    .dm-base.is-past-locked {
      cursor: default;
    }

    /* Past form locked between base and the PP drop-slot, in stage 2 */
    .dm-past-locked {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      justify-self: center;
      align-self: center;
      background: var(--krabsy-sage-soft);
      color: var(--krabsy-ink);
      font-family: var(--font-body);
      font-weight: 700;
      font-size: 1rem;
      padding: 7px 14px;
      min-width: 90px;
      max-width: 100%;
      border-radius: var(--radius-sm);
      text-align: center;
      letter-spacing: 0.2px;
    }

    /* Narrow screens: shrink type a notch so the longest pair still fits */
    @media (max-width: 560px) {
      .dm-base { font-size: 0.95rem; padding: 6px 8px; }
      .dm-past-locked { font-size: 0.9rem; padding: 6px 8px; }
      .dm-row.is-stage-pp { gap: 4px; }
    }

    /* The drop slot — visible empty target that becomes the locked pill */
    .dm-slot {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      justify-self: center;
      align-self: center;
      padding: 6px 14px;
      min-width: 130px;
      max-width: 100%;
      border-radius: var(--radius-sm);
      transition: background-color 0.15s ease;
    }
    .dm-slot.is-empty {
      border: 2px dashed var(--krabsy-lavender);
      background: rgba(186, 191, 216, 0.10);
      color: var(--krabsy-ink-mute);
      font-size: 0.78rem;
      letter-spacing: 0.3px;
      font-style: italic;
      min-height: 40px;
    }
    .dm-row.is-drop-active .dm-slot.is-empty {
      border-color: var(--krabsy-coral);
      background: var(--krabsy-coral-soft);
      color: var(--krabsy-ink);
    }
    .dm-pill-locked {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      font-family: var(--font-body);
      font-weight: 700;
      font-size: 0.95rem;
      padding: 7px 14px;
      border-radius: var(--radius-pill);
      background: var(--krabsy-sage);
      color: var(--krabsy-ink);
      letter-spacing: 0.3px;
    }

    /* ── Right column — pile of draggable chips ──────────────────────── */
    .dm-pile {
      display: flex;
      flex-direction: column;
      gap: var(--space-2);
    }
    .dm-pile-slot {
      min-height: 48px;
      padding: 4px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .dm-pile-slot.is-empty {
      opacity: 0;
      pointer-events: none;
    }

    .dm-chip {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      background: var(--krabsy-white);
      border: 2px solid var(--krabsy-sage);
      border-radius: var(--radius-pill);
      padding: 8px 18px;
      min-width: 90px;
      font-family: var(--font-body);
      font-weight: 700;
      font-size: 1rem;
      color: var(--krabsy-ink);
      cursor: grab;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
      /* Pointer-drag essentials: */
      touch-action: none;          /* don't scroll/zoom on touch drag */
      will-change: transform;
    }
    .dm-chip.is-selected-by-tap {
      border-color: var(--krabsy-coral);
      background: var(--krabsy-coral-soft);
    }
    .dm-chip.is-dragging {
      cursor: grabbing;
      pointer-events: none;        /* so elementFromPoint sees what's under */
      z-index: 1000;
      box-shadow: var(--shadow-elev);
      transition: none;
    }
    .dm-chip.is-snap-back {
      transition: transform 0.22s cubic-bezier(.34,1.56,.64,1);
    }
    .dm-chip:active { cursor: grabbing; }

    /* ── End screen ───────────────────────────────────────────────────── */
    .dm-end-stats {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: var(--space-3);
      margin: var(--space-4) 0 var(--space-5);
      max-width: 540px;
      margin-left: auto;
      margin-right: auto;
    }
    .dm-end-stat {
      display: flex; flex-direction: column; align-items: center;
      padding: var(--space-3);
      background: var(--krabsy-lavender-soft);
      border-radius: var(--radius-sm);
    }
    .dm-end-stat-value {
      font-family: var(--font-display);
      font-size: 1.4rem;
      color: var(--krabsy-ink);
    }
    .dm-end-stat-label {
      font-size: 0.75rem;
      color: var(--krabsy-ink-mute);
      margin-top: 2px;
      letter-spacing: 0.3px;
      text-align: center;
    }
    .dm-new-best-flag {
      display: inline-block;
      background: var(--krabsy-coral);
      color: var(--krabsy-white);
      font-family: var(--font-body);
      font-weight: 700;
      font-size: 0.8rem;
      padding: 4px 12px;
      border-radius: var(--radius-pill);
      margin-bottom: var(--space-3);
      letter-spacing: 0.4px;
    }
    .dm-end-actions {
      display: flex;
      gap: var(--space-3);
      justify-content: center;
      flex-wrap: wrap;
    }
  </style>
</head>

  <script type="module">
    import { loadStrings, pickRandomVerbs, getVerbRow } from '../../lib/krabsy-data.js';
    import { recordAttempt } from '../../lib/krabsy-stats.js';

    /* ── Constants ──────────────────────────────────────────────────── */
    const PAIR_COUNT = 8;
    const WRONG_PENALTY_MS = 2000;
    const BEST_KEY = 'krabsy_best_drag_match_v3'; // v3 = 8-verb two-stage past+pp
    const HUB_URL = '../../index.html';

    /* ── State ──────────────────────────────────────────────────────── */
    let strings = null;
    let pairs = [];                  // [{ verb, past, participle }] in fixed left-column order
    let stage = 'past';              // "past" | "pp"
    let resolvedInStage = 0;
    let attempts = 0;
    let startTimestamp = 0;
    let penaltyMs = 0;
    let timerHandle = null;
    let selectedTapChip = null;      // chip element currently tap-selected
    let selectedTapBase = null;      // base element currently tap-selected (alt mode)

    // Pointer-drag state
    let drag = null; // { chipEl, pointerId, startX, startY, lastTarget }

    /* ── DOM helpers ────────────────────────────────────────────────── */
    const $ = (id) => document.getElementById(id);
    const loadingEl    = $('dm-loading');
    const startEl      = $('dm-start');
    const playEl       = $('dm-play');
    const endEl        = $('dm-end');
    const startBtn     = $('dm-start-btn');
    const replayBtn    = $('dm-replay-btn');
    const bestLineEl   = $('dm-best-line');
    const bestValStart = $('dm-best-value-start');
    const rowsEl       = $('dm-rows');
    const pileEl       = $('dm-pile');
    const pileHeading  = $('dm-pile-heading');
    const stagePill    = $('dm-stage-pill');
    const stageNum     = $('dm-stage-num');
    const stageLabelEl = $('dm-stage-label');
    const stageBanner  = $('dm-stage-banner');
    const progressEl   = $('dm-progress-text');
    const timerEl      = $('dm-timer-value');
    const penaltyEl    = $('dm-penalty-badge');
    const endTimeEl    = $('dm-end-time');
    const endAttemptsEl= $('dm-end-attempts');
    const endBestEl    = $('dm-end-best');
    const newBestEl    = $('dm-new-best');
    const flashWrong   = $('dm-flash-wrong');
    const flashCorrect = $('dm-flash-correct');

    /* ── i18n ───────────────────────────────────────────────────────── */
    function getString(path) {
      if (!strings) return '';
      const parts = path.split('.');
      let cur = strings;
      for (const p of parts) { if (cur == null) return ''; cur = cur[p]; }
      return cur == null ? '' : cur;
    }
    function applyStrings(root = document) {
      root.querySelectorAll('[data-string]').forEach((el) => {
        const v = getString(el.getAttribute('data-string'));
        if (v) el.textContent = v;
      });
    }

    /* ── Utilities ──────────────────────────────────────────────────── */
    function shuffle(arr) {
      const a = arr.slice();
      for (let i = a.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [a[i], a[j]] = [a[j], a[i]];
      }
      return a;
    }
    function fmtSec(ms) { return (Math.max(0, ms) / 1000).toFixed(1); }
    function cssEscape(s) {
      if (window.CSS && CSS.escape) return CSS.escape(s);
      return String(s).replace(/[^a-zA-Z0-9_-]/g, (c) => `\\${c}`);
    }
    function readBest() {
      try {
        const v = localStorage.getItem(BEST_KEY);
        if (v == null) return null;
        const n = parseInt(v, 10);
        return Number.isFinite(n) && n > 0 ? n : null;
      } catch (_) { return null; }
    }
    function writeBest(ms) {
      try { localStorage.setItem(BEST_KEY, String(ms)); } catch (_) {}
    }
    function showScreen(which) {
      [loadingEl, startEl, playEl, endEl].forEach((el) => {
        if (!el) return;
        el.classList.add('dm-hidden');
        el.setAttribute('aria-hidden', 'true');
      });
      const target = which === 'start' ? startEl
                   : which === 'play'  ? playEl
                   : which === 'end'   ? endEl
                   : loadingEl;
      if (target) {
        target.classList.remove('dm-hidden');
        target.setAttribute('aria-hidden', 'false');
      }
    }

    /* ── Round setup ────────────────────────────────────────────────── */
    async function buildRound() {
      const verbs = await pickRandomVerbs(PAIR_COUNT * 2);
      const rows = await Promise.all(verbs.map((v) => getVerbRow(v)));
      const usable = rows.filter((r) => r && r.past && r.participle);
      pairs = usable.slice(0, PAIR_COUNT).map((r) => ({
        verb: r.verb, past: r.past, participle: r.participle,
      }));
    }

    function renderBoard() {
      // Left column rows
      rowsEl.innerHTML = '';
      pairs.forEach((pair, i) => {
        const row = document.createElement('div');
        row.className = 'dm-row';
        row.dataset.verb = pair.verb;
        row.dataset.rowIndex = String(i);
        row.style.marginBottom = 'var(--space-2)';

        const base = document.createElement('div');
        base.className = 'dm-base';
        base.dataset.verb = pair.verb;
        base.setAttribute('role', 'button');
        base.setAttribute('tabindex', '0');
        const baseLabel = document.createElement('span');
        baseLabel.textContent = pair.verb;
        base.appendChild(baseLabel);
        wireBase(base);

        const slot = document.createElement('div');
        slot.className = 'dm-slot is-empty';
        slot.dataset.verb = pair.verb;
        slot.textContent = getString('drills.drag_match.drop_here_past') || '';

        row.appendChild(base);
        row.appendChild(slot);
        rowsEl.appendChild(row);
      });

      // Right column pile
      renderPile();
      updateProgress();
      updateStageUi();
    }

    function renderPile() {
      pileEl.innerHTML = '';
      const items = shuffle(pairs.map((p) => ({
        verb: p.verb,
        text: stage === 'past' ? p.past : p.participle,
      })));
      items.forEach((item) => {
        const slot = document.createElement('div');
        slot.className = 'dm-pile-slot';

        const chip = document.createElement('div');
        chip.className = 'dm-chip';
        chip.dataset.verb = item.verb;
        chip.dataset.form = stage;        // "past" | "pp"
        chip.textContent = item.text;
        chip.setAttribute('role', 'button');
        chip.setAttribute('tabindex', '0');
        wireChip(chip);

        slot.appendChild(chip);
        pileEl.appendChild(slot);
      });
    }

    function updateProgress() {
      progressEl.textContent = `${resolvedInStage} / ${pairs.length}`;
    }

    function updateStageUi() {
      const isPast = stage === 'past';
      stageNum.textContent = isPast ? '1/2' : '2/2';
      stageLabelEl.textContent = isPast
        ? (getString('drills.drag_match.stage_past') || 'Simple Past')
        : (getString('drills.drag_match.stage_pp') || 'Past Participle');
      stagePill.classList.toggle('is-pp', !isPast);
      pileHeading.textContent = isPast
        ? (getString('drills.drag_match.column_past') || 'Simple Past')
        : (getString('drills.drag_match.column_pp') || 'Past Participle');
    }

    /* ── Tap mode (accessibility / mobile alt) ──────────────────────── */
    function wireBase(baseEl) {
      baseEl.addEventListener('click', (ev) => {
        ev.preventDefault();
        if (baseEl.classList.contains('is-past-locked') && stage === 'past') return;
        const verb = baseEl.dataset.verb;
        // If a chip was selected, attempting to tap a base resolves the pair
        if (selectedTapChip) {
          const chipVerb = selectedTapChip.dataset.verb;
          const chipEl = selectedTapChip;
          clearTapSelection();
          resolvePair(verb, chipVerb, chipEl);
          return;
        }
        // Else toggle base selection
        if (selectedTapBase === baseEl) {
          clearTapSelection();
        } else {
          clearTapSelection();
          selectedTapBase = baseEl;
          baseEl.classList.add('is-selected');
          ensureTimerStarted();
        }
      });
      baseEl.addEventListener('keydown', (ev) => {
        if (ev.key === 'Enter' || ev.key === ' ') { ev.preventDefault(); baseEl.click(); }
      });
    }

    function wireChip(chipEl) {
      // Tap mode: click a chip → if a base is selected, resolve; else select the chip.
      chipEl.addEventListener('click', (ev) => {
        // If the click came from a pointer-drag release, suppress.
        if (chipEl._suppressClick) { chipEl._suppressClick = false; ev.preventDefault(); return; }
        ev.preventDefault();
        if (selectedTapBase) {
          const baseVerb = selectedTapBase.dataset.verb;
          clearTapSelection();
          resolvePair(baseVerb, chipEl.dataset.verb, chipEl);
          return;
        }
        if (selectedTapChip === chipEl) {
          clearTapSelection();
        } else {
          clearTapSelection();
          selectedTapChip = chipEl;
          chipEl.classList.add('is-selected-by-tap');
          ensureTimerStarted();
        }
      });
      chipEl.addEventListener('keydown', (ev) => {
        if (ev.key === 'Enter' || ev.key === ' ') { ev.preventDefault(); chipEl.click(); }
      });

      // Pointer-drag mode (mouse + touch, unified) — chip follows the cursor.
      chipEl.addEventListener('pointerdown', onPointerDown);
    }

    function clearTapSelection() {
      if (selectedTapBase) selectedTapBase.classList.remove('is-selected');
      if (selectedTapChip) selectedTapChip.classList.remove('is-selected-by-tap');
      selectedTapBase = null;
      selectedTapChip = null;
    }

    /* ── Pointer-drag ───────────────────────────────────────────────── */
    function onPointerDown(ev) {
      // Mouse: left button only.
      if (ev.pointerType === 'mouse' && ev.button !== 0) return;
      const chipEl = ev.currentTarget;
      if (chipEl.dataset.consumed === '1') return;
      ev.preventDefault();
      try { chipEl.setPointerCapture(ev.pointerId); } catch (_) {}
      ensureTimerStarted();

      drag = {
        chipEl,
        pointerId: ev.pointerId,
        startX: ev.clientX,
        startY: ev.clientY,
        lastTarget: null,
        moved: false,
      };
      chipEl.classList.add('is-dragging');
      chipEl.style.transition = 'none';

      chipEl.addEventListener('pointermove', onPointerMove);
      chipEl.addEventListener('pointerup', onPointerUp);
      chipEl.addEventListener('pointercancel', onPointerCancel);
    }

    function onPointerMove(ev) {
      if (!drag || ev.pointerId !== drag.pointerId) return;
      const dx = ev.clientX - drag.startX;
      const dy = ev.clientY - drag.startY;
      if (!drag.moved && (Math.abs(dx) > 3 || Math.abs(dy) > 3)) {
        drag.moved = true;
      }
      drag.chipEl.style.transform = `translate3d(${dx}px, ${dy}px, 0)`;

      const under = document.elementFromPoint(ev.clientX, ev.clientY);
      const row = under ? under.closest('.dm-row[data-verb]') : null;
      if (row !== drag.lastTarget) {
        if (drag.lastTarget) drag.lastTarget.classList.remove('is-drop-active');
        if (row) row.classList.add('is-drop-active');
        drag.lastTarget = row;
      }
    }

    function onPointerUp(ev) {
      if (!drag || ev.pointerId !== drag.pointerId) return;
      const chipEl = drag.chipEl;
      const under = document.elementFromPoint(ev.clientX, ev.clientY);
      const row = under ? under.closest('.dm-row[data-verb]') : null;

      if (drag.lastTarget) drag.lastTarget.classList.remove('is-drop-active');
      cleanupPointer(ev);

      if (drag.moved && row) {
        // Drop resolved against the row's verb
        const targetVerb = row.dataset.verb;
        drag = null;
        // Suppress the synthesized click after a drag-drop
        chipEl._suppressClick = true;
        resolvePair(targetVerb, chipEl.dataset.verb, chipEl);
      } else if (drag.moved) {
        // Dragged but dropped on nothing → animate back
        snapBack(chipEl);
        drag = null;
      } else {
        // Didn't actually drag — treat as a click (chip selection)
        chipEl.style.transform = '';
        chipEl.classList.remove('is-dragging');
        drag = null;
        // Let the click handler fire naturally
      }
    }

    function onPointerCancel(ev) {
      if (!drag || ev.pointerId !== drag.pointerId) return;
      const chipEl = drag.chipEl;
      if (drag.lastTarget) drag.lastTarget.classList.remove('is-drop-active');
      cleanupPointer(ev);
      snapBack(chipEl);
      drag = null;
    }

    function cleanupPointer(ev) {
      if (!drag) return;
      const chipEl = drag.chipEl;
      try { chipEl.releasePointerCapture(ev.pointerId); } catch (_) {}
      chipEl.removeEventListener('pointermove', onPointerMove);
      chipEl.removeEventListener('pointerup', onPointerUp);
      chipEl.removeEventListener('pointercancel', onPointerCancel);
    }

    function snapBack(chipEl) {
      chipEl.classList.add('is-snap-back');
      chipEl.style.transform = '';
      const cleanup = () => {
        chipEl.classList.remove('is-snap-back', 'is-dragging');
        chipEl.style.transition = '';
        chipEl.removeEventListener('transitionend', cleanup);
      };
      chipEl.addEventListener('transitionend', cleanup);
      // Fallback in case transitionend doesn't fire
      setTimeout(cleanup, 350);
    }

    /* ── Resolution ─────────────────────────────────────────────────── */
    function resolvePair(targetVerb, chipVerb, chipEl) {
      ensureTimerStarted();
      attempts += 1;

      const correct = (targetVerb === chipVerb);
      const formForStats = (stage === 'past') ? 'past' : 'participle';
      recordAttempt(targetVerb, formForStats, correct, 'drag_match');

      if (correct) {
        lockPair(targetVerb, chipEl);
        resolvedInStage += 1;
        updateProgress();
        flashCorrectOnce();
        if (resolvedInStage >= pairs.length) {
          onStageComplete();
        }
      } else {
        penaltyMs += WRONG_PENALTY_MS;
        showPenaltyBadge();
        flashWrongOnce();
        if (chipEl) snapBack(chipEl);
      }
    }

    function lockPair(verb, chipEl) {
      // Fill the slot in the matching row with a locked pill
      const row = rowsEl.querySelector(`.dm-row[data-verb="${cssEscape(verb)}"]`);
      if (!row) return;
      const slot = row.querySelector('.dm-slot');
      const pair = pairs.find((p) => p.verb === verb);
      const text = stage === 'past' ? (pair && pair.past) : (pair && pair.participle);

      if (slot) {
        slot.classList.remove('is-empty');
        slot.innerHTML = '';
        const pill = document.createElement('div');
        pill.className = 'dm-pill-locked';
        pill.textContent = text || '';
        slot.appendChild(pill);
      }

      // Remove the chip from the pile (its slot stays for layout stability)
      if (chipEl) {
        chipEl.dataset.consumed = '1';
        chipEl.style.transform = '';
        chipEl.classList.remove('is-dragging', 'is-snap-back', 'is-selected-by-tap');
        const parent = chipEl.parentElement;
        if (parent) {
          parent.classList.add('is-empty');
          parent.innerHTML = '';
        }
      }
    }

    /* ── Stage transition ───────────────────────────────────────────── */
    function onStageComplete() {
      if (stage === 'past') {
        // Show a brief banner, then transition to PP stage.
        showStageBanner(getString('drills.drag_match.stage_complete_past') || '');
        setTimeout(() => {
          beginPpStage();
        }, 900);
      } else {
        finishRound();
      }
    }

    function beginPpStage() {
      stage = 'pp';
      resolvedInStage = 0;
      // For each row: switch to 3-cell layout, insert the locked past as its
      // own middle cell, and re-empty the right-hand slot for the PP drop.
      pairs.forEach((pair) => {
        const row = rowsEl.querySelector(`.dm-row[data-verb="${cssEscape(pair.verb)}"]`);
        if (!row) return;
        row.classList.add('is-stage-pp');

        const base = row.querySelector('.dm-base');
        const slot = row.querySelector('.dm-slot');
        if (base) base.classList.add('is-past-locked');

        // Insert the past-locked cell between base and slot (only once)
        if (base && slot && !row.querySelector('.dm-past-locked')) {
          const pastCell = document.createElement('div');
          pastCell.className = 'dm-past-locked';
          pastCell.textContent = pair.past;
          row.insertBefore(pastCell, slot);
        }

        // Reset the slot to empty for the PP drop
        if (slot) {
          slot.innerHTML = '';
          slot.classList.add('is-empty');
          slot.textContent = getString('drills.drag_match.drop_here_pp') || '';
        }
      });
      // Refill the right pile with shuffled PP chips
      renderPile();
      updateProgress();
      updateStageUi();
      hideStageBannerAfter(400);
    }

    function showStageBanner(text) {
      stageBanner.textContent = text;
      stageBanner.classList.add('is-on');
    }
    function hideStageBannerAfter(ms) {
      setTimeout(() => stageBanner.classList.remove('is-on'), ms);
    }

    /* ── Timer ──────────────────────────────────────────────────────── */
    function ensureTimerStarted() {
      if (startTimestamp === 0) {
        startTimestamp = performance.now();
        timerHandle = setInterval(tickTimer, 100);
        tickTimer();
      }
    }
    function tickTimer() {
      if (!startTimestamp) return;
      const elapsed = performance.now() - startTimestamp + penaltyMs;
      timerEl.textContent = Math.floor(Math.max(0, elapsed) / 1000);
    }
    function stopTimer() {
      if (timerHandle) { clearInterval(timerHandle); timerHandle = null; }
    }
    function showPenaltyBadge() {
      penaltyEl.classList.add('is-on');
      clearTimeout(showPenaltyBadge._t);
      showPenaltyBadge._t = setTimeout(() => penaltyEl.classList.remove('is-on'), 700);
    }
    function flashWrongOnce() {
      flashWrong.classList.add('is-on');
      clearTimeout(flashWrongOnce._t);
      flashWrongOnce._t = setTimeout(() => flashWrong.classList.remove('is-on'), 150);
    }
    function flashCorrectOnce() {
      flashCorrect.classList.add('is-on');
      clearTimeout(flashCorrectOnce._t);
      flashCorrectOnce._t = setTimeout(() => flashCorrect.classList.remove('is-on'), 120);
    }

    /* ── End ────────────────────────────────────────────────────────── */
    function finishRound() {
      stopTimer();
      const totalMs = (performance.now() - startTimestamp) + penaltyMs;
      const prevBest = readBest();
      const isBest = prevBest == null || totalMs < prevBest;
      if (isBest) writeBest(Math.round(totalMs));

      endTimeEl.textContent = `${fmtSec(totalMs)}s`;
      endAttemptsEl.textContent = String(attempts);
      const best = readBest();
      endBestEl.textContent = best != null ? `${fmtSec(best)}s` : '—';
      newBestEl.hidden = !isBest;

      showScreen('end');
    }

    function resetRoundState() {
      pairs = [];
      stage = 'past';
      resolvedInStage = 0;
      attempts = 0;
      startTimestamp = 0;
      penaltyMs = 0;
      selectedTapBase = null;
      selectedTapChip = null;
      drag = null;
      stopTimer();
      timerEl.textContent = '0';
      penaltyEl.classList.remove('is-on');
      flashWrong.classList.remove('is-on');
      flashCorrect.classList.remove('is-on');
      stageBanner.classList.remove('is-on');
      stagePill.classList.remove('is-pp');
    }

    async function startRound() {
      resetRoundState();
      showScreen('loading');
      await buildRound();
      renderBoard();
      showScreen('play');
    }

    function refreshBestLine() {
      const best = readBest();
      if (best != null) {
        bestValStart.textContent = `${fmtSec(best)}s`;
        bestLineEl.hidden = false;
      } else {
        bestLineEl.hidden = true;
      }
    }

    /* ── Init ───────────────────────────────────────────────────────── */
    async function init() {
      try { strings = await loadStrings(); }
      catch (err) { console.warn('Could not load UI strings:', err); }
      applyStrings();
      refreshBestLine();
      showScreen('start');

      startBtn.addEventListener('click', () => { startRound(); });
      replayBtn.addEventListener('click', () => { refreshBestLine(); startRound(); });

      document.addEventListener('keydown', (ev) => {
        if (ev.key === 'Escape') window.location.href = HUB_URL;
      });

      // Safety: if a drag is interrupted by losing the window
      window.addEventListener('blur', () => {
        if (drag) {
          const chipEl = drag.chipEl;
          if (drag.lastTarget) drag.lastTarget.classList.remove('is-drop-active');
          snapBack(chipEl);
          drag = null;
        }
      });
    }

    init();
  </script>
  <script type="module">
    import { initDrillPage } from '../../lib/krabsy-nav.js';
    initDrillPage('drag_match');
  </script>
    <script src="/lib/krabsy-footer.js" defer></script>
  <script src="/lib/krabsy-analytics.js" defer></script>
</body>
</html>
