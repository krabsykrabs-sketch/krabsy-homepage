<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Krabsy</title>
  <meta name="robots" content="noindex,follow">
  <meta http-equiv="refresh" content="0; url=/de/">
  <link rel="canonical" href="https://krabsy.com/de/">
  <link rel="alternate" hreflang="de" href="https://krabsy.com/de/">
  <link rel="alternate" hreflang="es" href="https://krabsy.com/es/">
  <link rel="alternate" hreflang="x-default" href="https://krabsy.com/de/">
  <script>
    (function () {
      try {
        var stored = localStorage.getItem('krabsy_lang');
        var nav = (navigator.language || navigator.userLanguage || '').toLowerCase();
        var target = '/de/';
        if (stored === 'es') target = '/es/';
        else if (stored === 'de') target = '/de/';
        else if (nav.indexOf('es') === 0) target = '/es/';
        else target = '/de/';
        window.location.replace(target);
      } catch (_) {
        window.location.replace('/de/');
      }
    })();
  </script>
</head>
<body>
  <p>Weiter zu <a href="/de/">krabsy.com (Deutsch)</a> / <a href="/es/">krabsy.com (Español)</a></p>
</body>
</html>
