  <style>
    body { background: var(--krabsy-cream); }

    .logo {
      display: inline-flex; align-items: center; gap: 0;
      font-family: var(--font-display); font-size: 1.6rem;
      text-decoration: none; color: var(--krabsy-ink);
      letter-spacing: -0.5px; line-height: 1;
    }
    .logo-crab {
      display: inline-flex; width: 1.15em; height: 1.15em;

      margin: 0 -0.04em; vertical-align: middle;
    }
    .logo-crab img { display: block; width: 100%; height: 100%; object-fit: contain; pointer-events: none; }

    .gh-hero {
      max-width: 960px; margin: 0 auto;
      padding: var(--space-6) var(--space-5) var(--space-4);
      text-align: center;
    }
    .gh-hero-title {
      font-family: var(--font-display); font-size: 1.6rem;
      color: var(--krabsy-ink); margin: 0 0 8px; line-height: 1.2;
    }
    .gh-hero-sub {
      font-size: 0.95rem; color: var(--krabsy-ink-mute);
      margin: 0; line-height: 1.5;
    }
    @media (min-width: 720px) {
      .gh-hero { padding: var(--space-7) var(--space-6) var(--space-5); }
      .gh-hero-title { font-size: 2rem; }
      .gh-hero-sub { font-size: 1.05rem; }
    }

    .gh-section {
      max-width: 1100px; margin: 0 auto;
      padding: 0 var(--space-5) var(--space-7); width: 100%;
    }
    @media (min-width: 720px) {
      .gh-section { padding: 0 var(--space-6) var(--space-8); }
    }
    .games-grid {
      display: grid; gap: 18px; grid-template-columns: 1fr;
    }
    @media (min-width: 560px) { .games-grid { grid-template-columns: repeat(2, 1fr); } }
    @media (min-width: 900px) { .games-grid { grid-template-columns: repeat(3, 1fr); } }
  </style>
</head>
<body>
  <div class="k-page">

    <!-- ── Header ───────────────────────────────────────────────────────── -->
    <header class="k-page-header">
      <a href="/es/" class="logo" aria-label="Krabsy">
        <span>kr</span>

      </a>
      <div class="k-lang-toggle" role="group" aria-label="Seleccionar idioma">
        <button class="k-lang-btn" type="button" data-lang="de">DE</button>
        <button class="k-lang-btn is-active" type="button" data-lang="es">ES</button>
      </div>
    </header>

    <!-- ── Hero ───────────────────────────────────────────────────────── -->
    <section class="gh-hero">
      <h1 class="gh-hero-title">Juegos de Krabsy</h1>
      <p class="gh-hero-sub">Todos los juegos arcade de Krabsy. Todos te ayudan a aprender inglés mientras juegas.</p>
    </section>

    <!-- ── Games grid ─────────────────────────────────────────────────── -->
    <section class="gh-section">
      <!-- TODO: añadir chip-bar de filtro por tema ("Todos los temas / Verbos
                 Irregulares") cuando exista un segundo tema. Por ahora sólo
                 hay un tema, así que el filtro sería puramente cosmético. La
                 infraestructura ya existe vía getGamesForTopic(). -->
      <div class="games-grid" id="games-grid"></div>
    </section>

    <!-- ── Footer ───────────────────────────────────────────────────────── -->
    <footer class="k-footer">
      <span id="footer-copyright">© 2026 Krabsy</span>
      <span class="k-footer-legal-sep" aria-hidden="true">·</span>
      <span class="k-footer-legal-mount"></span>
    </footer>
  </div>

  <script type="module">
    import { getAllGames } from '/lib/krabsy-data.js?v=2026-05-24';

    const LANG = 'es';
    const GAMES_FOLDER = 'juegos';

    async function renderGames() {
      let games;
      try { games = await getAllGames(); }
      catch (err) { console.error('games-hub: failed to load games.json', err); return; }

      const grid = document.getElementById('games-grid');
      grid.innerHTML = '';
      for (const g of games) {
        grid.appendChild(buildGameCard(g));
      }
    }

    function buildGameCard(g) {
      const isPlayable = g.status !== 'coming_soon';
      const card = document.createElement(isPlayable ? 'a' : 'div');
      card.className = 'k-game-card' + (isPlayable ? '' : ' is-disabled');
      if (isPlayable) card.href = `/${LANG}/${GAMES_FOLDER}/${g.id}/`;

      if (g.status === 'beta') {
        const badge = document.createElement('span');
        badge.className = 'k-game-card-badge';
        badge.textContent = 'Beta';
        card.appendChild(badge);
      } else if (g.status === 'coming_soon') {
        const badge = document.createElement('span');
        badge.className = 'k-game-card-badge is-coming-soon';
        badge.textContent = 'Pronto';
        card.appendChild(badge);
      }

      const thumb = document.createElement('div');
      thumb.className = 'k-game-card-thumb';
      if (g.thumbnail) {
        const img = document.createElement('img');
        img.src = g.thumbnail;
        img.alt = '';
        img.loading = 'lazy';
        img.decoding = 'async';
        img.addEventListener('error', () => {
          img.remove();
          thumb.innerHTML = '<span class="k-game-card-thumb-emoji">✏️</span>';
        });
        thumb.appendChild(img);
      } else {
        thumb.innerHTML = '<span class="k-game-card-thumb-emoji">✏️</span>';
      }

      const body = document.createElement('div');
      body.className = 'k-game-card-body';
      const title = document.createElement('h3');
      title.className = 'k-game-card-title';
      title.textContent = (g.name && g.name[LANG]) || g.id;
      const tagline = document.createElement('p');
      tagline.className = 'k-game-card-tagline';
      tagline.textContent = (g.tagline && g.tagline[LANG]) || '';
      body.append(title, tagline);
      if (isPlayable) {
        const cta = document.createElement('span');
        cta.className = 'k-game-card-cta';
        cta.textContent = 'Jugar →';
        body.appendChild(cta);
      }

      card.append(thumb, body);
      return card;
    }

    function renderFooter() {
      const el = document.getElementById('footer-copyright');
      if (el) el.textContent = `© ${new Date().getFullYear()} Krabsy`;
    }

    function init() {
      renderFooter();
      renderGames();
    }
    if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', init);
    else init();
  </script>
