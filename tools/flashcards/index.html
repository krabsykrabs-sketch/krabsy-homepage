<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>Karteikarten — Krabsy</title>
  <link rel="stylesheet" href="../../lib/krabsy-ui.css">
  <style>
    /* ── Flashcards module-specific styles ───────────────────────────── */

    .fc-page-header-inner {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    main.fc-main {
      flex: 1;
    }

    .fc-page-header {
      display: flex;
      flex-direction: column;
      gap: 4px;
      margin-bottom: var(--space-5);
    }

    .fc-page-title-row {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      gap: var(--space-3);
      flex-wrap: wrap;
    }

    .fc-intro {
      color: var(--krabsy-ink-mute);
      font-size: 0.9rem;
      margin: 0;
      max-width: 60ch;
    }

    /* Toolbar — filter selector */
    .fc-toolbar {
      display: flex;
      align-items: center;
      gap: var(--space-3);
      flex-wrap: wrap;
      margin-bottom: var(--space-5);
    }

    .fc-toolbar-label {
      font-size: 0.85rem;
      color: var(--krabsy-ink-mute);
      font-weight: 600;
    }

    .fc-filter-pills {
      display: inline-flex;
      gap: 6px;
      flex-wrap: wrap;
    }

    .fc-filter-pill {
      font-family: var(--font-body);
      font-size: 0.85rem;
      font-weight: 700;
      padding: 7px 14px;
      border-radius: var(--radius-pill);
      border: 2px solid var(--krabsy-lavender-soft);
      background: var(--krabsy-white);
      color: var(--krabsy-ink-mute);
      cursor: pointer;
      transition: color 0.15s ease, background-color 0.15s ease,
                  border-color 0.15s ease;
      -webkit-tap-highlight-color: transparent;
    }

    .fc-filter-pill:hover:not(.is-active) {
      color: var(--krabsy-ink);
      border-color: var(--krabsy-sage);
    }

    .fc-filter-pill.is-active {
      background: var(--krabsy-coral);
      color: var(--krabsy-white);
      border-color: var(--krabsy-coral);
    }

    /* Deck position */
    .fc-deck-position {
      font-size: 0.85rem;
      color: var(--krabsy-ink-mute);
      margin-bottom: var(--space-3);
      text-align: center;
      font-weight: 600;
    }

    /* ── Card stage (the flippable surface) ──────────────────────────── */
    .fc-stage {
      perspective: 1200px;
      width: 100%;
      max-width: 520px;
      margin: 0 auto var(--space-5) auto;
    }

    .fc-card {
      position: relative;
      width: 100%;
      aspect-ratio: 5 / 3;
      cursor: pointer;
      transform-style: preserve-3d;
      transition: transform 0.5s cubic-bezier(.2, .8, .2, 1);
      will-change: transform;
      -webkit-tap-highlight-color: transparent;
    }

    .fc-card.is-flipped {
      transform: rotateY(180deg);
    }

    .fc-face {
      position: absolute;
      inset: 0;
      background: var(--krabsy-white);
      border-radius: var(--radius-lg);
      box-shadow: var(--shadow-elev);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: var(--space-5);
      backface-visibility: hidden;
      -webkit-backface-visibility: hidden;
      text-align: center;
    }

    .fc-face-back {
      transform: rotateY(180deg);
      background: var(--krabsy-sage-soft);
    }

    .fc-front-verb {
      font-family: var(--font-display);
      color: var(--krabsy-ink);
      font-size: clamp(2.6rem, 8vw, 4.2rem);
      line-height: 1.1;
      margin: 0;
      letter-spacing: -0.5px;
    }

    .fc-front-hint {
      margin-top: var(--space-4);
      font-size: 0.8rem;
      color: var(--krabsy-ink-mute);
      letter-spacing: 0.4px;
      text-transform: uppercase;
    }

    .fc-back-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: var(--space-4);
      width: 100%;
      max-width: 380px;
    }

    .fc-back-row {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
    }

    .fc-back-label {
      font-size: 0.75rem;
      color: var(--krabsy-ink-mute);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      font-weight: 700;
    }

    .fc-back-form {
      font-family: var(--font-body);
      font-weight: 700;
      color: var(--krabsy-ink);
      font-size: clamp(1.4rem, 4.5vw, 2rem);
      line-height: 1.1;
    }

    .fc-back-meaning {
      margin-top: var(--space-3);
      font-style: italic;
      color: var(--krabsy-ink-mute);
      font-size: 0.85rem;
    }

    /* ── Judgment buttons ─────────────────────────────────────────────── */
    .fc-judgment {
      display: flex;
      justify-content: center;
      gap: var(--space-3);
      flex-wrap: wrap;
      margin-bottom: var(--space-5);
    }

    .fc-judgment .k-btn-primary,
    .fc-judgment .k-btn-secondary {
      min-width: 160px;
    }

    /* ── Empty / finished states ──────────────────────────────────────── */
    .fc-state-message {
      text-align: center;
      padding: var(--space-6) var(--space-4);
    }

    .fc-state-message .fc-state-text {
      font-family: var(--font-display);
      font-size: 1.2rem;
      color: var(--krabsy-ink);
      margin: 0 0 var(--space-5) 0;
    }

    .fc-state-actions {
      display: flex;
      justify-content: center;
      gap: var(--space-3);
      flex-wrap: wrap;
    }

    /* Tablet refinement */
    @media (min-width: 720px) {
      .fc-back-grid {
        grid-template-columns: 1fr 1fr;
      }
    }

    .fc-hidden { display: none !important; }

    /* Reduced motion: drop the flip animation duration */
    @media (prefers-reduced-motion: reduce) {
      .fc-card { transition: none; }
    }
  </style>
</head>
<body>
  <div class="k-page">

    <!-- Header -->
    <header class="k-page-header">
      <div class="fc-page-header-inner">
        <a class="k-logo" href="/index.html">Krabsy</a>
      </div>
      <div class="k-lang-toggle" role="group" aria-label="Sprache">
        <button class="k-lang-btn" data-lang="de" type="button">DE</button>
        <button class="k-lang-btn" data-lang="es" type="button">ES</button>
      </div>
    </header>

    <main class="k-section fc-main">
      <a class="k-back-link" href="/index.html" id="fc-back-link">&larr; <span data-i18n="common.back_to_hub_short">Zurück</span></a>

      <div class="fc-page-header">
        <div class="fc-page-title-row">
          <h1 class="k-h1" data-i18n="tools.flashcards.name">Karteikarten</h1>
        </div>
        <p class="fc-intro" data-i18n="tools.flashcards.intro"></p>
      </div>

      <!-- Filter toolbar -->
      <div class="fc-toolbar" role="group" aria-labelledby="fc-filter-label">
        <span class="fc-toolbar-label" id="fc-filter-label" data-i18n="tools.flashcards.filter_label">Was üben?</span>
        <div class="fc-filter-pills" id="fc-filter-pills">
          <button class="fc-filter-pill" type="button" data-filter="all" data-i18n="tools.flashcards.filter_all">Alle Verben</button>
          <button class="fc-filter-pill" type="button" data-filter="review" data-i18n="tools.flashcards.filter_review">Nur zu wiederholende</button>
          <button class="fc-filter-pill" type="button" data-filter="mastered" data-i18n="tools.flashcards.filter_mastered">Nur gemeisterte</button>
        </div>
      </div>

      <!-- Deck position -->
      <div class="fc-deck-position k-mono-num" id="fc-deck-position" aria-live="polite"></div>

      <!-- Card -->
      <div class="fc-stage" id="fc-stage">
        <div class="fc-card" id="fc-card" role="button" tabindex="0" aria-label="Karte umdrehen">
          <div class="fc-face fc-face-front">
            <h2 class="fc-front-verb" id="fc-front-verb">—</h2>
            <div class="fc-front-hint" id="fc-front-hint" data-i18n="tools.flashcards.flip_hint">Tippe zum Umdrehen</div>
          </div>
          <div class="fc-face fc-face-back" aria-hidden="true">
            <div class="fc-back-grid">
              <div class="fc-back-row">
                <div class="fc-back-label" data-i18n="common.verb_past">Simple Past</div>
                <div class="fc-back-form" id="fc-back-past">—</div>
              </div>
              <div class="fc-back-row">
                <div class="fc-back-label" data-i18n="common.verb_pp">Past Participle</div>
                <div class="fc-back-form" id="fc-back-pp">—</div>
              </div>
            </div>
            <div class="fc-back-meaning" id="fc-back-meaning"></div>
          </div>
        </div>
      </div>

      <!-- Judgment buttons -->
      <div class="fc-judgment" id="fc-judgment">
        <button class="k-btn-secondary" type="button" id="fc-btn-again" data-i18n="tools.flashcards.btn_again">Nochmal</button>
        <button class="k-btn-primary" type="button" id="fc-btn-got-it" data-i18n="tools.flashcards.btn_got_it">Schon gewusst</button>
      </div>

      <!-- Empty / Finished states -->
      <div class="fc-state-message fc-hidden" id="fc-state-empty">
        <p class="fc-state-text" data-i18n="tools.flashcards.deck_empty">Keine Karten in diesem Stapel.</p>
        <div class="fc-state-actions">
          <a class="k-btn-secondary" href="/index.html" data-i18n="common.back_to_hub">Zurück zur Übersicht</a>
        </div>
      </div>

      <div class="fc-state-message fc-hidden" id="fc-state-finished">
        <p class="fc-state-text" data-i18n="tools.flashcards.deck_finished">Stapel durch!</p>
        <div class="fc-state-actions">
          <button class="k-btn-primary" type="button" id="fc-btn-restart" data-i18n="tools.flashcards.btn_again">Nochmal</button>
          <a class="k-btn-secondary" href="/index.html" data-i18n="common.back_to_hub">Zurück zur Übersicht</a>
        </div>
      </div>
    </main>

    <footer class="k-footer">
      <span id="fc-footer-copy"></span>
    </footer>
  </div>

  <script type="module">
    import {
      loadVerbTable,
      loadStrings,
      getLang,
      setLang,
    } from '../../lib/krabsy-data.js';
    import {
      recordAttempt,
      getStrugglers,
      getMastered,
      verbAggregateMastery,
    } from '../../lib/krabsy-stats.js';

    const FILTER_KEY = 'krabsy_flashcards_filter';
    const VALID_FILTERS = new Set(['all', 'review', 'mastered']);

    // ─── State ──────────────────────────────────────────────────────────
    const state = {
      ui: null,
      table: [],        // full verb table [{verb, past, participle, meaning_de}]
      deck: [],         // active filtered & shuffled deck
      index: 0,
      flipped: false,
      filter: 'all',
      finished: false,
    };

    // ─── i18n helpers ───────────────────────────────────────────────────
    function tGet(path) {
      const parts = path.split('.');
      let cur = state.ui;
      for (const p of parts) {
        if (cur && Object.prototype.hasOwnProperty.call(cur, p)) cur = cur[p];
        else return '';
      }
      return typeof cur === 'string' ? cur : '';
    }

    function applyStaticStrings() {
      document.title = `${tGet('tools.flashcards.name')} — Krabsy`;
      document.documentElement.lang = state.ui.lang || 'de';
      const nodes = document.querySelectorAll('[data-i18n]');
      nodes.forEach((node) => {
        const key = node.getAttribute('data-i18n');
        const val = tGet(key);
        if (val) node.textContent = val;
      });

      // Footer copyright
      const footerCopy = document.getElementById('fc-footer-copy');
      const tmpl = tGet('homepage.footer_copyright') || '© {year} Krabsy';
      footerCopy.textContent = tmpl.replace('{year}', new Date().getFullYear());

      // Lang toggle active state
      const lang = getLang();
      document.querySelectorAll('.k-lang-btn').forEach((btn) => {
        btn.classList.toggle('is-active', btn.dataset.lang === lang);
      });
    }

    // ─── Deck building ──────────────────────────────────────────────────
    function shuffleInPlace(arr) {
      for (let i = arr.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [arr[i], arr[j]] = [arr[j], arr[i]];
      }
      return arr;
    }

    function buildDeck(filter) {
      if (filter === 'all') {
        return shuffleInPlace(state.table.slice());
      }

      if (filter === 'review') {
        // Lowest mastery first. Dedupe by verb. Only include verbs with
        // any recorded data AND aggregate mastery in the "lernend / neu" range.
        const rows = getStrugglers(60);
        const seen = new Set();
        const out = [];
        for (const r of rows) {
          if (seen.has(r.verb)) continue;
          // Aggregate mastery threshold: include if aggregate < 3 (i.e. neu/lernend).
          if (verbAggregateMastery(r.verb) >= 3) continue;
          const row = state.table.find((t) => t.verb === r.verb);
          if (!row) continue;
          seen.add(r.verb);
          out.push(row);
        }
        return shuffleInPlace(out);
      }

      if (filter === 'mastered') {
        const rows = getMastered(60);
        const seen = new Set();
        const out = [];
        for (const r of rows) {
          if (seen.has(r.verb)) continue;
          if (verbAggregateMastery(r.verb) < 3) continue;
          const row = state.table.find((t) => t.verb === r.verb);
          if (!row) continue;
          seen.add(r.verb);
          out.push(row);
        }
        return shuffleInPlace(out);
      }

      return [];
    }

    // ─── Rendering ──────────────────────────────────────────────────────
    function setFilterPillsActive() {
      document.querySelectorAll('.fc-filter-pill').forEach((btn) => {
        btn.classList.toggle('is-active', btn.dataset.filter === state.filter);
      });
    }

    function showSection({ deck, empty, finished }) {
      const card = document.getElementById('fc-stage');
      const judgment = document.getElementById('fc-judgment');
      const position = document.getElementById('fc-deck-position');
      const emptyEl = document.getElementById('fc-state-empty');
      const finishedEl = document.getElementById('fc-state-finished');

      card.classList.toggle('fc-hidden', !deck);
      judgment.classList.toggle('fc-hidden', !deck);
      position.classList.toggle('fc-hidden', !deck);
      emptyEl.classList.toggle('fc-hidden', !empty);
      finishedEl.classList.toggle('fc-hidden', !finished);
    }

    function renderCurrentCard() {
      const card = document.getElementById('fc-card');
      state.flipped = false;
      card.classList.remove('is-flipped');

      const total = state.deck.length;
      if (total === 0) {
        showSection({ empty: true });
        return;
      }
      if (state.finished || state.index >= total) {
        showSection({ finished: true });
        return;
      }

      const entry = state.deck[state.index];
      document.getElementById('fc-front-verb').textContent = entry.verb;
      document.getElementById('fc-back-past').textContent = entry.past || '—';
      document.getElementById('fc-back-pp').textContent = entry.participle || '—';
      const meaningEl = document.getElementById('fc-back-meaning');
      if (entry.meaning_de) {
        meaningEl.textContent = entry.meaning_de;
        meaningEl.style.display = '';
      } else {
        meaningEl.textContent = '';
        meaningEl.style.display = 'none';
      }

      const posTmpl = tGet('tools.flashcards.deck_position') || 'Karte {n} von {total}';
      document.getElementById('fc-deck-position').textContent = posTmpl
        .replace('{n}', String(state.index + 1))
        .replace('{total}', String(total));

      showSection({ deck: true });
    }

    function rebuildAndRender() {
      state.deck = buildDeck(state.filter);
      state.index = 0;
      state.finished = false;
      renderCurrentCard();
    }

    // ─── Interaction ────────────────────────────────────────────────────
    function flipCard() {
      if (state.deck.length === 0 || state.finished) return;
      state.flipped = !state.flipped;
      const card = document.getElementById('fc-card');
      card.classList.toggle('is-flipped', state.flipped);
    }

    function judge(correct) {
      if (state.deck.length === 0 || state.finished) return;
      const entry = state.deck[state.index];
      if (!entry) return;
      recordAttempt(entry.verb, 'past', correct, 'flashcards');
      recordAttempt(entry.verb, 'participle', correct, 'flashcards');

      // Advance
      state.index += 1;
      if (state.index >= state.deck.length) {
        state.finished = true;
        renderCurrentCard();
      } else {
        // Flip back then advance — using a transitionend would feel laggy if
        // the user is going fast; just snap to next card.
        renderCurrentCard();
      }
    }

    // ─── Init ───────────────────────────────────────────────────────────
    function loadSavedFilter() {
      try {
        const v = localStorage.getItem(FILTER_KEY);
        if (v && VALID_FILTERS.has(v)) return v;
      } catch (_) { /* private mode */ }
      return 'all';
    }

    function saveFilter(filter) {
      try {
        localStorage.setItem(FILTER_KEY, filter);
      } catch (_) { /* ignore */ }
    }

    function wireEvents() {
      // Card flip — click anywhere on the card surface
      const card = document.getElementById('fc-card');
      card.addEventListener('click', flipCard);
      card.addEventListener('keydown', (e) => {
        if (e.key === ' ' || e.key === 'Enter') {
          e.preventDefault();
          flipCard();
        }
      });

      // Judgment buttons — stopPropagation so clicking them doesn't also
      // flip the card if they ever overlap.
      document.getElementById('fc-btn-got-it').addEventListener('click', (e) => {
        e.stopPropagation();
        judge(true);
      });
      document.getElementById('fc-btn-again').addEventListener('click', (e) => {
        e.stopPropagation();
        judge(false);
      });

      // Restart from finished state
      document.getElementById('fc-btn-restart').addEventListener('click', () => {
        rebuildAndRender();
      });

      // Filter pills
      document.querySelectorAll('.fc-filter-pill').forEach((btn) => {
        btn.addEventListener('click', () => {
          const f = btn.dataset.filter;
          if (!VALID_FILTERS.has(f) || f === state.filter) return;
          state.filter = f;
          saveFilter(f);
          setFilterPillsActive();
          rebuildAndRender();
        });
      });

      // Language toggle
      document.querySelectorAll('.k-lang-btn').forEach((btn) => {
        btn.addEventListener('click', () => {
          const newLang = btn.dataset.lang;
          if (!newLang || newLang === getLang()) return;
          setLang(newLang);
          window.location.reload();
        });
      });

      // ESC → back to hub
      document.addEventListener('keydown', (e) => {
        if (e.key === 'Escape') {
          window.location.href = '/index.html';
        }
      });
    }

    async function init() {
      try {
        const [ui, table] = await Promise.all([
          loadStrings(),
          loadVerbTable(),
        ]);
        state.ui = ui;
        state.table = table;
      } catch (err) {
        console.error('Flashcards init failed:', err);
        document.body.innerHTML = '<p style="padding:24px;font-family:Verdana,sans-serif;">Konnte Daten nicht laden.</p>';
        return;
      }

      state.filter = loadSavedFilter();

      applyStaticStrings();
      setFilterPillsActive();
      wireEvents();
      rebuildAndRender();
    }

    init();
  </script>
</body>
</html>
